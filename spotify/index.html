<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Lofi Radar — Spotify · Veille</title>
<link rel="icon" type="image/png" href="../assets/lofi-radar-favicon.png">
<script type="speculationrules">
{"prerender":[{"source":"list","urls":["../"],"eagerness":"immediate"}]}
</script>
<script>
(()=>{
  window.__RADAR_WAS_PRERENDERED=!!document.prerendering;
  if(!(HTMLScriptElement.supports&&HTMLScriptElement.supports('speculationrules'))){
    ['../','../Lofi_Radar_data.js','../Lofi_Radar_channel_avatars.js','../Lofi_Radar_new_channel_avatars.js','../Lofi_Radar_studio.js','../Lofi_Radar_chx.js','../Lofi_Radar_subs2.js','../Lofi_Radar_cmt.js','../Lofi_Radar_sbm.js','../Lofi_Radar_seo.js'].forEach(href=>{
      const hint=document.createElement('link');
      hint.rel='prefetch';hint.href=href;if(/\.js(?:\?|$)/.test(href))hint.as='script';
      document.head.appendChild(hint);
    });
  }
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="../Spotify_Radar_data.js"></script>
<script src="../Spotify_Labels_data.js"></script>
<script>
(()=>{
  const stamp=Date.now();
  [
    '../Spotify_Playlists_data.js?payload='+stamp,
    '../Spotify_Soundcharts_data_20260722T045237Z.js?payload='+stamp,
    '../Spotify_Performance_data.js?payload='+stamp
  ].forEach(src=>document.write('<script src="'+src+'"><\/script>'));
})();
</script>
<link rel="stylesheet" href="dashboard.css">
</head>
<body>

<aside id="sidebar">
  <div class="logo">
    <img class="mark" src="../assets/lofi-radar-logo.jpg" alt="Lofi Radar">
    <div>
      <h1>Lofi <span>Radar</span></h1>
      <small>Spotify · Veille</small>
    </div>
  </div>
  <div class="radar-switch" aria-label="Changer de radar">
    <a class="yt" href="../" aria-label="Lofi Radar · YouTube" title="Lofi Radar · YouTube">YouTube</a><a class="sp on" href="./" aria-current="page" aria-label="Lofi Radar · Spotify" title="Lofi Radar · Spotify">Spotify</a>
  </div>
  <nav class="nav" id="nav">
    <div class="nav-label" data-fr="Analyse">Analyse</div>
    <button data-v="radar" data-fr="Opportunités A&R"><span class="emo">💎</span>Opportunités A&R<span class="count" id="c-radar"></span></button>
    <button data-v="opps" class="active" data-fr="Toutes les pistes"><span class="emo">🎶</span>Toutes les pistes<span class="count" id="c-opps"></span></button>
    <button data-v="artists" data-fr="Tous les artistes"><span class="emo">🎸</span>Tous les artistes<span class="count" id="c-art"></span></button>
    <button data-v="playlists" data-fr="Toutes les playlists"><span class="emo">📻</span>Toutes les playlists<span class="count" id="c-pl"></span></button>
    <button data-v="labels" data-fr="Tous les labels"><span class="emo">🏷️</span>Tous les labels<span class="count" id="c-lb"></span></button>
    <button data-v="watch" data-fr="Watchlist"><span class="emo">⭐</span>Watchlist<span class="count" id="c-watch"></span></button>
  </nav>
  <div class="side-foot">
    <div class="sync-row" id="sync-row-tr">
      <div class="sync-dot" id="sync-dot-tr"></div>
      <div class="sync-txt" id="sync-txt-tr">—</div>
      <div class="sync-detail" id="sync-detail-tr"></div>
    </div>
    <div class="sync-row" id="sync-row-pl" style="margin-top:5px">
      <div class="sync-dot" id="sync-dot-pl"></div>
      <div class="sync-txt" id="sync-txt-pl">—</div>
      <div class="sync-detail" id="sync-detail-pl"></div>
    </div>
  </div>
</aside>

<button class="lang-switch" id="lang-switch" data-lang="fr" title="Français / English">
  <span class="ls-knob"></span>
  <span class="ls-flag" data-l="fr"><svg viewBox="0 0 3 2" preserveAspectRatio="xMidYMid slice"><rect width="3" height="2" fill="#fff"/><rect width="1" height="2" fill="#0055A4"/><rect x="2" width="1" height="2" fill="#EF4135"/></svg></span>
  <span class="ls-flag" data-l="en"><svg viewBox="0 0 60 30" preserveAspectRatio="xMidYMid slice"><rect width="60" height="30" fill="#00247d"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#cf142b" stroke-width="4"/><path d="M30,0 V30 M0,15 H60" stroke="#fff" stroke-width="10"/><path d="M30,0 V30 M0,15 H60" stroke="#cf142b" stroke-width="6"/></svg></span>
</button>

<main id="main">
  <div id="view"></div>
</main>

<div id="track-modal" class="tmodal" style="display:none" onclick="if(event.target===this)closeTrack()">
  <div class="tmbox" id="tmbox"></div>
</div>

<div id="artist-modal" class="tmodal amodal" style="display:none" onclick="if(event.target===this)closeArtistModal()">
  <div class="tmbox ambox" id="am-body"></div>
</div>

<div id="ar-modal" class="tmodal amodal" style="display:none" onclick="if(event.target===this)closeArModal()">
  <div class="tmbox ambox" id="ar-body"></div>
</div>

<script src="dashboard.js?v=20260721-strict-public-v2"></script>
</body>
</html>
