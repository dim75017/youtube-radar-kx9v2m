<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Spotify Radar — Veille Artistes & Catalogue</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='42' fill='%231ed760'/><circle cx='50' cy='50' r='16' fill='%2307080d'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="../Spotify_Radar_data.js"></script>
<style>
:root{
  --bg:#07080d; --bg2:#0b0d15; --panel:#10131e; --panel2:#141828; --card:#12152233;
  --border:rgba(150,214,170,.10); --border2:rgba(150,214,170,.22);
  --text:#eceef8; --muted:#9aa1c0; --dim:#5d6485;
  --acc:#1ed760; --acc2:#4ade80; --accSoft:rgba(30,215,96,.12);
  --green:#4ade80; --amber:#fbbf24; --red:#fb7185; --cyan:#67e8f9; --blue:#7dd3fc; --violet:#a78bfa;
  --r:16px; --sidebar:238px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scrollbar-color:#243a2c var(--bg)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#1f2e26;border-radius:8px;border:2px solid var(--bg)}
::-webkit-scrollbar-track{background:transparent}
body{
  font-family:'Inter',system-ui,sans-serif;font-size:14px;color:var(--text);
  background:
    radial-gradient(1100px 700px at 88% -12%, rgba(30,215,96,.07), transparent 62%),
    radial-gradient(900px 650px at -8% 108%, rgba(56,189,248,.05), transparent 60%),
    var(--bg);
  background-attachment:fixed;min-height:100vh;
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;color:var(--text)}

/* ---------- Sidebar ---------- */
#sidebar{
  position:fixed;inset:0 auto 0 0;width:var(--sidebar);z-index:40;
  background:linear-gradient(180deg, rgba(18,26,21,.92), rgba(11,13,21,.92));
  border-right:1px solid var(--border);backdrop-filter:blur(14px);
  display:flex;flex-direction:column;padding:22px 14px 16px;
}
.logo{display:flex;align-items:center;gap:11px;padding:2px 8px 20px}
.logo .mark{
  width:38px;height:38px;border-radius:12px;flex:none;
  background:linear-gradient(135deg, #1ed760, #14913f);
  display:grid;place-items:center;box-shadow:0 4px 22px rgba(30,215,96,.4);
}
.logo .mark::after{content:'';width:14px;height:14px;border-radius:50%;background:#0a120c;box-shadow:0 0 0 3px rgba(10,18,12,.35)}
.logo h1{font-family:'Sora';font-size:16.5px;font-weight:800;letter-spacing:.4px}
.logo h1 span{background:linear-gradient(90deg,#1ed760,#4ade80);-webkit-background-clip:text;background-clip:text;color:transparent}
.logo small{display:block;font-size:10px;font-weight:500;color:var(--dim);letter-spacing:1.6px;text-transform:uppercase;margin-top:2px}
.nav{display:flex;flex-direction:column;gap:3px;flex:1}
.nav-label{font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--dim);padding:14px 10px 7px;font-weight:600}
.nav button{
  display:flex;align-items:center;gap:11px;padding:9.5px 11px;border-radius:11px;
  color:var(--muted);font-size:13.5px;font-weight:500;text-align:left;width:100%;
  transition:all .16s ease;
}
.nav button:hover{color:var(--text);background:rgba(150,214,170,.06)}
.nav button.active{
  color:#fff;background:linear-gradient(90deg, rgba(30,215,96,.18), rgba(30,215,96,.05));
  box-shadow:inset 0 0 0 1px rgba(30,215,96,.28);
}
.nav button .emo{width:20px;flex:none;font-size:15px;text-align:center;filter:saturate(.85)}
.nav .count{margin-left:auto;font-size:10.5px;font-weight:600;color:var(--dim);background:rgba(150,214,170,.09);padding:2px 7px;border-radius:20px;min-width:26px;text-align:center}
.nav button.active .count{color:var(--acc2);background:rgba(30,215,96,.16)}
.side-foot{border-top:1px solid var(--border);padding-top:13px}
.sync-row{display:flex;align-items:center;gap:8px;padding:0 8px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);flex:none}
.sync-txt{font-size:11px;color:var(--dim);line-height:1.4}

/* ---------- Sélecteur de langue ---------- */
.lang-btn{
  position:fixed;top:16px;right:22px;z-index:60;
  display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:20px;
  background:linear-gradient(160deg,var(--panel),var(--bg2));border:1px solid var(--border);
  font-size:12.5px;font-weight:700;color:var(--muted);transition:all .15s;
}
.lang-btn:hover{border-color:var(--border2);color:var(--text)}

/* ---------- Main ---------- */
#main{margin-left:var(--sidebar);padding:26px 30px 60px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.page-head h2{font-family:'Sora';font-size:22px;font-weight:700}
.page-head p{color:var(--muted);font-size:13px;margin-top:4px;max-width:760px;line-height:1.5}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(178px,1fr));gap:12px;margin-bottom:22px}
.kpi{background:linear-gradient(160deg,var(--panel),var(--bg2));border:1px solid var(--border);border-radius:var(--r);padding:16px 17px}
.kpi .lbl{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim);font-weight:600}
.kpi .val{font-family:'Sora';font-size:25px;font-weight:800;margin-top:7px}
.kpi .sub{font-size:11.5px;color:var(--muted);margin-top:4px}
.kpi.hl .val{color:var(--acc2)}

/* Panels / cards */
.panel{background:linear-gradient(160deg,var(--panel),var(--bg2));border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:18px}
.panel h3{font-family:'Sora';font-size:14.5px;font-weight:700;margin-bottom:13px;display:flex;align-items:center;gap:8px}
.panel h3 .hint{font-family:'Inter';font-weight:500;font-size:11.5px;color:var(--dim);margin-left:auto}
.grid2{display:grid;grid-template-columns:1.25fr .75fr;gap:18px}
@media(max-width:1100px){.grid2{grid-template-columns:1fr}}

/* Top artistes (vue d'ensemble, liste verticale) */
.top-row{display:flex;align-items:center;gap:14px;padding:10px 8px;border-bottom:1px solid rgba(150,214,170,.05);cursor:pointer;border-radius:12px;transition:background .13s}
.top-row:hover{background:rgba(150,214,170,.05)}
.top-row .rank{width:26px;text-align:center;font-family:'Sora';font-weight:700;font-size:14px;color:var(--dim);flex:none}
.av-sm{width:46px;height:46px;border-radius:50%;position:relative;overflow:hidden;display:grid;place-items:center;font-family:'Sora';font-weight:700;font-size:16px;color:#052e12;background:linear-gradient(135deg,#4ade80,#67e8f9);flex:none}
.top-row .ti{flex:1;min-width:0}
.top-row .nm{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-row .sub{font-size:11.5px;color:var(--muted);margin:2.5px 0 6px}
.top-row .vals{text-align:right;flex:none}
.top-row .v1{font-family:'Sora';font-weight:800;font-size:16.5px}
.top-row .v2{font-size:9.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.9px;margin-top:1px}
.year-wrap{display:flex;align-items:flex-end;gap:6px;height:120px;padding-top:8px}
.ybar{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0}
.ybar .b{width:100%;border-radius:5px 5px 2px 2px;background:linear-gradient(180deg,#1ed760,#14532d)}
.ybar .y{font-size:9.5px;color:var(--dim);white-space:nowrap}
.split{display:flex;height:14px;border-radius:8px;overflow:hidden;margin:8px 0 10px}
.split .s1{background:linear-gradient(90deg,#15803d,#4ade80)}
.split .s2{background:linear-gradient(90deg,#b45309,#fbbf24)}
.legend{display:flex;gap:16px;font-size:12px;color:var(--muted);flex-wrap:wrap}
.legend .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}

/* Toolbar / filters */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.toolbar input[type=text]{
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8.5px 13px;
  font-size:13px;min-width:230px;outline:none;
}
.toolbar input[type=text]:focus{border-color:var(--border2)}
.toolbar select{
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8.5px 11px;
  font-size:12.5px;outline:none;appearance:auto;
}
.chip{padding:7.5px 13px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--muted);transition:all .14s}
.chip:hover{color:var(--text);border-color:var(--border2)}
.chip.on{color:#052e12;background:linear-gradient(90deg,#1ed760,#4ade80);border-color:transparent}
.toolbar .spacer{flex:1}
.result-count{font-size:12px;color:var(--dim);font-weight:600}

/* Table */
table{width:100%;border-collapse:collapse;font-size:13px}
th{
  text-align:left;font-size:10.5px;letter-spacing:1.1px;text-transform:uppercase;color:var(--dim);
  font-weight:600;padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;
}
th.num,td.num{text-align:right;font-variant-numeric:tabular-nums}
th:hover{color:var(--muted)}
th .arr{color:var(--acc2);font-size:10px}
td{padding:8.5px 10px;border-bottom:1px solid rgba(150,214,170,.05);vertical-align:middle}
tr:hover td{background:rgba(150,214,170,.03)}
tr.hot td{background:rgba(30,215,96,.055)}
tr.hot:hover td{background:rgba(30,215,96,.09)}
td .tk{font-weight:600;color:var(--text)}
td .tk:hover{color:var(--acc2)}
td .ar{color:var(--muted);cursor:pointer}
td .ar:hover{color:var(--acc2)}
td .lb{color:var(--dim);font-size:11.5px;max-width:360px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
td.covtd{width:82px;padding:6px 2px 6px 10px}
.cov{width:68px;height:68px;border-radius:9px;background:rgba(150,214,170,.07);object-fit:cover;display:block;box-shadow:0 2px 8px rgba(0,0,0,.35)}
.cov[src]{background:none}
.avp{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%;opacity:0;transition:opacity .25s}
.avp.on{opacity:1}
.badge{display:inline-block;padding:2.5px 9px;border-radius:20px;font-size:10.5px;font-weight:700;letter-spacing:.3px;white-space:nowrap}
.badge.self{color:#4ade80;background:rgba(74,222,128,.12);box-shadow:inset 0 0 0 1px rgba(74,222,128,.25)}
.badge.other{color:#fbbf24;background:rgba(251,191,36,.10);box-shadow:inset 0 0 0 1px rgba(251,191,36,.22)}
.badge.new{color:#67e8f9;background:rgba(103,232,249,.10);box-shadow:inset 0 0 0 1px rgba(103,232,249,.25)}
.badge.hot{color:#052e12;background:linear-gradient(90deg,#1ed760,#4ade80)}
.badge.lofi{color:#a78bfa;background:rgba(167,139,250,.12);box-shadow:inset 0 0 0 1px rgba(167,139,250,.25)}
.badge.disco{color:#f9a8d4;background:rgba(249,168,212,.10);box-shadow:inset 0 0 0 1px rgba(249,168,212,.25)}
.more-wrap{text-align:center;padding:16px 0 4px}
.btn-more{
  padding:9px 22px;border-radius:11px;border:1px solid var(--border2);font-size:12.5px;font-weight:600;
  color:var(--muted);transition:all .15s;
}
.btn-more:hover{color:var(--text);background:rgba(150,214,170,.06)}
.empty{padding:40px 10px;text-align:center;color:var(--dim);font-size:13px;line-height:1.7}

/* Artistes cards */
.acards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:13px}
.acard{
  background:linear-gradient(160deg,var(--panel),var(--bg2));border:1px solid var(--border);
  border-radius:var(--r);padding:15px 17px;cursor:pointer;transition:all .15s;
}
.acard:hover{border-color:var(--border2);transform:translateY(-1px)}
.acard .top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.acard .av{
  width:46px;height:46px;border-radius:50%;flex:none;display:grid;place-items:center;
  font-family:'Sora';font-weight:700;font-size:16px;color:#052e12;
  background:linear-gradient(135deg,#4ade80,#67e8f9);
  position:relative;overflow:hidden;
}
.acard .nm{font-weight:700;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acard .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:9px}
.acard .st .v{font-family:'Sora';font-weight:700;font-size:15.5px}
.acard .st .l{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.acard .foot{display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-size:11px;color:var(--dim)}
.mini-split{height:6px;border-radius:4px;overflow:hidden;display:flex;margin:4px 0 9px}

/* Découverte */
.steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:13px;margin-top:6px}
.step{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px 16px}
.step .n{
  width:26px;height:26px;border-radius:9px;display:grid;place-items:center;font-family:'Sora';
  font-weight:700;font-size:13px;color:#052e12;background:linear-gradient(135deg,#1ed760,#67e8f9);margin-bottom:10px;
}
.step b{font-size:13px;display:block;margin-bottom:5px}
.step p{font-size:12px;color:var(--muted);line-height:1.55}

@media(max-width:860px){
  #sidebar{position:static;width:auto;flex-direction:row;align-items:center;padding:12px;overflow-x:auto}
  .nav{flex-direction:row}
  #main{margin-left:0;padding:18px 14px 40px}
  .bar-row{grid-template-columns:110px 1fr 70px}
}
</style>
</head>
<body>

<aside id="sidebar">
  <div class="logo">
    <div class="mark"></div>
    <div>
      <h1>Spotify <span>Radar</span></h1>
      <small>Veille artistes</small>
    </div>
  </div>
  <nav class="nav" id="nav">
    <div class="nav-label" data-fr="Analyse">Analyse</div>
    <button data-v="overview" class="active" data-fr="Vue d'ensemble"><span class="emo">📡</span>Vue d'ensemble</button>
    <button data-v="opps" data-fr="Tracks"><span class="emo">💎</span>Tracks<span class="count" id="c-opps"></span></button>
    <button data-v="artists" data-fr="Artistes"><span class="emo">🎧</span>Artistes<span class="count" id="c-art"></span></button>
    <button data-v="new" data-fr="Sorties récentes"><span class="emo">🆕</span>Sorties récentes<span class="count" id="c-new"></span></button>
    <div class="nav-label" data-fr="Expansion">Expansion</div>
    <button data-v="disco" data-fr="Découverte"><span class="emo">🔭</span>Découverte<span class="count" id="c-disco"></span></button>
    <button data-v="playlists" data-fr="Playlists"><span class="emo">📻</span>Playlists<span class="count">soon</span></button>
  </nav>
  <div class="side-foot">
    <div class="sync-row">
      <div class="sync-dot"></div>
      <div class="sync-txt" id="sync-txt">—</div>
    </div>
  </div>
</aside>

<button class="lang-btn" id="lang-btn" title="Switch language">🇬🇧 EN</button>

<main id="main">
  <div id="view"></div>
</main>

  "Dernier scan le":"Last scan:","artistes scannés":"artists scanned"
};
const T = s => LANG === 'fr' ? s : (EN_MAP[s] !== undefined ? EN_MAP[s] : s);
const HOT = 500000;                       // seuil de mise en évidence
const TODAY = new Date(D.t + 'T00:00:00');

/* ---------- préparation ---------- */
// artists: [nom, nbLofi, flag, done, disco, origine, seedSrc]
// rows:    [ai, track, date, streams, statut(0 self/1 autre), label, id, firstSeen]
const A = D.artists, R = D.rows;
const AG = A.map((a,i)=>({i, name:a[0], lofi:a[1], flag:a[2], done:a[3], disco:a[4],
  origin:a[5], seedSrc:a[6], id:a[7]||'', img:a[8]||'', n:0, self:0, streams:0, hot:0, last:'', top:null}));
for (const r of R){
  const g = AG[r[0]];
  g.n++; if (r[4]===0) g.self++;
  if (r[3]>0) g.streams += r[3];
  if (r[3]>=HOT) g.hot++;
  if (r[2] > g.last) g.last = r[2];
  if (!g.top || r[3] > g.top[3]) g.top = r;
}
const withTracks = AG.filter(g=>g.n>0);
const totStreams = withTracks.reduce((s,g)=>s+g.streams,0);
const nHot = R.reduce((s,r)=>s+(r[3]>=HOT?1:0),0);
const nSelf = R.reduce((s,r)=>s+(r[4]===0?1:0),0);

function fmt(n){
  if (n===-1||n==null) return '?';
  if (n>=1e9) return (n/1e9).toFixed(2)+' Md';
  if (n>=1e6) return (n/1e6).toFixed(n>=1e7?0:1)+' M';
  if (n>=1e3) return Math.round(n/1e3)+' k';
  return ''+n;
}
function fmtFull(n){ return n===-1?'?':n.toLocaleString('fr-FR'); }
function monthsSince(d){
  if(!d) return null;
  const days = (TODAY - new Date(d+'T00:00:00'))/864e5;
  return days<0 ? null : Math.max(days/30.4368,1);
}
function perMonth(r){
  const m = monthsSince(r[2]);
  return (m===null||r[3]<0) ? -1 : Math.round(r[3]/m);
}
function daysAgo(d){ return d ? Math.round((TODAY-new Date(d+'T00:00:00'))/864e5) : 1e9; }
function esc(s){ return (''+s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
const trackUrl = id => 'https://open.spotify.com/track/'+id;
const artistSearch = n => 'https://open.spotify.com/search/'+encodeURIComponent(n)+'/artists';

/* ---------- état ---------- */
const S = {
  view:'overview', back:null,
  q:'', statut:'all', min:0, period:'all', artist:-1, rel:'all',
  sort:{k:3, dir:-1}, shown:100,
  aq:'', asort:'streams', shownA:60, aseg:'all',
  newDays:90, shownN:100,
};

/* ---------- navigation ---------- */
document.getElementById('nav').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  document.querySelectorAll('#nav button').forEach(x=>x.classList.toggle('active', x===b));
  S.view = b.dataset.v; S.shown = 100; S.shownA = 60; S.shownN = 100;
  render(); window.scrollTo(0,0);
});
function goArtist(i){
  S.back = {view:S.view, y:window.scrollY};
  S.view='opps'; S.artist=i; S.q=''; S.statut='all'; S.min=0; S.period='all'; S.shown=100;
  document.querySelectorAll('#nav button').forEach(x=>x.classList.toggle('active', x.dataset.v==='opps'));
  render(); window.scrollTo(0,0);
}
function goTab(v){
  S.view = v;
  document.querySelectorAll('#nav button').forEach(x=>x.classList.toggle('active', x.dataset.v===v));
  render(); window.scrollTo(0,0);
}
function goBack(){
  const b = S.back; S.back = null; S.artist = -1; S.shown = 100;
  S.view = b ? b.view : 'opps';
  document.querySelectorAll('#nav button').forEach(x=>x.classList.toggle('active', x.dataset.v===S.view));
  render(); window.scrollTo(0, b ? b.y : 0);
}

/* ---------- filtres opportunités ---------- */
function filteredRows(){
  const q = S.q.trim().toLowerCase();
  let rows = R.filter(r=>{
    if (S.artist>=0 && r[0]!==S.artist) return false;
    if (S.rel!=='all' && seg(AG[r[0]])!==S.rel) return false;
    if (S.statut==='self' && r[4]!==0) return false;
    if (S.statut==='other' && r[4]!==1) return false;
    if (S.min>0 && r[3]<S.min) return false;
    if (S.period!=='all' && daysAgo(r[2]) > +S.period) return false;
    if (q && !(r[1].toLowerCase().includes(q) || A[r[0]][0].toLowerCase().includes(q) || r[5].toLowerCase().includes(q))) return false;
    return true;
  });
  const {k,dir} = S.sort;
  rows.sort((a,b)=>{
    let x,y;
    if (k===0){ x=A[a[0]][0].toLowerCase(); y=A[b[0]][0].toLowerCase(); }
    else if (k===7){ x=perMonth(a); y=perMonth(b); }
    else { x=a[k]; y=b[k]; }
    const c = x<y ? -1 : (x>y ? 1 : 0);
    return c*dir;
  });
  return rows;
}

function kpi(lbl,val,sub,hl){
  return `<div class="kpi ${hl?'hl':''}"><div class="lbl">${lbl}</div><div class="val">${val}</div><div class="sub">${sub||''}</div></div>`;
}
function avatarHtml(g){
  if (g.img) return `<img class="avp on" src="${esc(g.img)}" alt="">`;
  if (g.top && g.top[8]) return `<img class="avp on" src="${esc(g.top[8])}" alt="">`;
  if (g.top) return `<img class="avp" data-tid="${g.top[6]}" alt="">`;
  return '';
}

/* relation au label : régulier (≥10 tracks Lofi), occasionnel (1-9), hors label (0) */
function seg(g){ return g.lofi>=10 ? 'reg' : (g.lofi>0 ? 'occ' : 'ext'); }
function segBadge(g){
  const s = seg(g);
  if (s==='reg') return '<span class="badge lofi">'+T('régulier')+'</span>';
  if (s==='occ') return '<span class="badge other">'+T('occasionnel')+'</span>';
  return '<span class="badge disco">'+T('hors label')+'</span>';
}

/* ---------- covers (lazy, via oEmbed Spotify, sans clé API) ---------- */
const covCache = new Map();
try{
  const saved = JSON.parse(localStorage.getItem('sr_covs')||'[]');
  for (const [k,v] of saved) covCache.set(k,v);
}catch(e){}
let covSaveTimer = null;
function covPersist(){
  clearTimeout(covSaveTimer);
  covSaveTimer = setTimeout(()=>{
    try{
      const entries = [...covCache.entries()].slice(-4000);
      localStorage.setItem('sr_covs', JSON.stringify(entries));
    }catch(e){}
  }, 1200);
}
function covKeyUrl(img){
  if (img.dataset.tid) return {key:'t'+img.dataset.tid, url:'https://open.spotify.com/track/'+img.dataset.tid};
  return {key:'a'+img.dataset.aid, url:'https://open.spotify.com/artist/'+img.dataset.aid};
}
function covShow(img, u){
  if (!img.isConnected) return;
  img.onload = ()=>img.classList.add('on');
  img.src = u; if (img.complete && img.naturalWidth>0) img.classList.add('on');
}
const covQueue = []; let covActive = 0;
function covPump(){
  while (covActive < 8 && covQueue.length){
    const {key, url, img} = covQueue.shift();
    if (!img.isConnected) continue;
    covActive++;
    fetch('https://open.spotify.com/oembed?url='+url)
      .then(r=>r.ok?r.json():null)
      .then(j=>{
        const u = j && j.thumbnail_url;
        if (u){ covCache.set(key,u); covPersist(); covShow(img,u); }
      })
      .catch(()=>{})
      .finally(()=>{ covActive--; setTimeout(covPump, 30); });
  }
}
let covObserver = null;
function attachCovers(){
  // préchargement immédiat de TOUTE la liste rendue (cache d'abord, réseau ensuite),
  // l'observer ne sert plus qu'à faire passer en tête de file ce qui approche de l'écran.
  if (covObserver) covObserver.disconnect();
  covQueue.length = 0;
  const imgs = [...document.querySelectorAll('img.cov[data-tid], img.avp[data-tid]')];
  const pending = [];
  for (const img of imgs){
    const {key, url} = covKeyUrl(img);
    const hit = covCache.get(key);
    if (hit) covShow(img, hit);
    else pending.push({key, url, img});
  }
  covObserver = new IntersectionObserver(es=>{
    for (const e of es){
      if (!e.isIntersecting) continue;
      covObserver.unobserve(e.target);
      const idx = covQueue.findIndex(q=>q.img===e.target);
      if (idx>0) covQueue.unshift(covQueue.splice(idx,1)[0]);
    }
    covPump();
  }, {rootMargin:'900px'});
  for (const p of pending){ covQueue.push(p); covObserver.observe(p.img); }
  covPump();
}
/* ---------- scroll infini ---------- */
let endObserver = null;
function attachInfinite(fn){
  if (endObserver) endObserver.disconnect();
  const s = document.getElementById('scroll-sentinel');
  if (!s) return;
  endObserver = new IntersectionObserver(es=>{
    if (es.some(e=>e.isIntersecting)){ endObserver.disconnect(); fn(); }
  }, {rootMargin:'600px'});
  endObserver.observe(s);
}
function sentinel(remaining){
  return remaining>0 ? `<div id="scroll-sentinel" class="empty" style="padding:18px">${T('Chargement…')} (${fmtFull(remaining)} ${T('restantes')})</div>` : '';
}

function fmtTs(ts){
  const m = (''+ts).match(/^(\d{4})-(\d{2})-(\d{2})(?: (\d{2}:\d{2}))?/);
  if (!m) return ts;
  if (LANG==='fr') return m[3]+'/'+m[2]+'/'+m[1] + (m[4] ? ' à '+m[4] : '');
  return m[2]+'/'+m[3]+'/'+m[1] + (m[4] ? ', '+m[4] : '');
}
function updateFooter(){
  document.getElementById('sync-txt').innerHTML =
    T('Dernier scan le')+' '+esc(fmtTs(D.ts||D.t))+'<br>'+fmtFull(R.length)+' tracks · '+AG.filter(g=>g.done).length+' '+T('artistes scannés');
}
function applyLang(){
  document.querySelectorAll('#nav [data-fr]').forEach(el=>{
    if (el.classList.contains('nav-label')){ el.textContent = T(el.dataset.fr); return; }
    for (const n of el.childNodes){
      if (n.nodeType===3 && n.nodeValue.trim()){ n.nodeValue = T(el.dataset.fr); break; }
    }
  });
  document.getElementById('lang-btn').textContent = LANG==='fr' ? '🇬🇧 EN' : '🇫🇷 FR';
  document.documentElement.lang = LANG;
  updateFooter(); render();
}
document.getElementById('lang-btn').addEventListener('click', ()=>{
  LANG = LANG==='fr' ? 'en' : 'fr';
  try{ localStorage.setItem('sr_lang', LANG); }catch(e){}
  applyLang();
});
