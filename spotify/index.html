<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Spotify Radar — Veille Artistes & Catalogue</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='42' fill='%231ed760'/><circle cx='50' cy='50' r='16' fill='%2307080d'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="../Spotify_Radar_data.js"></script>
<style>
:root{
  --bg:#07080d; --bg2:#0b0d15; --panel:#10131e; --panel2:#141828; --card:#12152233;
  --border:rgba(150,214,170,.10); --border2:rgba(150,214,170,.22);
  --text:#eceef8; --muted:#9aa1c0; --dim:#5d6485;
  --acc:#1ed760; --acc2:#4ade80; --accSoft:rgba(30,215,96,.12);
  --green:#4ade80; --amber:#fbbf24; --red:#fb7185; --cyan:#86efac; --blue:#7dd3fc; --violet:#a78bfa;
  --r:16px; --sidebar:238px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scrollbar-color:#243a2c var(--bg)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#1f2e26;border-radius:8px;border:2px solid var(--bg)}
::-webkit-scrollbar-track{background:transparent}
body{
  font-family:'Inter',system-ui,sans-serif;font-size:14px;color:var(--text);
  background:
    radial-gradient(1100px 700px at 88% -12%, rgba(30,215,96,.07), transparent 62%),
    radial-gradient(900px 650px at -8% 108%, rgba(56,189,248,.05), transparent 60%),
    var(--bg);
  background-attachment:fixed;min-height:100vh;
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.chip,.pal button,.nav button,.btn-back,.lang-switch button,.acard,.top-row,.btn-more,.offer .ob{transition:transform .13s cubic-bezier(.34,1.56,.64,1),background .15s,border-color .15s,box-shadow .15s,color .15s}
.chip:active,.pal button:active,.nav button:active,.btn-back:active,.lang-switch button:active,.btn-more:active{transform:scale(.94)}
.top-row:active{transform:scale(.995)}
.tk,.ar{transition:color .12s}
input,select{font-family:inherit;color:var(--text)}

/* ---------- Sidebar ---------- */
#sidebar{
  position:fixed;inset:0 auto 0 0;width:var(--sidebar);z-index:40;
  background:linear-gradient(180deg, rgba(18,26,21,.92), rgba(11,13,21,.92));
  border-right:1px solid var(--border);backdrop-filter:blur(14px);
  display:flex;flex-direction:column;padding:22px 14px 16px;
}
.logo{display:flex;align-items:center;gap:11px;padding:2px 8px 20px}
.logo .mark{
  width:38px;height:38px;border-radius:12px;flex:none;
  background:linear-gradient(135deg, #1ed760, #14913f);
  display:grid;place-items:center;box-shadow:0 4px 22px rgba(30,215,96,.4);
}
.logo .mark::after{content:'';width:14px;height:14px;border-radius:50%;background:#0a120c;box-shadow:0 0 0 3px rgba(10,18,12,.35)}
.logo h1{font-family:'Sora';font-size:16.5px;font-weight:800;letter-spacing:.4px}
.logo h1 span{background:linear-gradient(90deg,#1ed760,#4ade80);-webkit-background-clip:text;background-clip:text;color:transparent}
.logo small{display:block;font-size:10px;font-weight:500;color:var(--dim);letter-spacing:1.6px;text-transform:uppercase;margin-top:2px}
.nav{display:flex;flex-direction:column;gap:3px;flex:1}
.nav-label{font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--dim);padding:14px 10px 7px;font-weight:600}
.nav button{
  display:flex;align-items:center;gap:11px;padding:9.5px 11px;border-radius:11px;
  color:var(--muted);font-size:13.5px;font-weight:500;text-align:left;width:100%;
  transition:all .16s ease;
}
.nav button:hover{color:var(--text);background:rgba(150,214,170,.06)}
.nav button.active{
  color:#fff;background:linear-gradient(90deg, rgba(30,215,96,.18), rgba(30,215,96,.05));
  box-shadow:inset 0 0 0 1px rgba(30,215,96,.28);
}
.nav button .emo{width:20px;flex:none;font-size:15px;text-align:center;filter:saturate(.85)}
.nav .count{margin-left:auto;font-size:10.5px;font-weight:600;color:var(--dim);background:rgba(150,214,170,.09);padding:2px 7px;border-radius:20px;min-width:26px;text-align:center}
.nav button.active .count{color:var(--acc2);background:rgba(30,215,96,.16)}
.side-foot{border-top:1px solid var(--border);padding-top:13px}
.sync-row{display:flex;align-items:center;gap:8px;padding:0 8px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);flex:none}
.sync-txt{font-size:11px;color:var(--dim);line-height:1.4}

/* ---------- Sélecteur de langue (switch à drapeaux) ---------- */
.lang-switch{
  position:fixed;top:16px;right:22px;z-index:60;
  display:flex;align-items:center;gap:2px;padding:3px;border-radius:22px;
  background:linear-gradient(160deg,var(--panel),var(--bg2));border:1px solid var(--border);
  box-shadow:0 4px 16px rgba(0,0,0,.28);
}
.lang-switch button{
  display:flex;align-items:center;gap:6px;padding:6px 13px;border-radius:18px;
  font-size:12.5px;font-weight:700;color:var(--dim);transition:all .18s;line-height:1;
}
.lang-switch button .fl{font-size:15px}
.lang-switch button.on{color:#052e12;background:linear-gradient(90deg,#1ed760,#4ade80);box-shadow:0 2px 8px rgba(30,215,96,.35)}
.lang-switch button:not(.on):hover{color:var(--text)}

/* ---------- Main ---------- */
#main{margin-left:var(--sidebar);padding:26px 30px 60px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.page-head h2{font-family:'Sora';font-size:22px;font-weight:700}
.page-head p{color:var(--muted);font-size:13px;margin-top:4px;max-width:760px;line-height:1.5}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(178px,1fr));gap:12px;margin-bottom:22px}
.kpi{background:linear-gradient(160deg,var(--panel),var(--bg2));border:1px solid var(--border);border-radius:var(--r);padding:16px 17px}
.kpi .lbl{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim);font-weight:600}
.kpi .val{font-family:'Sora';font-size:25px;font-weight:800;margin-top:7px}
.kpi .sub{font-size:11.5px;color:var(--muted);margin-top:4px}
.kpi.hl .val{color:var(--acc2)}

/* Panels / cards */
.panel{background:linear-gradient(160deg,var(--panel),var(--bg2));border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:18px}
.panel h3{font-family:'Sora';font-size:14.5px;font-weight:700;margin-bottom:13px;display:flex;align-items:center;gap:8px}
.panel h3 .hint{font-family:'Inter';font-weight:500;font-size:11.5px;color:var(--dim);margin-left:auto}
.grid2{display:grid;grid-template-columns:1.25fr .75fr;gap:18px}
@media(max-width:1100px){.grid2{grid-template-columns:1fr}}

/* Top artistes (vue d'ensemble, liste verticale) */
.top-row{display:flex;align-items:center;gap:14px;padding:10px 8px;border-bottom:1px solid rgba(150,214,170,.05);cursor:pointer;border-radius:12px;transition:background .13s}
.top-row:hover{background:rgba(150,214,170,.05)}
.top-row .rank{width:26px;text-align:center;font-family:'Sora';font-weight:700;font-size:14px;color:var(--dim);flex:none}
.av-sm{width:46px;height:46px;border-radius:50%;position:relative;overflow:hidden;display:grid;place-items:center;font-family:'Sora';font-weight:700;font-size:16px;color:#052e12;background:linear-gradient(135deg,#4ade80,#67e8f9);flex:none}
.top-row .ti{flex:1;min-width:0}
.top-row .nm{font-weight:700;font-size:14px;display:flex;align-items:center;gap:18px}
.top-row .nm .nmtxt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.top-row .nm .badge{margin-left:auto;flex:none}
.top-row .sub{font-size:11.5px;color:var(--muted);margin:4px 0 6px}
.top-row .vals{text-align:right;flex:none}
.top-row .v1{font-family:'Sora';font-weight:800;font-size:16.5px}
.top-row .v2{font-size:9.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.9px;margin-top:1px}
.year-wrap{display:flex;align-items:flex-end;gap:6px;height:120px;padding-top:8px}
.ybar{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0}
.ybar .b{width:100%;border-radius:5px 5px 2px 2px;background:linear-gradient(180deg,#1ed760,#14532d)}
.ybar .y{font-size:9.5px;color:var(--dim);white-space:nowrap}
.split{display:flex;height:14px;border-radius:8px;overflow:hidden;margin:8px 0 10px}
.split .s1{background:linear-gradient(90deg,#15803d,#4ade80)}
.split .s2{background:linear-gradient(90deg,#b45309,#fbbf24)}
.legend{display:flex;gap:16px;font-size:12px;color:var(--muted);flex-wrap:wrap}
.legend .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}

/* Toolbar / filters */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.toolbar input[type=text]{
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8.5px 13px;
  font-size:13px;min-width:230px;outline:none;
}
.toolbar input[type=text]:focus{border-color:var(--border2)}
.toolbar select{
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8.5px 11px;
  font-size:12.5px;outline:none;appearance:auto;
}
.chip{padding:7.5px 13px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--muted);transition:all .14s}
.chip:hover{color:var(--text);border-color:var(--border2)}
.chip.on{color:#052e12;background:linear-gradient(90deg,#1ed760,#4ade80);border-color:transparent}
.chip .fdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:middle}
.btn-back{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:11px;background:linear-gradient(90deg,#1ed760,#4ade80);color:#052e12;font-size:13.5px;font-weight:700;margin-bottom:14px;box-shadow:0 4px 16px rgba(30,215,96,.3);transition:all .15s}
.btn-back:hover{transform:translateX(-2px);box-shadow:0 6px 20px rgba(30,215,96,.42)}
.pb-good{color:#4ade80;font-weight:700}
.pb-mid{color:#fbbf24;font-weight:700}
.pb-bad{color:#fb7185;font-weight:700}
/* Encart offre de rachat (profil artiste) */
.offer{background:linear-gradient(160deg,rgba(30,215,96,.09),var(--bg2));border:1px solid rgba(30,215,96,.25);border-radius:var(--r);padding:18px 20px;margin-bottom:18px}
.offer h3{font-family:'Sora';font-size:14.5px;font-weight:700;margin-bottom:4px}
.offer .osub{font-size:12px;color:var(--muted);margin-bottom:14px}
.offer .ogrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.offer .ob{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 15px}
.offer .ob .l{font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);font-weight:600}
.offer .ob .v{font-family:'Sora';font-size:20px;font-weight:800;margin-top:5px}
.offer .pal{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.offer .pal button{padding:7px 13px;border-radius:10px;border:1px solid var(--border);font-size:12px;font-weight:700;color:var(--muted);transition:all .14s}
.offer .pal button.on{color:#052e12;background:linear-gradient(90deg,#1ed760,#4ade80);border-color:transparent}
.offer .pal button:hover:not(.on){color:var(--text);border-color:var(--border2)}
.toolbar .spacer{flex:1}
.result-count{font-size:12px;color:var(--dim);font-weight:600}

/* Table */
table{width:100%;border-collapse:collapse;font-size:13px}
th{
  text-align:left;font-size:10.5px;letter-spacing:1.1px;text-transform:uppercase;color:var(--dim);
  font-weight:600;padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;
}
th.num,td.num{text-align:right;font-variant-numeric:tabular-nums}
th:hover{color:var(--muted)}
th .arr{color:var(--acc2);font-size:10px}
td{padding:8.5px 10px;border-bottom:1px solid rgba(150,214,170,.05);vertical-align:middle}
tr:hover td{background:rgba(150,214,170,.03)}
tr.hot td{background:rgba(30,215,96,.055)}
tr.hot:hover td{background:rgba(30,215,96,.09)}
td .tk{font-weight:600;color:var(--text)}
td .tk:hover{color:var(--acc2)}
td .ar{color:var(--muted);cursor:pointer}
td .ar:hover{color:var(--acc2)}
td .lb{color:var(--dim);font-size:11.5px;max-width:360px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
td.covtd{width:82px;padding:6px 2px 6px 10px}
.cov{width:68px;height:68px;border-radius:9px;background:linear-gradient(135deg,#1f2e26,#141828);background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.35);flex:none}
.cov::after{content:'♪';color:rgba(150,214,170,.32);font-size:22px}
.cov.has::after{content:none}
.avp{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%;opacity:0;transition:opacity .25s}
.avp.on{opacity:1}
.badge{display:inline-block;padding:2.5px 9px;border-radius:20px;font-size:10.5px;font-weight:700;letter-spacing:.3px;white-space:nowrap}
.badge.self{color:#4ade80;background:rgba(74,222,128,.12);box-shadow:inset 0 0 0 1px rgba(74,222,128,.25)}
.badge.other{color:#fbbf24;background:rgba(251,191,36,.10);box-shadow:inset 0 0 0 1px rgba(251,191,36,.22)}
.badge.new{color:#67e8f9;background:rgba(103,232,249,.10);box-shadow:inset 0 0 0 1px rgba(103,232,249,.25)}
.badge.hot{color:#052e12;background:linear-gradient(90deg,#1ed760,#4ade80)}
.badge.lofi{color:#a78bfa;background:rgba(167,139,250,.12);box-shadow:inset 0 0 0 1px rgba(167,139,250,.25)}
.badge.disco{color:#f9a8d4;background:rgba(249,168,212,.10);box-shadow:inset 0 0 0 1px rgba(249,168,212,.25)}
.badge.seg-top{color:#fb923c;background:rgba(251,146,60,.14);box-shadow:inset 0 0 0 1px rgba(251,146,60,.4)}
.badge.seg-reg{color:#a78bfa;background:rgba(167,139,250,.14);box-shadow:inset 0 0 0 1px rgba(167,139,250,.4)}
.badge.seg-occ{color:#60a5fa;background:rgba(37,99,235,.18);box-shadow:inset 0 0 0 1px rgba(59,130,246,.45)}
.badge.seg-ext{color:#fb7185;background:rgba(251,113,133,.12);box-shadow:inset 0 0 0 1px rgba(251,113,133,.32)}
td.selc,th.selc{width:44px;padding-left:14px}
.ck{appearance:none;-webkit-appearance:none;width:26px;height:26px;border-radius:7px;border:1.5px solid var(--border2);background:rgba(150,214,170,.05);cursor:pointer;position:relative;transition:transform .12s ease,border-color .13s,background .13s;vertical-align:middle;flex:none}
.ck:hover{border-color:#4ade80}
.ck:active{transform:scale(.86)}
.ck:checked{background:linear-gradient(135deg,#1ed760,#4ade80);border-color:transparent}
.ck:checked::after{content:'';position:absolute;left:9px;top:4px;width:5px;height:12px;border:solid #052e12;border-width:0 2.6px 2.6px 0;transform:rotate(45deg)}
.selall{display:flex;align-items:center;gap:9px;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;user-select:none}
.tmodal{position:fixed;inset:0;z-index:80;background:rgba(5,6,10,.72);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:24px}
.tmbox{background:linear-gradient(160deg,var(--panel),var(--bg2));border:1px solid var(--border2);border-radius:18px;max-width:640px;width:100%;max-height:88vh;overflow:auto;padding:22px 24px;box-shadow:0 24px 60px rgba(0,0,0,.6)}
.tmbox .thd{display:flex;gap:15px;align-items:center;margin-bottom:16px}
.tmbox .tcov{width:76px;height:76px;border-radius:10px;background-size:cover;background-position:center;background-color:#1f2e26;flex:none}
.tmbox h3{font-family:'Sora';font-size:18px;font-weight:800;line-height:1.2}
.tmbox .tar{color:var(--muted);font-size:13px;margin-top:3px;cursor:pointer}
.tmbox .tclose{margin-left:auto;background:none;border:none;color:var(--dim);font-size:22px;cursor:pointer;align-self:flex-start}
.tmbox .tgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.tmbox .tg{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px 13px}
.tmbox .tg .l{font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--dim);font-weight:600}
.tmbox .tg .v{font-family:'Sora';font-weight:700;font-size:16px;margin-top:4px}
.spark{margin-top:6px}
.tmbox .tnote{font-size:11px;color:var(--dim);margin-top:12px;line-height:1.5}
.wl-star{background:none;border:none;color:#fbbf24;font-size:20px;cursor:pointer;padding:0 4px;line-height:1;vertical-align:middle;opacity:.55;transition:opacity .12s,transform .12s ease}
.wl-star:hover{opacity:1}
.wl-star:active{transform:scale(1.3)}
.wl-star.on{opacity:1}
.acard .wl-star{position:absolute;top:12px;right:12px;font-size:22px}
@keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.35)}100%{transform:scale(1)}}
.wl-star.pop{animation:pop .28s ease}
.more-wrap{text-align:center;padding:16px 0 4px}
.btn-more{
  padding:9px 22px;border-radius:11px;border:1px solid var(--border2);font-size:12.5px;font-weight:600;
  color:var(--muted);transition:all .15s;
}
.btn-more:hover{color:var(--text);background:rgba(150,214,170,.06)}
.empty{padding:40px 10px;text-align:center;color:var(--dim);font-size:13px;line-height:1.7}

/* Artistes cards */
.acards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:13px}
.acard{
  background:linear-gradient(160deg,var(--panel),var(--bg2));border:1px solid var(--border);
  border-radius:var(--r);padding:15px 17px;cursor:pointer;transition:all .15s;position:relative;
}
.acard:hover{border-color:var(--border2);transform:translateY(-1px)}
.acard .top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.acard .av{
  width:46px;height:46px;border-radius:50%;flex:none;display:grid;place-items:center;
  font-family:'Sora';font-weight:700;font-size:16px;color:#052e12;
  background:linear-gradient(135deg,#4ade80,#67e8f9);
  position:relative;overflow:hidden;
}
.acard .nm{font-weight:700;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acard .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:9px}
.acard .st .v{font-family:'Sora';font-weight:700;font-size:15.5px}
.acard .st .l{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.acard .foot{display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-size:11px;color:var(--dim)}
.mini-split{height:6px;border-radius:4px;overflow:hidden;display:flex;margin:4px 0 9px}

/* Découverte */
.steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:13px;margin-top:6px}
.step{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px 16px}
.step .n{
  width:26px;height:26px;border-radius:9px;display:grid;place-items:center;font-family:'Sora';
  font-weight:700;font-size:13px;color:#052e12;background:linear-gradient(135deg,#1ed760,#67e8f9);margin-bottom:10px;
}
.step b{font-size:13px;display:block;margin-bottom:5px}
.step p{font-size:12px;color:var(--muted);line-height:1.55}

@media(max-width:860px){
  #sidebar{position:sticky;top:0;width:auto;flex-direction:row;align-items:center;gap:3px;padding:9px 10px;overflow-x:auto;z-index:50}
  #sidebar::-webkit-scrollbar{height:0}
  .logo{padding:0 10px 0 2px;flex:none}
  .logo small{display:none}
  .logo .mark{width:32px;height:32px}
  .logo h1{font-size:15px}
  .nav{flex-direction:row;gap:2px;flex:1 1 auto}
  .nav-label{display:none}
  .nav button{padding:8px 11px;white-space:nowrap}
  .nav .count{display:none}
  .side-foot{display:none}
  #main{margin-left:0;padding:16px 12px 60px;max-width:100%}
  .lang-switch{top:auto;bottom:14px;right:14px;box-shadow:0 6px 22px rgba(0,0,0,.55)}
  .page-head h2{font-size:19px}
  .page-head p{font-size:12.5px}
  .kpis{grid-template-columns:repeat(2,1fr);gap:9px}
  .kpi{padding:13px 14px}

  "Base : revenu 24 mois projeté (vélocité × 0,0035$/stream, +20% Apple Music & autres plateformes) → EUR ×0,875, −8% Orchard, −12% coûts, −15% décote. Grille du modèle LOFI RECORDS. Publishing = +10% sur l'avance. Coche des tracks pour simuler. Estimation indicative, hors CIPP.":"Base: projected 24-month revenue (velocity × $0.0035/stream, +20% Apple Music & other platforms) → EUR ×0.875, −8% Orchard, −12% costs, −15% haircut. LOFI RECORDS grid. Publishing = +10% on the advance. Tick tracks to simulate. Indicative estimate, excl. CIPP."
};
const T = s => LANG === 'fr' ? s : (EN_MAP[s] !== undefined ? EN_MAP[s] : s);
const HOT = 500000;                       // seuil de mise en évidence
const RATE = 0.0035;                      // $/stream Spotify all-in (Duetti/Loud&Clear 2025-26, fourchette 0.003-0.005)
const TODAY = new Date(D.t + 'T00:00:00');
function money(n){
  if (n==null||n<0) return '?';
  if (n>=1e6) return '$'+(n/1e6).toFixed(n>=1e7?0:1)+'M';
  if (n>=1e3) return '$'+Math.round(n/1e3)+'k';
  return '$'+Math.round(n);
}
function eur(n){
  if (n==null||n<0) return '?';
  if (n>=1e6) return (n/1e6).toFixed(n>=1e7?0:1)+'M€';
  if (n>=1e3) return Math.round(n/1e3)+'k€';
  return Math.round(n)+'€';
}

/* ---------- Modèle de rachat (repris de l'Excel LOFI RECORDS, vDEF 24/06/2026) ---------- */
const BUY = {
  fx: 0.875,          // USD -> EUR
  orchard: 0.08,      // commission Orchard
  costs: 0.12,        // coûts directs
  decote: 0.15,       // décote prudentielle (projection de revenus futurs)
  multiPlat: 0.20,    // uplift Apple Music + autres plateformes (~+20% vs data Spotify seule)
  publishing: 0.10,   // surcoût si on rachète aussi le publishing (option)
  // paliers : clé = "part artiste / part label", adv = avance en % de la base
  paliers: [
    {k:'60/40',  artist:0.60, adv:0.40},
    {k:'70/30',  artist:0.30, adv:0.50},
    {k:'80/20',  artist:0.20, adv:0.60},
    {k:'90/10',  artist:0.10, adv:0.75},
    {k:'100/0',  artist:0.00, adv:1.10},
  ],
};
function palier(){ return BUY.paliers.find(p=>p.k===S.palier) || BUY.paliers[4]; }
// revenu 24 mois projeté (USD) depuis la vélocité de streams Spotify, majoré multi-plateformes
function rev24(monthlyStreams){ return monthlyStreams * 24 * RATE * (1+BUY.multiPlat); }
// base de référence (EUR) nettoyée, comme le calculateur de l'Excel
function baseRef(monthlyStreams){
  const e = rev24(monthlyStreams) * BUY.fx;
  return e * (1-BUY.orchard) * (1-BUY.costs) * (1-BUY.decote);
}
// revenu mensuel net capté par le label (EUR) au palier courant (multi-plateformes inclus)
function labelMonthly(monthlyStreams){
  const p = palier();
  return monthlyStreams * RATE * (1+BUY.multiPlat) * BUY.fx * (1-BUY.orchard) * (1-BUY.costs) * (1-p.artist);
}
// avance (coût de l'offre) EUR au palier courant, +publishing si activé
function advance(monthlyStreams){ return baseRef(monthlyStreams) * palier().adv * (S.publishing?1+BUY.publishing:1); }
// payback en mois
function payback(monthlyStreams){
  const m = labelMonthly(monthlyStreams);
  return m>0 ? advance(monthlyStreams)/m : null;
}
function paybackTxt(months){
  if (months==null) return '—';
  if (months >= 120) return '>10 '+T('ans');
  const y = months/12;
  return y<1 ? Math.round(months)+' '+T('mois') : y.toFixed(1)+' '+T('ans');
}
function paybackClass(months){
  if (months==null) return '';
  if (months<=24) return 'pb-good';
  if (months<=36) return 'pb-mid';
  return 'pb-bad';
}

/* ---------- préparation ---------- */
// artists: [nom, nbLofi, flag, done, disco, origine, seedSrc]
// rows:    [ai, track, date, streams, statut(0 self/1 autre), label, id, firstSeen]
const A = D.artists, R = D.rows;
const AG = A.map((a,i)=>({i, name:a[0], lofi:a[1], flag:a[2], done:a[3], disco:a[4],
  origin:a[5], seedSrc:a[6], id:a[7]||'', img:a[8]||'', email:a[9]||'', link:a[10]||'', n:0, self:0, streams:0, mstreams:0, hot:0, last:'', top:null}));
for (const r of R){
  const g = AG[r[0]];
  g.n++; if (r[4]===0) g.self++;
  if (r[3]>0) g.streams += r[3];
  const pm = perMonth(r); if (pm>0) g.mstreams += pm;
  if (r[3]>=HOT) g.hot++;
  if (r[2] > g.last) g.last = r[2];
  if (!g.top || r[3] > g.top[3]) g.top = r;
}
const withTracks = AG.filter(g=>g.n>0);
const totStreams = withTracks.reduce((s,g)=>s+g.streams,0);
const totMonthlyRev = withTracks.reduce((s,g)=>s+g.mstreams,0)*RATE;
const nHot = R.reduce((s,r)=>s+(r[3]>=HOT?1:0),0);
const nSelf = R.reduce((s,r)=>s+(r[4]===0?1:0),0);

function fmt(n){
  if (n===-1||n==null) return '?';
  if (n>=1e9) return (n/1e9).toFixed(2)+' Md';
  if (n>=1e6) return (n/1e6).toFixed(n>=1e7?0:1)+' M';
  if (n>=1e3) return Math.round(n/1e3)+' k';
  return ''+n;
}
function fmtFull(n){ return n===-1?'?':n.toLocaleString('fr-FR'); }
function monthsSince(d){
  if(!d) return null;
  const days = (TODAY - new Date(d+'T00:00:00'))/864e5;
  return days<0 ? null : Math.max(days/30.4368,1);
}
function perMonth(r){
  const m = monthsSince(r[2]);
  return (m===null||r[3]<0) ? -1 : Math.round(r[3]/m);
}
function daysAgo(d){ return d ? Math.round((TODAY-new Date(d+'T00:00:00'))/864e5) : 1e9; }
function esc(s){ return (''+s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
const trackUrl = id => 'https://open.spotify.com/track/'+id;
const artistSearch = n => 'https://open.spotify.com/search/'+encodeURIComponent(n)+'/artists';

/* ---------- état ---------- */
const S = {
  view:'overview', back:null, palier:'100/0', sel:new Set(), wltab:'tracks', publishing:false,
  q:'', statut:'all', min:0, period:'all', artist:-1, rel:'all',
  sort:{k:3, dir:-1}, shown:100,
  aq:'', asort:'streams', shownA:60, aseg:'all',
  newDays:90, shownN:100, hotAge:24, shownH:60,
};

/* ---------- navigation ---------- */
function syncHash(){ try{ history.replaceState(null,'','#'+S.view); }catch(e){} }
document.getElementById('nav').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  document.querySelectorAll('#nav button').forEach(x=>x.classList.toggle('active', x===b));
  S.view = b.dataset.v; S.shown = 100; S.shownA = 60; S.shownN = 100; S.shownH = 60; S.artist = -1;
  syncHash(); render(); window.scrollTo(0,0);
});
function goArtist(i){
  S.back = {view:S.view, y:window.scrollY};
  S.view='opps'; S.artist=i; S.q=''; S.statut='all'; S.min=0; S.period='all'; S.shown=100; S.sel=new Set();
  document.querySelectorAll('#nav button').forEach(x=>x.classList.toggle('active', x.dataset.v==='opps'));
  syncHash(); render(); window.scrollTo(0,0);
}
function goTab(v){
  S.view = v;
  document.querySelectorAll('#nav button').forEach(x=>x.classList.toggle('active', x.dataset.v===v));
  syncHash(); render(); window.scrollTo(0,0);
}
function goBack(){
  const b = S.back; S.back = null; S.artist = -1; S.shown = 100;
  S.view = b ? b.view : 'opps';
  document.querySelectorAll('#nav button').forEach(x=>x.classList.toggle('active', x.dataset.v===S.view));
  syncHash(); render(); window.scrollTo(0, b ? b.y : 0);
}

/* ---------- filtres opportunités ---------- */
function filteredRows(){
  const q = S.q.trim().toLowerCase();
  let rows = R.filter(r=>{
    if (S.artist>=0 && r[0]!==S.artist) return false;
    if (S.rel!=='all' && seg(AG[r[0]])!==S.rel) return false;
    if (S.statut==='self' && r[4]!==0) return false;
    if (S.statut==='other' && r[4]!==1) return false;
    if (S.min>0 && r[3]<S.min) return false;
    if (S.period!=='all' && daysAgo(r[2]) > +S.period) return false;
    if (q && !(r[1].toLowerCase().includes(q) || A[r[0]][0].toLowerCase().includes(q) || r[5].toLowerCase().includes(q))) return false;
    return true;
  });
  const {k,dir} = S.sort;
  rows.sort((a,b)=>{
    let x,y;
    if (k===0){ x=A[a[0]][0].toLowerCase(); y=A[b[0]][0].toLowerCase(); }
    else if (k===7){ x=perMonth(a); y=perMonth(b); }
    else { x=a[k]; y=b[k]; }
    const c = x<y ? -1 : (x>y ? 1 : 0);
    return c*dir;
  });
  return rows;
}

const HIST = D.hist || {};   // tid -> [[dateISO, playcount], ...] (rempli par la veille)
function sparkline(pts){
  if (!pts || pts.length<2) return '';
  const w=560, h=120, pad=6;
  const xs=pts.map(p=>+new Date(p[0])), ys=pts.map(p=>p[1]);
  const x0=Math.min(...xs), x1=Math.max(...xs), y0=Math.min(...ys), y1=Math.max(...ys);
  const sx=v=>pad+(x1===x0?0:(v-x0)/(x1-x0))*(w-2*pad);
  const sy=v=>h-pad-(y1===y0?0.5*(h-2*pad):(v-y0)/(y1-y0)*(h-2*pad));
  const d=pts.map((p,i)=>(i?'L':'M')+sx(+new Date(p[0])).toFixed(1)+' '+sy(p[1]).toFixed(1)).join(' ');
  const up = ys[ys.length-1]>=ys[0];
  const col = up?'#4ade80':'#fb7185';
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" width="100%" height="120" preserveAspectRatio="none">
    <path d="${d}" fill="none" stroke="${col}" stroke-width="2.5"/>
    <path d="${d} L ${sx(x1)} ${h-pad} L ${sx(x0)} ${h-pad} Z" fill="${col}" opacity="0.12"/>
  </svg>`;
}

function oppScore(r){
  const m = monthsSince(r[2]); if (m===null) return 0;
  const vel = perMonth(r); if (vel<=0) return 0;
  const recency = Math.max(0.2, 1 - m/30);       // favorise le récent
  return vel * recency;
}
function oppLevel(vel){
  if (vel>=300000) return ['🔥 '+T('Très chaud'),'pb-good'];
  if (vel>=100000) return ['🔥 '+T('Chaud'),'pb-good'];
  if (vel>=30000)  return ['↗ '+T('Prometteur'),'pb-mid'];
  return ['· '+T('À suivre'),''];
}

/* ---------- covers (lazy, via oEmbed Spotify, sans clé API) ---------- */
const covCache = new Map();
try{
  const saved = JSON.parse(localStorage.getItem('sr_covs')||'[]');
  for (const [k,v] of saved) covCache.set(k,v);
}catch(e){}
let covSaveTimer = null;
function covPersist(){
  clearTimeout(covSaveTimer);
  covSaveTimer = setTimeout(()=>{
    try{
      const entries = [...covCache.entries()].slice(-4000);
      localStorage.setItem('sr_covs', JSON.stringify(entries));
    }catch(e){}
  }, 1200);
}
function covKeyUrl(img){
  if (img.dataset.tid) return {key:'t'+img.dataset.tid, url:'https://open.spotify.com/track/'+img.dataset.tid};
  return {key:'a'+img.dataset.aid, url:'https://open.spotify.com/artist/'+img.dataset.aid};
}
function covShow(el, u){
  if (!el.isConnected) return;
  if (el.tagName === 'IMG'){
    el.onload = ()=>el.classList.add('on');
    el.src = u; if (el.complete && el.naturalWidth>0) el.classList.add('on');
  } else {
    const im = new Image();
    im.onload = ()=>{ if (el.isConnected){ el.style.backgroundImage = 'url("'+u+'")'; el.classList.add('has'); } };
    im.src = u;
  }
}
const covQueue = []; let covActive = 0;
function covPump(){
  while (covActive < 8 && covQueue.length){
    const {key, url, img} = covQueue.shift();
    if (!img.isConnected) continue;
    covActive++;
    fetch('https://open.spotify.com/oembed?url='+url)
      .then(r=>r.ok?r.json():null)
      .then(j=>{
        const u = j && j.thumbnail_url;
        if (u){ covCache.set(key,u); covPersist(); covShow(img,u); }
      })
      .catch(()=>{})
      .finally(()=>{ covActive--; setTimeout(covPump, 30); });
  }
}
let covObserver = null;
function attachCovers(){
  // préchargement immédiat de TOUTE la liste rendue (cache d'abord, réseau ensuite),
  // l'observer ne sert plus qu'à faire passer en tête de file ce qui approche de l'écran.
  if (covObserver) covObserver.disconnect();
  covQueue.length = 0;
  // covers/avatars avec URL directe (data.js) : affichage immédiat, aucune requête
  document.querySelectorAll('.cov[data-cover], .avp[data-img]').forEach(el=>{
    covShow(el, el.dataset.cover || el.dataset.img);
  });
  const imgs = [...document.querySelectorAll('.cov[data-tid], img.avp[data-tid]')];
  const pending = [];
  for (const img of imgs){
    const {key, url} = covKeyUrl(img);
    const hit = covCache.get(key);
    if (hit) covShow(img, hit);
    else pending.push({key, url, img});
  }
  covObserver = new IntersectionObserver(es=>{
    for (const e of es){
      if (!e.isIntersecting) continue;
      covObserver.unobserve(e.target);
      const idx = covQueue.findIndex(q=>q.img===e.target);
      if (idx>0) covQueue.unshift(covQueue.splice(idx,1)[0]);
    }
    covPump();
  }, {rootMargin:'900px'});
  for (const p of pending){ covQueue.push(p); covObserver.observe(p.img); }
  covPump();
}
/* ---------- scroll infini ---------- */
let endObserver = null;
function attachInfinite(fn){
  if (endObserver) endObserver.disconnect();
  const s = document.getElementById('scroll-sentinel');
  if (!s) return;
  endObserver = new IntersectionObserver(es=>{
    if (es.some(e=>e.isIntersecting)){ endObserver.disconnect(); fn(); }
  }, {rootMargin:'600px'});
  endObserver.observe(s);
}
function sentinel(remaining){
  return remaining>0 ? `<div id="scroll-sentinel" class="empty" style="padding:18px">${T('Chargement…')} (${fmtFull(remaining)} ${T('restantes')})</div>` : '';
}

function renderPlaylists(){
  V.innerHTML = `
  <div class="page-head">
    <div>
      <h2>Playlists <span class="badge new" style="vertical-align:middle">${T('bientôt disponible')}</span></h2>
      <p>${T("Prochain module, en préparation : scan des playlists de nos genres, éditoriales Spotify et indépendantes, avec suivi dans le temps du nombre de followers de chacune. Objectif : repérer ce qui marche (formats, genres, positionnements) pour s'en inspirer, et alimenter la découverte d'artistes.")}</p>
    </div>
  </div>
  <div class="kpis">
    ${kpi(T('Playlists suivies'), '—', T('scan à venir'))}
    ${kpi(T('Éditoriales vs indés'), '—', T('répartition à venir'))}
    ${kpi(T('Followers trackés'), '—', T('évolution hebdomadaire'))}
  </div>
  <div class="panel">
    <h3>${T('Ce que le module fera')}</h3>
    <div class="steps">
      <div class="step"><div class="n">1</div><b>${T('Recensement')}</b><p>${T('Playlists éditoriales Spotify et grosses playlists indépendantes sur nos genres (lofi, ambient, piano, jazz, synthwave…), avec leur curateur et leur taille.')}</p></div>
      <div class="step"><div class="n">2</div><b>${T('Suivi des followers')}</b><p>${T("Relevé régulier du nombre de followers de chaque playlist : courbes d'évolution, croissance hebdo, détection de celles qui explosent.")}</p></div>
      <div class="step"><div class="n">3</div><b>${T('Analyse')}</b><p>${T('Comparaison édito vs indé, genres qui montent, formats qui marchent. De quoi s\'inspirer pour nos propres playlists et le positionnement du label.')}</p></div>
      <div class="step"><div class="n">4</div><b>${T('Synergie découverte')}</b><p>${T('Les artistes présents dans les playlists qui performent alimenteront la file de découverte, en plus des "fans also like".')}</p></div>
    </div>
  </div>`;
}

function render(){
  if (S.view==='overview') renderOverview();
  else if (S.view==='opps') renderOpps();
  else if (S.view==='artists') renderArtists();
  else if (S.view==='hot') renderHot();
  else if (S.view==='disco') renderDisco();
  else if (S.view==='playlists') renderPlaylists();
  else if (S.view==='watch') renderWatch();
  attachCovers();
}

/* ---------- init ---------- */
document.getElementById('c-opps').textContent = fmt(R.length);
document.getElementById('c-art').textContent = withTracks.length;
{ const ch=document.getElementById('c-hot'); if(ch) ch.textContent = R.filter(r=>{const m=monthsSince(r[2]);return r[3]>=1000&&m!==null&&m<=24&&perMonth(r)>0;}).length; }
document.getElementById('c-disco').textContent = AG.filter(g=>g.disco).length;
(function(){ const w=wlGet(); const c=document.getElementById('c-watch'); if(c) c.textContent = (w.t.length+w.a.length)||''; })();
function fmtTs(ts){
  const m = (''+ts).match(/^(\d{4})-(\d{2})-(\d{2})(?: (\d{2}:\d{2}))?/);
  if (!m) return ts;
  if (LANG==='fr') return m[3]+'/'+m[2]+'/'+m[1] + (m[4] ? ' à '+m[4] : '');
  return m[2]+'/'+m[3]+'/'+m[1] + (m[4] ? ', '+m[4] : '');
}
function updateFooter(){
  document.getElementById('sync-txt').innerHTML =
    T('Dernier scan le')+' '+esc(fmtTs(D.ts||D.t))+'<br>'+fmtFull(R.length)+' tracks · '+AG.filter(g=>g.done).length+' '+T('artistes scannés');
}
function applyLang(){
  document.querySelectorAll('#nav [data-fr]').forEach(el=>{
    if (el.classList.contains('nav-label')){ el.textContent = T(el.dataset.fr); return; }
    for (const n of el.childNodes){
      if (n.nodeType===3 && n.nodeValue.trim()){ n.nodeValue = T(el.dataset.fr); break; }
    }
  });
  document.querySelectorAll('#lang-switch button').forEach(b=>b.classList.toggle('on', b.dataset.lang===LANG));
  document.documentElement.lang = LANG;
  updateFooter(); render();
}
document.querySelectorAll('#lang-switch button').forEach(b=>b.addEventListener('click', ()=>{
  if (b.dataset.lang===LANG) return;
  LANG = b.dataset.lang;
  try{ localStorage.setItem('sr_lang', LANG); }catch(e){}
  applyLang();
}));
/* restauration de la vue après F5 (hash d'URL) */
const initV = location.hash.slice(1);
if (['overview','opps','artists','hot','watch','disco','playlists'].includes(initV)){
  S.view = initV;
  document.querySelectorAll('#nav button').forEach(x=>x.classList.toggle('active', x.dataset.v===initV));
}
applyLang();
</script>
