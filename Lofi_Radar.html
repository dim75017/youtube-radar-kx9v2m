<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Lofi Radar â€” YouTube Opportunity Map</title>
<link rel="icon" type="image/jpeg" href="assets/lofi-radar-logo.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="Lofi_Radar_data.js"></script>
<script src="Lofi_Radar_studio.js"></script>
<script src="Lofi_Radar_chx.js"></script>
<script src="Lofi_Radar_seo.js"></script>
<style>
:root{
  --bg:#07080d; --bg2:#0b0d15; --panel:#10131e; --panel2:#141828; --card:#12152233;
  --cardS:#12162399;
  --border:rgba(150,163,214,.11); --border2:rgba(150,163,214,.24);
  --text:#eceef8; --muted:#9aa1c0; --dim:#5d6485;
  --acc:#8b7cf6; --acc2:#a78bfa; --accSoft:rgba(139,124,246,.13);
  --green:#4ade80; --amber:#fbbf24; --red:#fb7185; --cyan:#67e8f9; --blue:#7dd3fc;
  --r:16px;
  --sidebar:238px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scrollbar-color:#2a2f4a var(--bg)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#242942;border-radius:8px;border:2px solid var(--bg)}
::-webkit-scrollbar-track{background:transparent}
body{
  font-family:'Inter',system-ui,sans-serif;font-size:14px;color:var(--text);
  background:
    radial-gradient(1100px 700px at 88% -12%, rgba(139,124,246,.09), transparent 62%),
    radial-gradient(900px 650px at -8% 108%, rgba(56,189,248,.06), transparent 60%),
    var(--bg);
  background-attachment:fixed;
  min-height:100vh;
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;color:var(--text)}

/* ---------- Sidebar ---------- */
#sidebar{
  position:fixed;inset:0 auto 0 0;width:var(--sidebar);z-index:40;
  background:linear-gradient(180deg, rgba(18,21,36,.92), rgba(11,13,21,.92));
  border-right:1px solid var(--border);backdrop-filter:blur(14px);
  display:flex;flex-direction:column;padding:22px 14px 16px;
}
.logo{display:flex;align-items:center;gap:11px;padding:2px 8px 20px}
.logo .mark{
  width:40px;height:40px;border-radius:50%;flex:none;object-fit:cover;
  border:2px solid rgba(255,255,255,.78);box-shadow:0 4px 22px rgba(255,0,51,.32);
}
.logo h1{font-family:'Sora';font-size:15.5px;font-weight:800;letter-spacing:.3px;white-space:nowrap}
.logo h1 span{background:linear-gradient(90deg,var(--acc),var(--acc2));-webkit-background-clip:text;background-clip:text;color:transparent}
.logo small{display:block;font-family:'Inter';font-size:10px;font-weight:500;color:var(--dim);letter-spacing:1.6px;text-transform:uppercase;margin-top:2px}
.nav{display:flex;flex-direction:column;gap:3px;flex:1}
.nav-label{font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--dim);padding:14px 10px 7px;font-weight:600}
.nav button{
  display:flex;align-items:center;gap:11px;padding:9.5px 11px;border-radius:11px;
  color:var(--muted);font-size:13.5px;font-weight:500;text-align:left;width:100%;
  transition:all .16s ease;position:relative;
}
.nav button:hover{color:var(--text);background:rgba(150,163,214,.06)}
.nav button.active{
  color:#fff;background:linear-gradient(90deg, rgba(139,124,246,.20), rgba(139,124,246,.07));
  box-shadow:inset 0 0 0 1px rgba(139,124,246,.28);
}
.nav button.active svg{color:var(--acc2)}
.nav button .emo{width:20px;flex:none;font-size:15px;text-align:center;filter:saturate(.85)}
.nav button svg{width:17px;height:17px;flex:none;color:var(--dim);transition:color .16s}
.nav button:hover svg{color:var(--muted)}
.nav .count{margin-left:auto;font-size:10.5px;font-weight:600;color:var(--dim);background:rgba(150,163,214,.09);padding:2px 7px;border-radius:20px;min-width:26px;text-align:center}
.nav button.active .count{color:var(--acc2);background:rgba(139,124,246,.16)}
.side-foot{border-top:1px solid var(--border);padding-top:13px;display:flex;flex-direction:column;gap:9px}
.sync-row{display:flex;align-items:center;gap:8px;padding:0 8px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);flex:none}
.sync-dot.err{background:var(--red);box-shadow:0 0 8px var(--red)}
.sync-dot.load{background:var(--amber);box-shadow:0 0 8px var(--amber);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.35}}
.sync-txt{font-size:11px;color:var(--dim);line-height:1.35}
.side-foot .btn-refresh{
  display:flex;align-items:center;justify-content:center;gap:7px;padding:8px;border-radius:10px;
  background:rgba(150,163,214,.07);border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--muted);
  transition:all .15s;
}
.side-foot .btn-refresh:hover{color:var(--text);border-color:var(--border2)}
.side-foot .btn-refresh svg{width:13px;height:13px}
.side-foot .btn-refresh.spinning svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sheet-link{font-size:11px;color:var(--dim);text-align:center;transition:color .15s}
.sheet-link:hover{color:var(--acc2)}

/* ---------- Main ---------- */
#main{margin-left:var(--sidebar);min-height:100vh;padding:0 30px 60px}
.topbar{
  position:sticky;top:0;z-index:30;display:flex;align-items:flex-end;justify-content:space-between;gap:20px;
  padding:26px 0 16px;margin-bottom:8px;
  background:linear-gradient(180deg, var(--bg) 62%, transparent);
}
.topbar h2{font-family:'Sora';font-size:24px;font-weight:700;letter-spacing:-.2px;display:flex;align-items:center;gap:11px}
.topbar h2 .pill{font-family:'Inter';font-size:11.5px;font-weight:600;color:var(--acc2);background:var(--accSoft);border:1px solid rgba(139,124,246,.25);padding:3px 10px;border-radius:20px;letter-spacing:.3px}
.topbar .sub{color:var(--muted);font-size:12.5px;margin-top:5px}

/* ---------- Toolbar ---------- */
.toolbar{display:flex;flex-wrap:wrap;align-items:center;justify-content:flex-end;gap:10px;margin:6px 0 18px}
.search{
  display:flex;align-items:center;gap:9px;background:var(--panel);border:1.5px solid var(--border2);
  border-radius:12px;padding:10px 15px;min-width:270px;flex:1;max-width:380px;transition:border .15s,box-shadow .15s;
}
.search:focus-within{border-color:rgba(139,124,246,.6);box-shadow:0 0 0 3px rgba(139,124,246,.14)}
.search svg{width:15px;height:15px;color:var(--muted);flex:none}
.search input{background:none;border:none;outline:none;font-size:13.5px;width:100%;color:var(--text)}
.search input::placeholder{color:var(--muted)}
.search kbd{font-family:'Inter';font-size:10px;color:var(--dim);border:1px solid var(--border);border-radius:5px;padding:1px 6px}
select.ctl, .ctl-btn{
  background:var(--panel);border:1.5px solid var(--border2);border-radius:12px;padding:10px 15px;
  font-size:13px;color:var(--text);outline:none;transition:all .15s;font-weight:600;
}
select.ctl:hover,.ctl-btn:hover{border-color:rgba(139,124,246,.5);color:var(--text)}
select.ctl option{background:#141828;color:var(--text)}
.ctl-btn.on{color:var(--acc2);border-color:rgba(139,124,246,.4);background:var(--accSoft)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{
  display:inline-flex;align-items:center;gap:6px;padding:5.5px 11px;border-radius:20px;font-size:11.5px;font-weight:600;
  background:var(--panel);border:1px solid var(--border);color:var(--muted);transition:all .13s;user-select:none;
}
.chip .dot{width:7px;height:7px;border-radius:50%;flex:none}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.on{color:var(--text);background:var(--chipbg,var(--accSoft));border-color:var(--chipbd,rgba(139,124,246,.45))}
.result-count{font-size:12px;color:var(--dim);white-space:nowrap}
.result-count b{color:var(--muted)}
.viewtoggle{display:flex;background:var(--panel);border:1px solid var(--border);border-radius:11px;overflow:hidden}
.viewtoggle button{padding:8px 11px;color:var(--dim);display:grid;place-items:center}
.viewtoggle button.on{color:var(--acc2);background:var(--accSoft)}
.viewtoggle svg{width:15px;height:15px}

/* ---------- Badges / tags ---------- */
.tag{display:inline-flex;align-items:center;gap:5.5px;font-size:10.8px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;letter-spacing:.2px}
.tag .dot{width:6px;height:6px;border-radius:50%}
.tag.ghost{background:rgba(150,163,214,.08);color:var(--muted)}

/* ---------- Video grid ---------- */
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:16px}
.vcard{
  background:linear-gradient(180deg, rgba(21,25,42,.75), rgba(15,18,30,.75));
  border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;
  transition:transform .18s ease, border-color .18s, box-shadow .18s;display:flex;flex-direction:column;
}
.vcard:hover{transform:translateY(-3px);border-color:rgba(139,124,246,.4);box-shadow:0 14px 34px -14px rgba(0,0,0,.65), 0 0 0 1px rgba(139,124,246,.12)}
.thumbwrap{position:relative;aspect-ratio:16/9;background:#0a0c14;overflow:hidden}
.thumbwrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s ease}
.vcard:hover .thumbwrap img{transform:scale(1.045)}
.thumbwrap .dur{position:absolute;right:8px;bottom:8px;background:rgba(5,6,10,.82);backdrop-filter:blur(4px);color:#fff;font-size:10.5px;font-weight:600;padding:3px 7px;border-radius:6px}
.thumbwrap .like-flag{position:absolute;left:8px;bottom:8px;background:rgba(5,6,10,.82);backdrop-filter:blur(4px);color:#fff;font-size:10.5px;font-weight:600;padding:3px 7px;border-radius:6px}
.thumbwrap .vpm-flag{position:absolute;left:8px;top:8px;background:rgba(5,6,10,.8);backdrop-filter:blur(4px);color:var(--acc2);font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:6px;display:flex;gap:4px;align-items:center}
.vbody{padding:13px 14px 14px;display:flex;flex-direction:column;gap:9px;flex:1}
.vtitle{font-size:13px;font-weight:600;line-height:1.42;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:37px}
.vtitle a:hover{color:var(--acc2)}
.vmeta{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--muted);min-width:0}
.vmeta a{color:var(--muted);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vmeta a:hover{color:var(--cyan)}
.vmeta .subs{color:var(--dim);flex:none}
.vtags{display:flex;flex-wrap:wrap;gap:5px}
.vstats{display:flex;gap:14px;margin-top:auto;padding-top:10px;border-top:1px solid var(--border)}
.vstat{display:flex;flex-direction:column;gap:1px}
.vstat b{font-size:12.5px;font-weight:700;letter-spacing:.2px}
.vstat span{font-size:9.8px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.vstat.hl b{color:var(--acc2)}

/* ---------- Table mode ---------- */
.vtable{width:100%;border-collapse:collapse}
.vtable th{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);font-weight:600;white-space:nowrap}
.vtable td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12.5px;vertical-align:middle}
.vtable tr.row{cursor:pointer;transition:background .12s}
.vtable tr.row:hover{background:rgba(139,124,246,.05)}
.ch-ava{border-radius:50%;position:relative;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;flex:none;overflow:hidden}
.ch-ava img{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;object-fit:cover}
.flg{width:16px;height:12px;border-radius:2px;vertical-align:-1px;margin-right:5px;box-shadow:0 0 0 1px rgba(255,255,255,.08)}
.seg{display:flex;flex-wrap:wrap;gap:9px;margin:2px 0 16px}
.seg button{padding:11px 20px;border-radius:11px;border:1px solid var(--border);background:rgba(21,25,42,.65);color:var(--muted);font-family:inherit;font-weight:600;font-size:13.5px;cursor:pointer;transition:all .15s}
.seg button:hover{border-color:rgba(139,124,246,.5);color:var(--text)}
.seg button.on{background:linear-gradient(135deg,#8b7cf6,#6d5ce6);color:#fff;border-color:transparent;box-shadow:0 6px 18px rgba(139,124,246,.35)}
.seg button .cnt{opacity:.72;font-weight:500;margin-left:7px;font-size:12px}
.pbar{height:8px;border-radius:5px;background:rgba(255,255,255,.07);overflow:hidden;flex:1;min-width:90px}
.pbar i{display:block;height:100%;border-radius:5px}
.ana-card{background:linear-gradient(180deg, rgba(21,25,42,.75), rgba(15,18,30,.75));border:1px solid var(--border);border-radius:var(--r);padding:15px 16px;display:flex;gap:15px;margin-bottom:11px;cursor:pointer;transition:border-color .15s,transform .15s;align-items:center}
.ana-card:hover{border-color:rgba(139,124,246,.45);transform:translateY(-1px)}
.ana-card img{width:132px;aspect-ratio:16/9;border-radius:9px;object-fit:cover;flex:none;background:#0a0c14}
.verdict{font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:7px;letter-spacing:.6px;text-transform:uppercase;white-space:nowrap}
.v-over{background:#34d39922;color:#34d399;border:1px solid #34d39955}
.v-inline{background:#fbbf2422;color:#fbbf24;border:1px solid #fbbf2455}
.v-under{background:#f8717122;color:#f87171;border:1px solid #f8717155}
.v-early{background:#94a3b822;color:#94a3b8;border:1px solid #94a3b855}
#nav button.nsmall{margin-top:auto;opacity:.55;font-size:11px;padding:6px 12px}
#nav button.nsmall .emo{font-size:12px}
#nav button.nsmall.active{opacity:1}
#lang-btn{position:fixed;top:14px;right:18px;z-index:60;display:flex;align-items:center;gap:8px;padding:10px;border-radius:999px;border:1px solid var(--border);background:rgba(15,18,30,.88);backdrop-filter:blur(8px);cursor:pointer;user-select:none}
#lang-btn:hover{border-color:rgba(139,124,246,.5)}
#lang-btn .lg-slide{position:absolute;top:10px;left:10px;width:90px;height:65px;border-radius:999px;background:rgba(139,124,246,.28);border:1px solid rgba(139,124,246,.6);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:1}
#lang-btn.fr .lg-slide{transform:translateX(98px)}
#lang-btn .lg-opt{position:relative;z-index:2;width:90px;height:65px;display:grid;place-items:center;border-radius:999px;opacity:.4;filter:saturate(.5);transition:opacity .2s,filter .2s}
#lang-btn .lg-opt.on{opacity:1;filter:none}
#lang-btn img{width:50px;height:38px;border-radius:6px;box-shadow:0 0 0 1px rgba(255,255,255,.12)}
.wl-star{position:absolute;right:9px;top:9px;z-index:5;background:rgba(5,6,10,.75);border:1px solid var(--border);border-radius:8px;color:#fbbf24;font-size:19px;width:27px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(4px)}
.wl-star:hover{border-color:#fbbf2466}
.wl-star.inline{position:static;width:26px;height:24px;font-size:13px;margin-left:4px}
.dash-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:14px;margin-top:14px}
.vtable .tthumb{width:86px;aspect-ratio:16/9;border-radius:7px;object-fit:cover;display:block;background:#0a0c14}
.vtable .ttitle{font-weight:600;max-width:420px;line-height:1.4}
.vtable .num{font-variant-numeric:tabular-nums;white-space:nowrap}
.vtable .vpmcell{color:var(--acc2);font-weight:700}

.load-more{display:block;margin:26px auto 0;padding:10px 26px;border-radius:12px;background:var(--accSoft);border:1px solid rgba(139,124,246,.3);color:var(--acc2);font-weight:600;font-size:13px;transition:all .15s}
.load-more:hover{background:rgba(139,124,246,.22)}
.load-more{opacity:.6}

/* ---------- Dashboard ---------- */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:13px;margin-bottom:22px}
.kpi{background:linear-gradient(180deg, rgba(21,25,42,.8), rgba(15,18,30,.8));border:1px solid var(--border);border-radius:var(--r);padding:16px 17px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;inset:0 0 auto;height:2px;background:linear-gradient(90deg,var(--kc,#8b7cf6),transparent 75%);opacity:.85}
.kpi .k-lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:1.3px;color:var(--dim);font-weight:600;margin-bottom:8px}
.kpi .k-val{font-family:'Sora';font-size:25px;font-weight:700;letter-spacing:-.5px}
.kpi .k-sub{font-size:11px;color:var(--muted);margin-top:4px}
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px}
@media(max-width:1250px){.dash-grid{grid-template-columns:1fr}}
.psub{font-size:10.5px;color:var(--dim);margin:-10px 0 13px;line-height:1.4}
.panel{background:linear-gradient(180deg, rgba(21,25,42,.7), rgba(15,18,30,.7));border:1px solid var(--border);border-radius:var(--r);padding:18px 19px}
.panel h3{font-family:'Sora';font-size:13.5px;font-weight:600;margin-bottom:15px;display:flex;align-items:center;justify-content:space-between}
.panel h3 .link{font-family:'Inter';font-size:11.5px;color:var(--acc2);font-weight:600;cursor:pointer}
.panel h3 .link:hover{text-decoration:underline}
.hbar{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.hbar .lbl{width:128px;flex:none;font-size:11.5px;color:var(--muted);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar .track{flex:1;height:19px;background:rgba(150,163,214,.05);border-radius:6px;overflow:hidden}
.hbar .fill{height:100%;border-radius:6px;min-width:2px;transition:width .6s ease;background:var(--bc,#8b7cf6);opacity:.8}
.hbar .val{width:44px;font-size:11px;color:var(--dim);font-variant-numeric:tabular-nums}
.chartp{display:flex;flex-direction:column}
.vchart{height:clamp(190px, calc(100vh - 580px), 400px);display:flex;align-items:stretch;gap:6px;padding-top:6px}
.vcol{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:7px}
.vbar{width:min(100%,40px);height:calc((100% - 50px)*var(--f));min-height:3px;border-radius:10px 10px 5px 5px;opacity:.88;transition:opacity .15s}
.vcol:hover .vbar{opacity:1}
.vval{font-size:10px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums}
.vlbl{font-size:9px;font-weight:600;color:var(--dim);max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.3px}
.mini-list{display:flex;flex-direction:column;gap:4px}
.mini-item{display:flex;align-items:center;gap:12px;padding:8px;border-radius:11px;cursor:pointer;transition:background .12s}
.mini-item:hover{background:rgba(139,124,246,.06)}
.mini-item img{width:92px;aspect-ratio:16/9;object-fit:cover;border-radius:8px;flex:none;background:#0a0c14}
.mini-item .ch-ava img{position:absolute;inset:0;width:100%;height:100%;aspect-ratio:1/1;object-fit:cover;border-radius:50%}
.mini-item .mi-t{font-size:12.3px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.mini-item .mi-s{font-size:11px;color:var(--dim);margin-top:3px;display:flex;gap:8px;align-items:center}
.mini-item .mi-s b{color:var(--acc2)}
.dash-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
@media(max-width:1500px){.dash-3{grid-template-columns:1fr 1fr}}
@media(max-width:1150px){.dash-grid,.dash-3{grid-template-columns:1fr}}
.rm-mini{display:flex;align-items:center;gap:10px;padding:7.5px 8px;border-radius:10px;border-left:3px solid var(--gc,#666);background:rgba(150,163,214,.035);margin-bottom:6px}
.rm-mini .d{font-size:10.5px;color:var(--dim);font-weight:600;width:56px;flex:none;font-variant-numeric:tabular-nums}
.rm-mini .t{font-size:12px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ---------- Recos ---------- */
