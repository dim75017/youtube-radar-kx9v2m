<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Lofi Radar — YouTube Veille</title>
<link rel="icon" type="image/png" href="assets/lofi-radar-favicon.png">
<script type="speculationrules">
{"prerender":[{"source":"list","urls":["spotify/"],"eagerness":"immediate"}]}
</script>
<script>
(()=>{
  window.__RADAR_WAS_PRERENDERED=!!document.prerendering;
  if(!(HTMLScriptElement.supports&&HTMLScriptElement.supports('speculationrules'))){
    ['spotify/','Spotify_Radar_data.js','Spotify_Playlists_data.js','Spotify_Labels_data.js','Spotify_Soundcharts_data_20260720T0217_editorial_strict.js?v=0217editorialstrict'].forEach(href=>{
      const hint=document.createElement('link');
      hint.rel='prefetch';hint.href=href;if(/\.js(?:\?|$)/.test(href))hint.as='script';
      document.head.appendChild(hint);
    });
  }
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
/* Always fetch the snapshot fresh. GitHub Pages and a previous script tag may
   otherwise keep an old radar timestamp in the browser cache. */
window.__radarDataReady=fetch('Lofi_Radar_data.js?payload='+Date.now(),{cache:'no-store'})
  .then(r=>{if(!r.ok)throw new Error('Snapshot HTTP '+r.status);return r.text();})
  .then(src=>{Function(src)();return window.LOFI_DATA;});
</script>
<script src="Lofi_Radar_channel_avatars.js"></script>
<script src="Lofi_Radar_new_channel_avatars.js"></script>
<script src="Lofi_Radar_studio.js"></script>
<script src="Lofi_Radar_chx.js"></script>
<script src="Lofi_Radar_subs2.js"></script>
<script src="Lofi_Radar_cmt.js"></script>
<script src="Lofi_Radar_sbm.js"></script>
<script src="Lofi_Radar_seo.js"></script>
<link rel="stylesheet" href="assets/css/dashboard.css">
</head>
<body>
<div id="loader"><div class="loader-in">
  <img class="loader-mark" src="assets/lofi-radar-logo.jpg" alt="Lofi Radar">
  <h2>Lofi Radar</h2>
  <p id="loader-msg">Synchronizing YouTube Veille…</p>
</div></div>

<button id="burger" onclick="document.getElementById('sidebar').classList.toggle('open');document.getElementById('side-veil').classList.toggle('show')">☰</button>
<div id="side-veil" onclick="document.getElementById('sidebar').classList.remove('open');this.classList.remove('show')"></div>
<aside id="sidebar">
  <div class="logo">
    <img class="mark" src="assets/lofi-radar-logo.jpg" alt="Lofi Radar">
    <div><h1>Lofi <span>Radar</span><small>YouTube Veille</small></h1></div>
  </div>
  <div class="radar-switch" aria-label="Switch radar">
    <a class="yt on" href="./" aria-current="page" aria-label="Lofi Radar · YouTube" title="Lofi Radar · YouTube">YouTube</a><a class="sp" href="spotify/" aria-label="Lofi Radar · Spotify" title="Lofi Radar · Spotify">Spotify</a>
  </div>
  <nav class="nav" id="nav"></nav>
  <div class="side-foot">
    <div class="sync-row"><div class="sync-dot load" id="sync-dot"></div><div class="sync-txt" id="sync-txt">Connecting…</div></div>
    <button class="btn-refresh" id="btn-refresh" onclick="refresh()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-2.6-6.4M21 3v6h-6"/></svg>
      <span class="lbl">Sync now</span>
    </button>
    <a class="sheet-link" href="https://docs.google.com/spreadsheets/d/1XE_M9pQWn8w2Qu83vV_tv9sEFDFQ13fTePseG6mh1vI/edit" target="_blank">Open Google Sheet ↗</a>
  </div>
</aside>

<main id="main">
  <div class="topbar"><div><h2 id="view-title">Dashboard</h2><div class="sub" id="view-sub"></div></div></div>
  <div id="view"></div>
</main>

<div id="backdrop" onclick="closeDrawer()"></div>
<div id="drawer"></div>
<div id="sched-backdrop" onclick="closeSchedPopup()"></div>
<div id="sched-modal"></div>

<!-- Versioned assets avoid a stale dashboard after a GitHub Pages deployment. -->
<script src="assets/js/dashboard-01-config.js?v=20260723-2"></script>
<script src="assets/js/dashboard-02-helpers.js?v=20260723-2"></script>
<script src="assets/js/dashboard-03-keywords.js?v=20260723-2"></script>
<script src="assets/js/dashboard-04-recommendations.js?v=20260723-2"></script>
</body>
</html>
