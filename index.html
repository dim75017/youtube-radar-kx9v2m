<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>YouTube Radar — Lofi Girl Opportunity Map</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='42' fill='%23ff0033'/><circle cx='50' cy='50' r='16' fill='%2307080d'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="Lofi_Radar_data.js"></script>
<script src="Lofi_Radar_studio.js"></script>
<script src="Lofi_Radar_chx.js"></script>
<style>
:root{
  --bg:#07080d; --bg2:#0b0d15; --panel:#10131e; --panel2:#141828; --card:#12152233;
  --cardS:#12162399;
  --border:rgba(150,163,214,.11); --border2:rgba(150,163,214,.24);
  --text:#eceef8; --muted:#9aa1c0; --dim:#5d6485;
  --acc:#8b7cf6; --acc2:#a78bfa; --accSoft:rgba(139,124,246,.13);
  --green:#4ade80; --amber:#fbbf24; --red:#fb7185; --cyan:#67e8f9; --blue:#7dd3fc;
  --r:16px;
  --sidebar:238px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scrollbar-color:#2a2f4a var(--bg)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#242942;border-radius:8px;border:2px solid var(--bg)}
::-webkit-scrollbar-track{background:transparent}
body{
  font-family:'Inter',system-ui,sans-serif;font-size:14px;color:var(--text);
  background:
    radial-gradient(1100px 700px at 88% -12%, rgba(139,124,246,.09), transparent 62%),
    radial-gradient(900px 650px at -8% 108%, rgba(56,189,248,.06), transparent 60%),
    var(--bg);
  background-attachment:fixed;
  min-height:100vh;
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;color:var(--text)}

/* ---------- Sidebar ---------- */
#sidebar{
  position:fixed;inset:0 auto 0 0;width:var(--sidebar);z-index:40;
  background:linear-gradient(180deg, rgba(18,21,36,.92), rgba(11,13,21,.92));
  border-right:1px solid var(--border);backdrop-filter:blur(14px);
  display:flex;flex-direction:column;padding:22px 14px 16px;
}
.logo{display:flex;align-items:center;gap:11px;padding:2px 8px 20px}
.logo .mark{
  width:38px;height:38px;border-radius:12px;flex:none;
  background:conic-gradient(from 220deg, #ff0033, #ff6a5e, #ff2d55, #ff0033);
  display:grid;place-items:center;box-shadow:0 4px 22px rgba(255,0,51,.45);
}
.logo .mark::after{content:'';width:14px;height:14px;border-radius:50%;background:#0a0b12;box-shadow:0 0 0 3px rgba(10,11,18,.35)}
.logo h1{font-family:'Sora';font-size:16.5px;font-weight:800;letter-spacing:.4px}
.logo h1 span{background:linear-gradient(90deg,#ff4d5e,#ff8a7a);-webkit-background-clip:text;background-clip:text;color:transparent}
.logo small{display:block;font-family:'Inter';font-size:10px;font-weight:500;color:var(--dim);letter-spacing:1.6px;text-transform:uppercase;margin-top:2px}
.nav{display:flex;flex-direction:column;gap:3px;flex:1}
.nav-label{font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--dim);padding:14px 10px 7px;font-weight:600}
.nav button{
  display:flex;align-items:center;gap:11px;padding:9.5px 11px;border-radius:11px;
  color:var(--muted);font-size:13.5px;font-weight:500;text-align:left;width:100%;
  transition:all .16s ease;position:relative;
}
.nav button:hover{color:var(--text);background:rgba(150,163,214,.06)}
.nav button.active{
  color:#fff;background:linear-gradient(90deg, rgba(139,124,246,.20), rgba(139,124,246,.07));
  box-shadow:inset 0 0 0 1px rgba(139,124,246,.28);
}
.nav button.active svg{color:var(--acc2)}
.nav button .emo{width:20px;flex:none;font-size:15px;text-align:center;filter:saturate(.85)}
.nav button svg{width:17px;height:17px;flex:none;color:var(--dim);transition:color .16s}
.nav button:hover svg{color:var(--muted)}
.nav .count{margin-left:auto;font-size:10.5px;font-weight:600;color:var(--dim);background:rgba(150,163,214,.09);padding:2px 7px;border-radius:20px;min-width:26px;text-align:center}
.nav button.active .count{color:var(--acc2);background:rgba(139,124,246,.16)}
.side-foot{border-top:1px solid var(--border);padding-top:13px;display:flex;flex-direction:column;gap:9px}
.sync-row{display:flex;align-items:center;gap:8px;padding:0 8px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);flex:none}
.sync-dot.err{background:var(--red);box-shadow:0 0 8px var(--red)}
.sync-dot.load{background:var(--amber);box-shadow:0 0 8px var(--amber);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.35}}
.sync-txt{font-size:11px;color:var(--dim);line-height:1.35}
.side-foot .btn-refresh{
  display:flex;align-items:center;justify-content:center;gap:7px;padding:8px;border-radius:10px;
  background:rgba(150,163,214,.07);border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--muted);
  transition:all .15s;
}
.side-foot .btn-refresh:hover{color:var(--text);border-color:var(--border2)}
.side-foot .btn-refresh svg{width:13px;height:13px}
.side-foot .btn-refresh.spinning svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sheet-link{font-size:11px;color:var(--dim);text-align:center;transition:color .15s}
.sheet-link:hover{color:var(--acc2)}

/* ---------- Main ---------- */
#main{margin-left:var(--sidebar);min-height:100vh;padding:0 30px 60px}
.topbar{
  position:sticky;top:0;z-index:30;display:flex;align-items:flex-end;justify-content:space-between;gap:20px;
  padding:26px 0 16px;margin-bottom:8px;
  background:linear-gradient(180deg, var(--bg) 62%, transparent);
}
.topbar h2{font-family:'Sora';font-size:24px;font-weight:700;letter-spacing:-.2px;display:flex;align-items:center;gap:11px}
.topbar h2 .pill{font-family:'Inter';font-size:11.5px;font-weight:600;color:var(--acc2);background:var(--accSoft);border:1px solid rgba(139,124,246,.25);padding:3px 10px;border-radius:20px;letter-spacing:.3px}
.topbar .sub{color:var(--muted);font-size:12.5px;margin-top:5px}

/* ---------- Toolbar ---------- */
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:9px;margin:6px 0 18px}
.search{
  display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--border);
  border-radius:11px;padding:8px 12px;min-width:250px;flex:1;max-width:360px;transition:border .15s;
}
.search:focus-within{border-color:rgba(139,124,246,.45);box-shadow:0 0 0 3px rgba(139,124,246,.08)}
.search svg{width:14px;height:14px;color:var(--dim);flex:none}
.search input{background:none;border:none;outline:none;font-size:13px;width:100%}
.search input::placeholder{color:var(--dim)}
.search kbd{font-family:'Inter';font-size:10px;color:var(--dim);border:1px solid var(--border);border-radius:5px;padding:1px 6px}
select.ctl, .ctl-btn{
  background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:8px 12px;
  font-size:12.5px;color:var(--muted);outline:none;transition:all .15s;font-weight:500;
}
select.ctl:hover,.ctl-btn:hover{border-color:var(--border2);color:var(--text)}
select.ctl option{background:#141828;color:var(--text)}
.ctl-btn.on{color:var(--acc2);border-color:rgba(139,124,246,.4);background:var(--accSoft)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{
  display:inline-flex;align-items:center;gap:6px;padding:5.5px 11px;border-radius:20px;font-size:11.5px;font-weight:600;
  background:var(--panel);border:1px solid var(--border);color:var(--muted);transition:all .13s;user-select:none;
}
.chip .dot{width:7px;height:7px;border-radius:50%;flex:none}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.on{color:var(--text);background:var(--chipbg,var(--accSoft));border-color:var(--chipbd,rgba(139,124,246,.45))}
.result-count{font-size:12px;color:var(--dim);margin-left:auto;white-space:nowrap}
.result-count b{color:var(--muted)}
.viewtoggle{display:flex;background:var(--panel);border:1px solid var(--border);border-radius:11px;overflow:hidden}
.viewtoggle button{padding:8px 11px;color:var(--dim);display:grid;place-items:center}
.viewtoggle button.on{color:var(--acc2);background:var(--accSoft)}
.viewtoggle svg{width:15px;height:15px}

/* ---------- Badges / tags ---------- */
.tag{display:inline-flex;align-items:center;gap:5.5px;font-size:10.8px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;letter-spacing:.2px}
.tag .dot{width:6px;height:6px;border-radius:50%}
.tag.ghost{background:rgba(150,163,214,.08);color:var(--muted)}

/* ---------- Video grid ---------- */
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:16px}
.vcard{
  background:linear-gradient(180deg, rgba(21,25,42,.75), rgba(15,18,30,.75));
  border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;
  transition:transform .18s ease, border-color .18s, box-shadow .18s;display:flex;flex-direction:column;
}
.vcard:hover{transform:translateY(-3px);border-color:rgba(139,124,246,.4);box-shadow:0 14px 34px -14px rgba(0,0,0,.65), 0 0 0 1px rgba(139,124,246,.12)}
.thumbwrap{position:relative;aspect-ratio:16/9;background:#0a0c14;overflow:hidden}
.thumbwrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s ease}
.vcard:hover .thumbwrap img{transform:scale(1.045)}
.thumbwrap .dur{position:absolute;right:8px;bottom:8px;background:rgba(5,6,10,.82);backdrop-filter:blur(4px);color:#fff;font-size:10.5px;font-weight:600;padding:3px 7px;border-radius:6px}
.thumbwrap .like-flag{position:absolute;left:8px;bottom:8px;background:rgba(5,6,10,.82);backdrop-filter:blur(4px);color:#fff;font-size:10.5px;font-weight:600;padding:3px 7px;border-radius:6px}
.thumbwrap .vpm-flag{position:absolute;left:8px;top:8px;background:rgba(5,6,10,.8);backdrop-filter:blur(4px);color:var(--acc2);font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:6px;display:flex;gap:4px;align-items:center}
.vbody{padding:13px 14px 14px;display:flex;flex-direction:column;gap:9px;flex:1}
.vtitle{font-size:13px;font-weight:600;line-height:1.42;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:37px}
.vtitle a:hover{color:var(--acc2)}
.vmeta{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--muted);min-width:0}
.vmeta a{color:var(--muted);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vmeta a:hover{color:var(--cyan)}
.vmeta .subs{color:var(--dim);flex:none}
.vtags{display:flex;flex-wrap:wrap;gap:5px}
.vstats{display:flex;gap:14px;margin-top:auto;padding-top:10px;border-top:1px solid var(--border)}
.vstat{display:flex;flex-direction:column;gap:1px}
.vstat b{font-size:12.5px;font-weight:700;letter-spacing:.2px}
.vstat span{font-size:9.8px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.vstat.hl b{color:var(--acc2)}

/* ---------- Table mode ---------- */
.vtable{width:100%;border-collapse:collapse}
.vtable th{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);font-weight:600;white-space:nowrap}
.vtable td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12.5px;vertical-align:middle}
.vtable tr.row{cursor:pointer;transition:background .12s}
.vtable tr.row:hover{background:rgba(139,124,246,.05)}
.ch-ava{border-radius:50%;position:relative;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;flex:none;overflow:hidden}
.ch-ava img{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;object-fit:cover}
.flg{width:16px;height:12px;border-radius:2px;vertical-align:-1px;margin-right:5px;box-shadow:0 0 0 1px rgba(255,255,255,.08)}
.seg{display:flex;flex-wrap:wrap;gap:9px;margin:2px 0 16px}
.seg button{padding:11px 20px;border-radius:11px;border:1px solid var(--border);background:rgba(21,25,42,.65);color:var(--muted);font-family:inherit;font-weight:600;font-size:13.5px;cursor:pointer;transition:all .15s}
.seg button:hover{border-color:rgba(139,124,246,.5);color:var(--text)}
.seg button.on{background:linear-gradient(135deg,#8b7cf6,#6d5ce6);color:#fff;border-color:transparent;box-shadow:0 6px 18px rgba(139,124,246,.35)}
.seg button .cnt{opacity:.72;font-weight:500;margin-left:7px;font-size:12px}
.pbar{height:8px;border-radius:5px;background:rgba(255,255,255,.07);overflow:hidden;flex:1;min-width:90px}
.pbar i{display:block;height:100%;border-radius:5px}
.ana-card{background:linear-gradient(180deg, rgba(21,25,42,.75), rgba(15,18,30,.75));border:1px solid var(--border);border-radius:var(--r);padding:15px 16px;display:flex;gap:15px;margin-bottom:11px;cursor:pointer;transition:border-color .15s,transform .15s;align-items:center}
.ana-card:hover{border-color:rgba(139,124,246,.45);transform:translateY(-1px)}
.ana-card img{width:132px;aspect-ratio:16/9;border-radius:9px;object-fit:cover;flex:none;background:#0a0c14}
.verdict{font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:7px;letter-spacing:.6px;text-transform:uppercase;white-space:nowrap}
.v-over{background:#34d39922;color:#34d399;border:1px solid #34d39955}
.v-inline{background:#fbbf2422;color:#fbbf24;border:1px solid #fbbf2455}
.v-under{background:#f8717122;color:#f87171;border:1px solid #f8717155}
.v-early{background:#94a3b822;color:#94a3b8;border:1px solid #94a3b855}
#nav button.nsmall{margin-top:auto;opacity:.55;font-size:11px;padding:6px 12px}
#nav button.nsmall .emo{font-size:12px}
#nav button.nsmall.active{opacity:1}
#lang-btn{position:fixed;top:14px;right:18px;z-index:60;display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:10px;border:1px solid var(--border);background:rgba(15,18,30,.85);backdrop-filter:blur(8px);color:var(--muted);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
#lang-btn:hover{border-color:rgba(139,124,246,.5);color:var(--text)}
#lang-btn img{width:18px;height:13px;border-radius:2px}
.wl-star{position:absolute;right:8px;top:8px;z-index:5;background:rgba(5,6,10,.75);border:1px solid var(--border);border-radius:8px;color:#fbbf24;font-size:13px;width:28px;height:26px;cursor:pointer;backdrop-filter:blur(4px)}
.wl-star:hover{border-color:#fbbf2466}
.wl-star.inline{position:static;width:26px;height:24px;margin-left:4px}
.dash-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:14px;margin-top:14px}
.vtable .tthumb{width:86px;aspect-ratio:16/9;border-radius:7px;object-fit:cover;display:block;background:#0a0c14}
.vtable .ttitle{font-weight:600;max-width:420px;line-height:1.4}
.vtable .num{font-variant-numeric:tabular-nums;white-space:nowrap}
.vtable .vpmcell{color:var(--acc2);font-weight:700}

.load-more{display:block;margin:26px auto 0;padding:10px 26px;border-radius:12px;background:var(--accSoft);border:1px solid rgba(139,124,246,.3);color:var(--acc2);font-weight:600;font-size:13px;transition:all .15s}
.load-more:hover{background:rgba(139,124,246,.22)}
.load-more{opacity:.6}

/* ---------- Dashboard ---------- */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:13px;margin-bottom:22px}
.kpi{background:linear-gradient(180deg, rgba(21,25,42,.8), rgba(15,18,30,.8));border:1px solid var(--border);border-radius:var(--r);padding:16px 17px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;inset:0 0 auto;height:2px;background:linear-gradient(90deg,var(--kc,#8b7cf6),transparent 75%);opacity:.85}
.kpi .k-lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:1.3px;color:var(--dim);font-weight:600;margin-bottom:8px}
.kpi .k-val{font-family:'Sora';font-size:25px;font-weight:700;letter-spacing:-.5px}
.kpi .k-sub{font-size:11px;color:var(--muted);margin-top:4px}
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px}
@media(max-width:1250px){.dash-grid{grid-template-columns:1fr}}
.psub{font-size:10.5px;color:var(--dim);margin:-10px 0 13px;line-height:1.4}
.panel{background:linear-gradient(180deg, rgba(21,25,42,.7), rgba(15,18,30,.7));border:1px solid var(--border);border-radius:var(--r);padding:18px 19px}
.panel h3{font-family:'Sora';font-size:13.5px;font-weight:600;margin-bottom:15px;display:flex;align-items:center;justify-content:space-between}
.panel h3 .link{font-family:'Inter';font-size:11.5px;color:var(--acc2);font-weight:600;cursor:pointer}
.panel h3 .link:hover{text-decoration:underline}
.hbar{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.hbar .lbl{width:128px;flex:none;font-size:11.5px;color:var(--muted);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar .track{flex:1;height:19px;background:rgba(150,163,214,.05);border-radius:6px;overflow:hidden}
.hbar .fill{height:100%;border-radius:6px;min-width:2px;transition:width .6s ease;background:var(--bc,#8b7cf6);opacity:.8}
.hbar .val{width:44px;font-size:11px;color:var(--dim);font-variant-numeric:tabular-nums}
.chartp{display:flex;flex-direction:column}
.vchart{height:clamp(190px, calc(100vh - 580px), 400px);display:flex;align-items:stretch;gap:6px;padding-top:6px}
.vcol{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:7px}
.vbar{width:min(100%,40px);height:calc((100% - 50px)*var(--f));min-height:3px;border-radius:10px 10px 5px 5px;opacity:.88;transition:opacity .15s}
.vcol:hover .vbar{opacity:1}
.vval{font-size:10px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums}
.vlbl{font-size:9px;font-weight:600;color:var(--dim);max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.3px}
.mini-list{display:flex;flex-direction:column;gap:4px}
.mini-item{display:flex;align-items:center;gap:12px;padding:8px;border-radius:11px;cursor:pointer;transition:background .12s}
.mini-item:hover{background:rgba(139,124,246,.06)}
.mini-item img{width:92px;aspect-ratio:16/9;object-fit:cover;border-radius:8px;flex:none;background:#0a0c14}
.mini-item .mi-t{font-size:12.3px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.mini-item .mi-s{font-size:11px;color:var(--dim);margin-top:3px;display:flex;gap:8px;align-items:center}
.mini-item .mi-s b{color:var(--acc2)}
.dash-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
@media(max-width:1500px){.dash-3{grid-template-columns:1fr 1fr}}
@media(max-width:1150px){.dash-grid,.dash-3{grid-template-columns:1fr}}
.rm-mini{display:flex;align-items:center;gap:10px;padding:7.5px 8px;border-radius:10px;border-left:3px solid var(--gc,#666);background:rgba(150,163,214,.035);margin-bottom:6px}
.rm-mini .d{font-size:10.5px;color:var(--dim);font-weight:600;width:56px;flex:none;font-variant-numeric:tabular-nums}
.rm-mini .t{font-size:12px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ---------- Recos ---------- */
.rcard{
  background:linear-gradient(180deg, rgba(21,25,42,.72), rgba(15,18,30,.72));
  border:1px solid var(--border);border-left:3px solid var(--gc,#555);border-radius:14px;margin-bottom:10px;
  transition:border-color .15s;overflow:hidden;
}
.rcard:hover{border-color:var(--border2);border-left-color:var(--gc,#555)}
.rhead{display:flex;align-items:center;gap:13px;padding:13px 16px;cursor:pointer}
.rnum{font-size:10.5px;color:var(--dim);font-weight:700;width:34px;flex:none;font-variant-numeric:tabular-nums}
.rtitle{font-size:13.5px;font-weight:600;flex:1;min-width:0;line-height:1.4}
.rscore{font-family:'Sora';font-size:15px;font-weight:700;width:36px;text-align:right;flex:none}
.rpot{flex:none}
.pot-S{background:linear-gradient(90deg,rgba(251,191,36,.18),rgba(251,146,60,.14));color:#fbbf24;border:1px solid rgba(251,191,36,.35)}
.pot-A{background:var(--accSoft);color:var(--acc2);border:1px solid rgba(139,124,246,.35)}
.pot-B{background:rgba(125,211,252,.1);color:var(--blue);border:1px solid rgba(125,211,252,.3)}
.pot-C{background:rgba(150,163,214,.08);color:var(--muted);border:1px solid var(--border)}
.rvalid{flex:none}
.val-x{background:rgba(74,222,128,.12);color:var(--green);border:1px solid rgba(74,222,128,.3)}
.val-note{background:rgba(251,191,36,.1);color:var(--amber);border:1px solid rgba(251,191,36,.3)}
.val-no{background:rgba(251,113,133,.08);color:var(--red);border:1px solid rgba(251,113,133,.25)}
.rbody{display:none;padding:2px 16px 16px 63px;border-top:1px solid var(--border)}
.rcard.open .rbody{display:block}
.rrow{display:grid;grid-template-columns:150px 1fr;gap:9px;padding:8px 0;border-bottom:1px solid rgba(150,163,214,.05);font-size:12.5px;line-height:1.55}
.rrow .k{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.9px;font-weight:600;padding-top:2px}
.rrow .v{color:var(--text);white-space:pre-wrap}
.note-dim{background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.22);border-radius:10px;padding:10px 13px;margin:10px 0 4px;font-size:12.5px;line-height:1.55;color:#fde68a;white-space:pre-wrap}
.note-dim b{display:block;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--amber);margin-bottom:5px}
.copybtn{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--acc2);background:var(--accSoft);border:1px solid rgba(139,124,246,.3);padding:4px 10px;border-radius:8px;margin-top:7px;transition:all .13s}
.copybtn:hover{background:rgba(139,124,246,.22)}
.copybtn.done{color:var(--green);border-color:rgba(74,222,128,.4);background:rgba(74,222,128,.1)}

/* ---------- Roadmap ---------- */
.month-h{font-family:'Sora';font-size:14.5px;font-weight:700;color:var(--text);margin:26px 0 12px;display:flex;align-items:center;gap:12px;position:sticky;top:86px;z-index:5;background:linear-gradient(180deg,var(--bg) 70%,transparent);padding:6px 0}
.month-h .line{flex:1;height:1px;background:var(--border)}
.month-h .cnt{font-size:11px;color:var(--dim);font-weight:600}
.rm-item{
  display:flex;align-items:center;gap:14px;padding:11px 15px;margin-bottom:8px;border-radius:13px;
  background:linear-gradient(180deg, rgba(21,25,42,.65), rgba(15,18,30,.65));
  border:1px solid var(--border);border-left:3px solid var(--gc,#555);cursor:pointer;transition:border-color .14s;
}
.rm-item:hover{border-color:var(--border2);border-left-color:var(--gc,#555)}
.rm-date{width:64px;flex:none;text-align:center}
.rm-date .dd{font-family:'Sora';font-size:17px;font-weight:700;line-height:1.1}
.rm-date .wd{font-size:9.5px;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px;font-weight:600}
.rm-main{flex:1;min-width:0}
.rm-t{font-size:13.5px;font-weight:600;line-height:1.35;margin-bottom:5px}
.rm-tags{display:flex;flex-wrap:wrap;gap:5px}
.src-monday{background:rgba(150,163,214,.1);color:var(--muted);border:1px solid rgba(150,163,214,.2)}
.src-new{background:rgba(74,222,128,.1);color:var(--green);border:1px solid rgba(74,222,128,.3)}
.src-rot{background:rgba(251,191,36,.1);color:var(--amber);border:1px solid rgba(251,191,36,.3)}
.rm-body{display:none;padding:4px 16px 14px 94px;font-size:12.5px}
.rm-wrap.open .rm-body{display:block}
.rm-wrap{margin-bottom:8px}
.rm-wrap.open .rm-item{border-bottom-left-radius:0;border-bottom-right-radius:0;margin-bottom:0}
.rm-wrap.open .rm-body{background:rgba(15,18,30,.65);border:1px solid var(--border);border-top:none;border-left:3px solid var(--gc,#555);border-radius:0 0 13px 13px;padding-top:10px}

/* ---------- Keywords ---------- */
.kw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px}
.kw-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 12px;border-radius:10px;background:linear-gradient(180deg, rgba(21,25,42,.7), rgba(15,18,30,.7));border:1px solid var(--border);cursor:pointer;transition:border-color .13s}
.kw-item:hover{border-color:rgba(139,124,246,.45)}
.kw-name{font-size:12px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kw-n{font-size:10.5px;font-weight:700;color:var(--acc2);background:var(--accSoft);border-radius:12px;padding:2px 8px;flex:none}
.kw-n.zero{color:var(--dim);background:rgba(150,163,214,.07)}

/* ---------- Calendar ---------- */
.cal-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin:8px 0 16px;position:relative}
.cal-month{font-family:'Sora';font-size:22px;font-weight:700;min-width:230px;text-align:center;letter-spacing:-.3px}
.cal-nav .arrow{font-size:19px;padding:7px 17px;line-height:1}
.cal-nav .today{position:absolute;right:0}
.cal{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:rgba(15,18,30,.6)}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border);background:rgba(21,25,42,.6)}
.cal-head div{padding:9px 6px;font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--dim);font-weight:600;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-cell{height:clamp(88px, calc((100vh - 320px)/6), 175px);border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px;position:relative;overflow:hidden}
.cal-grid .cal-cell:nth-child(7n){border-right:none}
.cal-grid .cal-cell:nth-last-child(-n+7){border-bottom:none}
.cal-cell .d{position:absolute;top:5px;right:7px;font-size:10.5px;color:var(--dim);font-weight:600}
.cal-cell.out{background:rgba(5,6,10,.35)}
.cal-cell.out .d{opacity:.4}
.cal-cell.today{box-shadow:inset 0 0 0 1.5px rgba(139,124,246,.55)}
.cal-cell .pills{margin-top:20px;display:flex;flex-direction:column;gap:3px}
.cal-pill{font-size:10.5px;font-weight:700;color:#0d0f17;border-radius:5px;padding:3px 7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:12px;font-size:11px;color:var(--muted)}
.cal-legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px}

/* ---------- Drawer ---------- */
#backdrop{position:fixed;inset:0;background:rgba(4,5,9,.62);backdrop-filter:blur(3px);z-index:60;opacity:0;pointer-events:none;transition:opacity .2s}
#backdrop.show{opacity:1;pointer-events:auto}
#drawer{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-46%) scale(.97);width:min(680px,94vw);max-height:88vh;z-index:70;overflow-y:auto;
  background:#0e1120;border:1px solid var(--border2);border-radius:18px;
  opacity:0;pointer-events:none;transition:opacity .18s ease,transform .18s ease;box-shadow:0 40px 120px rgba(0,0,0,.72);
}
#drawer.show{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.dw-close{position:absolute;top:14px;right:14px;z-index:5;width:32px;height:32px;border-radius:10px;background:rgba(5,6,10,.7);backdrop-filter:blur(6px);color:var(--muted);display:grid;place-items:center;font-size:17px;transition:color .13s}
.dw-close:hover{color:#fff}
.dw-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:#0a0c14}
.dw-embed{width:100%;aspect-ratio:16/9;background:#000}
.dw-embed iframe{width:100%;height:100%;display:block;border:0}
.dw-body{padding:20px 24px 34px}
.dw-title{font-family:'Sora';font-size:17px;font-weight:700;line-height:1.45;margin-bottom:10px}
.dw-title a:hover{color:var(--acc2)}
.dw-sub{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.dw-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:18px}
.dw-stat{background:rgba(150,163,214,.05);border:1px solid var(--border);border-radius:11px;padding:10px 11px}
.dw-stat b{font-family:'Sora';font-size:14.5px;font-weight:700;display:block}
.dw-stat span{font-size:9.3px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.dw-stat.hl b{color:var(--acc2)}
.dw-sec{margin-bottom:15px}
.hist-svg{width:100%;height:150px;display:block;background:rgba(150,163,214,.04);border:1px solid var(--border);border-radius:10px}
.hist-meta{font-size:12px;color:var(--muted);margin-bottom:8px}
.hist-meta b{color:var(--acc2)}
.hist-axis{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-top:4px}
.hist-empty{font-size:12px;color:var(--dim);padding:8px 0;line-height:1.5}
.dw-sec .k{font-size:10.5px;text-transform:uppercase;letter-spacing:1.3px;color:var(--acc2);font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:7px}
.dw-sec .v{font-size:13px;line-height:1.65;color:#cdd2e9;white-space:pre-wrap}
.dw-open{display:inline-flex;align-items:center;gap:8px;margin-top:6px;padding:9px 18px;border-radius:11px;background:linear-gradient(90deg,#8b7cf6,#7c6cf0);color:#fff;font-weight:600;font-size:13px;box-shadow:0 6px 22px -6px rgba(139,124,246,.6);transition:transform .13s}
.dw-open:hover{transform:translateY(-1px)}

/* ---------- Loading / states ---------- */
#loader{position:fixed;inset:0;z-index:100;display:grid;place-items:center;background:var(--bg);transition:opacity .4s}
#loader.hide{opacity:0;pointer-events:none}
.loader-in{text-align:center}
.loader-mark{width:74px;height:74px;border-radius:24px;margin:0 auto 22px;background:conic-gradient(from 220deg,#8b7cf6,#67e8f9,#f9a8d4,#8b7cf6);display:grid;place-items:center;animation:breathe 2.2s ease-in-out infinite;box-shadow:0 10px 50px rgba(139,124,246,.5)}
.loader-mark::after{content:'';width:26px;height:26px;border-radius:50%;background:#07080d}
@keyframes breathe{50%{transform:scale(1.07);box-shadow:0 10px 70px rgba(139,124,246,.75)}}
.loader-in h2{font-family:'Sora';font-size:19px;font-weight:700;margin-bottom:7px}
.loader-in p{color:var(--dim);font-size:12.5px}
.err-box{max-width:430px;margin:60px auto;text-align:center;background:var(--panel);border:1px solid rgba(251,113,133,.3);border-radius:18px;padding:34px 30px}
.err-box h3{font-family:'Sora';font-size:16px;margin-bottom:10px;color:var(--red)}
.err-box p{color:var(--muted);font-size:12.5px;line-height:1.7;margin-bottom:16px}
.empty{color:var(--dim);text-align:center;padding:60px 0;font-size:13px}
.skel{border-radius:var(--r);background:linear-gradient(100deg,rgba(150,163,214,.05) 40%,rgba(150,163,214,.1) 50%,rgba(150,163,214,.05) 60%);background-size:200% 100%;animation:sk 1.3s infinite;height:280px}
@keyframes sk{to{background-position:-200% 0}}
@media(max-width:900px){
  #sidebar{width:64px;padding:16px 8px}
  .logo h1,.nav .count,.nav span.lbl,.side-foot .sync-txt,.sheet-link{display:none}
  #main{margin-left:64px;padding:0 16px 40px}
  :root{--sidebar:64px}
}
</style>
</head>
<body>
<div id="loader"><div class="loader-in">
  <div class="loader-mark"></div>
  <h2>YouTube Radar</h2>
  <p id="loader-msg">Syncing with the Opportunity Map…</p>
</div></div>

<aside id="sidebar">
  <div class="logo">
    <div class="mark"></div>
    <div><h1>YOUTUBE <span>RADAR</span><small>Opportunity Map</small></h1></div>
  </div>
  <nav class="nav" id="nav"></nav>
  <div class="side-foot">
    <div class="sync-row"><div class="sync-dot load" id="sync-dot"></div><div class="sync-txt" id="sync-txt">Connecting…</div></div>
    <button class="btn-refresh" id="btn-refresh" onclick="refresh()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-2.6-6.4M21 3v6h-6"/></svg>
      <span class="lbl">Sync now</span>
    </button>
    <a class="sheet-link" href="https://docs.google.com/spreadsheets/d/1XE_M9pQWn8w2Qu83vV_tv9sEFDFQ13fTePseG6mh1vI/edit" target="_blank">Open Google Sheet ↗</a>
  </div>
</aside>

<main id="main">
  <div class="topbar"><div><h2 id="view-title">Dashboard</h2><div class="sub" id="view-sub"></div></div></div>
  <div id="view"></div>
</main>

<div id="backdrop" onclick="closeDrawer()"></div>
<div id="drawer"></div>

<script>
/* ================= CONFIG ================= */
const SHEET_ID='1XE_M9pQWn8w2Qu83vV_tv9sEFDFQ13fTePseG6mh1vI';
const XLSX_URL='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/export?format=xlsx';
const CACHE_KEY='lofiradar_v1';

const ICONS={
 dash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>',
 all:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="3"/><path d="m10 9.5 5 2.5-5 2.5z" fill="currentColor" stroke="none"/></svg>',
 trends:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 8-8"/><path d="M15 7h6v6"/></svg>',
 news:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>',
 recos:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a7 7 0 0 0-4 12.7c.8.6 1 1.6 1 2.3h6c0-.7.2-1.7 1-2.3A7 7 0 0 0 12 2z"/><path d="M9.5 20h5M10.5 22h3"/></svg>',
 roadmap:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="3"/><path d="M8 2v4M16 2v4M3 9.5h18"/></svg>',
 search:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>',
 grid:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="8" height="8" rx="2"/><rect x="13" y="3" width="8" height="8" rx="2"/><rect x="3" y="13" width="8" height="8" rx="2"/><rect x="13" y="13" width="8" height="8" rx="2"/></svg>',
 rows:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>',
 flame:'<svg width="10" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2s5 4.5 5 9.5c0 1.5-.4 2.7-1 3.7.6-4-2-6.2-2-6.2.2 2.5-1 3.4-2.2 5-1 1.4-1 3-.2 4.5C9 17.6 7 15.5 7 12.5 7 7 12 2 12 2z"/></svg>'
};

/* ================= PARSE ================= */
/*PARSE_START*/
function cellAt(ws,r,c){return ws[XLSX.utils.encode_cell({r:r,c:c})];}
function cv(ws,r,c){const x=cellAt(ws,r,c);return x==null?null:(x.v==null?null:x.v);}
function cf(ws,r,c){const x=cellAt(ws,r,c);return x&&x.f?x.f:null;}
function vidOf(s){if(!s)return null;const m=String(s).match(/(?:watch\?v=|\/vi\/)([\w-]{11})/);return m?m[1]:null;}
function linkOf(s){if(!s)return null;const m=String(s).match(/HYPERLINK\("([^"]+)"/);return m?m[1]:null;}
function toMs(x){
  if(x==null)return null;
  if(x instanceof Date)return x.getTime();
  if(typeof x==='number')return Math.round((x-25569)*86400000);
  const d=new Date(String(x));return isNaN(d)?null:d.getTime();
}
function num(x){if(x==null)return null;if(typeof x==='number')return x;const n=parseFloat(String(x).replace(/[,\s]/g,''));return isNaN(n)?null:n;}
function str(x){return x==null?'':String(x).trim();}
function findHeader(ws,col,label){
  for(let r=0;r<14;r++){const x=cv(ws,r,col);if(x&&String(x).trim().toLowerCase()===label)return r;}
  return -1;
}
function lastRow(ws){return XLSX.utils.decode_range(ws['!ref']).e.r;}
function sheetByName(wb,frag){
  const n=wb.SheetNames.find(s=>s.includes(frag));
  return n?wb.Sheets[n]:null;
}
function parseVideos(ws,kind){
  const hr=findHeader(ws,1,'title');if(hr<0)return[];
  const out=[];const end=lastRow(ws);
  for(let r=hr+1;r<=end;r++){
    const title=str(cv(ws,r,1));if(!title)continue;
    const vid=vidOf(cf(ws,r,1))||vidOf(cf(ws,r,0));
    const o={
      title:title,
      vid:vid,
      url:vid?('https://www.youtube.com/watch?v='+vid):(linkOf(cf(ws,r,1))||('https://www.youtube.com/results?search_query='+encodeURIComponent(title))),
      durH:num(cv(ws,r,2)), views:num(cv(ws,r,3)), vpm:num(cv(ws,r,4)),
      pub:toMs(cv(ws,r,5)), ageM:num(cv(ws,r,6)),
      genre:str(cv(ws,r,7)), cluster:str(cv(ws,r,8)),
      channel:str(cv(ws,r,9)), chUrl:linkOf(cf(ws,r,9)),
      subs:num(cv(ws,r,10))
    };
    if(kind==='all'){o.kw=str(cv(ws,r,11));o.kwCount=num(cv(ws,r,12));o.pattern=str(cv(ws,r,13));}
    else if(kind==='trends'){o.why=str(cv(ws,r,11));o.sugg=str(cv(ws,r,12));o.copy=str(cv(ws,r,13));o.musical=str(cv(ws,r,14));o.visual=str(cv(ws,r,15));}
    else if(kind==='news'){o.disc=str(cv(ws,r,11));o.rank=num(cv(ws,r,12));o.days=num(cv(ws,r,13));o.why=str(cv(ws,r,14));o.angle=str(cv(ws,r,15));o.added=toMs(cv(ws,r,16));}
    out.push(o);
  }
  return out;
}
function parseRecos(ws){
  const hr=findHeader(ws,0,'n°');if(hr<0)return[];
  const out=[];const end=lastRow(ws);
  for(let r=hr+1;r<=end;r++){
    const n=num(cv(ws,r,0));if(n==null)continue;
    out.push({
      n:n, valid:str(cv(ws,r,1)), pot:str(cv(ws,r,2)), score:num(cv(ws,r,3)),
      genre:str(cv(ws,r,4)), niche:str(cv(ws,r,5)), perso:str(cv(ws,r,6)),
      title:str(cv(ws,r,7)), concept:str(cv(ws,r,8)), scene:str(cv(ws,r,9)),
      style:str(cv(ws,r,10)), dur:str(cv(ws,r,11)), desc:str(cv(ws,r,12)),
      kw:str(cv(ws,r,13)), noteData:str(cv(ws,r,14)), launch:str(cv(ws,r,15)),
      conf:num(cv(ws,r,16)), status:str(cv(ws,r,17)), recoClaude:str(cv(ws,r,18)),
      scoreAdj:num(cv(ws,r,19)), recal:str(cv(ws,r,20))
    });
  }
  return out;
}
function parseRoadmap(ws){
  const hr=findHeader(ws,0,'date');if(hr<0)return[];
  const out=[];const end=lastRow(ws);
  for(let r=hr+1;r<=end;r++){
    const t=str(cv(ws,r,3));if(!t)continue;
    out.push({
      date:toMs(cv(ws,r,0)), jour:str(cv(ws,r,1)), src:str(cv(ws,r,2)), title:t,
      genre:str(cv(ws,r,4)), perso:str(cv(ws,r,5)), dur:str(cv(ws,r,6)),
      concept:str(cv(ws,r,7)), scene:str(cv(ws,r,8)), style:str(cv(ws,r,9)),
      niche:str(cv(ws,r,10)), cadence:str(cv(ws,r,11)), note:str(cv(ws,r,12))
    });
  }
  return out;
}
function parseHist(ws){
  if(!ws)return {};
  const hist={};const end=lastRow(ws);
  for(let r=1;r<=end;r++){
    const id=str(cv(ws,r,0));if(!id||id.length<8)continue;
    const t=toMs(cv(ws,r,1));const v=num(cv(ws,r,2));
    if(t==null||v==null)continue;
    (hist[id]=hist[id]||[]).push([t,v]);
  }
  Object.values(hist).forEach(a=>a.sort((x,y)=>x[0]-y[0]));
  return hist;
}
function parseLives(ws){
  if(!ws)return[];
  const out=[];const end=lastRow(ws);
  for(let r=1;r<=end;r++){

<script>
/* ================= HELPERS ================= */
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtN(x){
  if(x==null||isNaN(x))return '—';
  if(x>=1e9)return (x/1e9).toFixed(1).replace(/\.0$/,'')+'B';
  if(x>=1e6)return (x/1e6).toFixed(1).replace(/\.0$/,'')+'M';
  if(x>=1e3)return (x/1e3).toFixed(x>=1e5?0:1).replace(/\.0$/,'')+'k';
  return String(Math.round(x));
}
function fmtInt(x){return x==null?'—':Math.round(x).toLocaleString('en-US');}
function fmtDur(h){
  if(h==null)return '—';
  if(h<1)return Math.round(h*60)+' min';
  const H=Math.floor(h),M=Math.round((h-H)*60);
  return M?H+'h'+String(M).padStart(2,'0'):H+'h';
}
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(ms){if(!ms)return '—';const d=new Date(ms);return MONTHS[d.getMonth()]+' '+d.getFullYear();}
function fmtDT(ms){if(!ms)return '—';const d=new Date(ms);return d.getDate()+' '+MONTHS[d.getMonth()]+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function fmtDateFull(ms){if(!ms)return '—';const d=new Date(ms);return d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();}
function fmtAge(m){if(m==null)return '—';return m<1?'<1 mo':(m<12?m.toFixed(1).replace(/\.0$/,'')+' mo':(m/12).toFixed(1).replace(/\.0$/,'')+' yr');}
function thumb(vid,q){return vid?('https://i.ytimg.com/vi/'+vid+'/'+(q||'mqdefault')+'.jpg'):'';}

const GENRE_COLORS=[
  [/m[eé]ditation|fr[eé]quence/i,'#5eead4'],
  [/d[eé]tente|\bspa\b/i,'#34d399'],
  [/ambiance|cin[eé]mat/i,'#67e8f9'],
  [/b[eé]b[eé]|berceuse|lullab/i,'#fca5a5'],
  [/bgm|caf[eé]/i,'#fcd34d'],

  [/christmas|noël|noel/i,'#fb7185'],

  [/guitar|guitare/i,'#fdba74'],
  [/jazz|bossa/i,'#fbbf24'],
  [/piano/i,'#f9a8d4'],

function gcolor(g){
  if(!g)return '#9ca3af';
  for(const [re,c] of GENRE_COLORS){if(re.test(g))return c;}
  return '#9ca3af';
}
function gtag(g,extra){
  if(!g)return '';
  const c=gcolor(g);
  return '<span class="tag" style="background:'+c+'1f;color:'+c+';border:1px solid '+c+'45">'+(extra?'':'<span class="dot" style="background:'+c+'"></span>')+esc(g)+'</span>';
}
function ghosttag(t){return t?'<span class="tag ghost">'+esc(t)+'</span>':'';}
function median(arr){const a=arr.filter(x=>x!=null).sort((x,y)=>x-y);if(!a.length)return null;const m=Math.floor(a.length/2);return a.length%2?a[m]:(a[m-1]+a[m])/2;}
function histChart(pts,unit){
  const u=unit||'views';
  if(!pts||pts.length===0)return '<div class="hist-empty">Tracking just started — the curve appears from the 2nd scan. 📡</div>';
  if(pts.length===1)return '<div class="hist-empty">1 scan recorded ('+fmtDateFull(pts[0][0])+' · '+fmtInt(pts[0][1])+' '+u+') — the curve appears from the 2nd scan. 📡</div>';
  const W=560,H=150,P=10;
  const xs=pts.map(p=>p[0]),ys=pts.map(p=>p[1]);
  const x0=Math.min.apply(null,xs),x1=Math.max.apply(null,xs);
  const y0=Math.min.apply(null,ys),y1=Math.max.apply(null,ys);
  const X=t=>P+(W-2*P)*(x1===x0?0.5:(t-x0)/(x1-x0));
  const Y=v=>H-P-(H-2*P)*(y1===y0?0.5:(v-y0)/(y1-y0));
  const line=pts.map((p,i)=>(i?'L':'M')+X(p[0]).toFixed(1)+' '+Y(p[1]).toFixed(1)).join(' ');
  const area=line+' L'+X(x1).toFixed(1)+' '+(H-P)+' L'+X(x0).toFixed(1)+' '+(H-P)+' Z';
  const days=Math.max((x1-x0)/86400000,0.5);
  const perDay=(pts[pts.length-1][1]-pts[0][1])/days;
  const meta=u==='viewers'
    ? 'Peak <b>'+fmtN(y1)+'</b> · latest <b>'+fmtN(pts[pts.length-1][1])+'</b> concurrent viewers · '+pts.length+' scans'
    : '<b>+'+fmtN(perDay)+'</b> '+u+'/day measured · '+pts.length+' scans · '+fmtDateFull(x0)+' → '+fmtDateFull(x1);
  return '<div class="hist-meta">'+meta+'</div>'+
    '<svg class="hist-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">'+
    '<path d="'+area+'" fill="rgba(139,124,246,.14)"/>'+
    '<path d="'+line+'" fill="none" stroke="#a78bfa" stroke-width="2"/>'+
    pts.map(p=>'<circle cx="'+X(p[0]).toFixed(1)+'" cy="'+Y(p[1]).toFixed(1)+'" r="'+(u==='viewers'?3.4:2.6)+'" fill="#a78bfa"><title>'+(u==='viewers'?fmtDT(p[0]):fmtDateFull(p[0]))+' · '+fmtInt(p[1])+' '+u+'</title></circle>').join('')+
    '</svg>'+
    '<div class="hist-axis"><span>'+fmtN(y0)+'</span><span>'+fmtN(y1)+'</span></div>';
}
function timeAgo(ms){
  const s=(Date.now()-ms)/1000;
  if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+' min ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';
}

function parseChanWb(wb){
  const ws=sheetByName(wb,'Audit');
  if(!ws)throw new Error('Audit tab not found');
  let hr=-1;
  for(let r=0;r<12;r++){const x=cv(ws,r,0);if(x&&/^cha[iî]ne$/i.test(String(x).trim())){hr=r;break;}}
  if(hr<0)throw new Error('Audit header not found');
  const chans=[];const end=lastRow(ws);
  for(let r=hr+1;r<=end;r++){
    const name=str(cv(ws,r,0));if(!name)continue;
    chans.push({
      name:name, niche:str(cv(ws,r,1)), url:str(cv(ws,r,2)), country:str(cv(ws,r,3)),
      subs:num(cv(ws,r,4)), views:num(cv(ws,r,5)), nvid:num(cv(ws,r,6)), avgVid:num(cv(ws,r,7)),
      created:toMs(cv(ws,r,8)), ageY:num(cv(ws,r,9)), viewsYr:num(cv(ws,r,10)),
      lastUp:toMs(cv(ws,r,11)), avg10:num(cv(ws,r,12)), upMo:num(cv(ws,r,13)), status:str(cv(ws,r,14))

  const hist={};

      const u=normUrl(str(cv(hs,r,0)));if(!u)continue;

    }
    Object.values(hist).forEach(a=>a.sort((x,y)=>x[0]-y[0]));
  }
  const X=(window.CHX&&window.CHX.d)||{};
  chans.forEach(c=>{
    const key=((c.url.match(/(@[\w.-]+)/)||c.url.match(/channel\/(UC[\w-]{22})/)||[])[1]||'').toLowerCase();
    const x=X[key];
    if(x){
      if(x.av)c.av=x.av;
      if(c.views==null&&x.v!=null)c.views=x.v;
      if(c.nvid==null&&x.n!=null)c.nvid=x.n;
      if(!c.created&&x.cr)c.created=toMs(x.cr);
      if(!c.lastUp&&x.lu)c.lastUp=toMs(x.lu);
      if(c.ageY==null&&c.created)c.ageY=+(((Date.now()-c.created)/31557600000).toFixed(1));
      if(c.viewsYr==null&&c.views!=null&&c.ageY>0.2)c.viewsYr=Math.round(c.views/c.ageY);
      if(c.avgVid==null&&c.views!=null&&c.nvid)c.avgVid=Math.round(c.views/c.nvid);
    }
  });
  const lg=(window.CHX&&window.CHX.lg)||{};
  chans.unshift({
    name:'Lofi Girl',niche:'Lofi / Chillhop',url:'https://www.youtube.com/@LofiGirl',country:'France',
    subs:15813038,views:2639469149,nvid:427,avgVid:Math.round(2639469149/427),
    created:Date.UTC(2015,2,18),ageY:11.3,viewsYr:334000000,lastUp:lg.lu?toMs(lg.lu):null,
    avg10:null,upMo:null,status:'Actif',ours:true,av:lg.av||null,subsMo:100000
  });
  return {channels:chans,hist:hist};
}
function chanSubsMo(c){
  if(c.subsMo!=null)return c.subsMo;
  if(!CHAN||!CHAN.hist)return null;
  const a=CHAN.hist[normUrl(c.url)];if(!a||a.length<2)return null;
  const s=a.filter(p=>p[1]!=null);if(s.length<2)return null;
  const days=(s[s.length-1][0]-s[0][0])/86400000;if(days<6)return null;
  const d=(s[s.length-1][1]-s[0][1])/days*30.44;

}
function normUrl(u){return String(u||'').toLowerCase().replace(/\/+$/,'');}
async function loadChan(){

    h='<table class="vtable"><thead><tr><th></th><th>Title</th><th>Views/mo</th><th>Views</th><th>Duration</th><th>Published</th><th>Genre</th><th>Channel</th><th>Subs</th></tr></thead><tbody>'+
      page.map((v,i)=>'<tr class="row" onclick="openIdx(\''+kind+'\','+i+')">'+
        '<td><img class="tthumb" loading="lazy" src="'+thumb(v.vid)+'" onerror="this.style.visibility=\'hidden\'"></td>'+
        '<td class="ttitle">'+esc(v.title)+'</td>'+
        '<td class="num vpmcell">'+fmtN(v.vpm)+'</td><td class="num">'+fmtN(v.views)+'</td>'+
        '<td class="num">'+fmtDur(v.durH)+'</td><td class="num">'+fmtDate(v.pub)+'</td>'+
        '<td>'+gtag(v.genre)+'</td><td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(v.channel)+'</td>'+
        '<td class="num">'+fmtN(v.subs)+'</td></tr>').join('')+'</tbody></table>';
  }
  if(rows.length>st.limit)h+='<button class="load-more" onclick="VS.'+kind+'.limit+=120;rerenderList(\''+kind+'\')">Loading more · '+fmtInt(rows.length-st.limit)+' remaining</button>';
  window['_page_'+kind]=page;
  return h;
}
function vcardHTML(kind,v,i){
  const extra=(kind==='news'||(kind==='mix'&&(v.rank||v.added)))
    ? '<div class="vtags">'+(v.rank?'<span class="tag ghost">#'+v.rank+' search rank</span>':'')+(v.added?'<span class="tag ghost">added '+fmtDateFull(v.added)+'</span>':'')+'</div>'

      (v.vid?'<span class="like-flag" style="display:none" data-likes="'+v.vid+'"></span>':'')+
      (v.durH!=null?'<span class="dur">'+fmtDur(v.durH)+'</span>':'')+'</div>'+
    '<div class="vbody">'+
      '<div class="vtitle">'+esc(v.title)+'</div>'+
      '<div class="vmeta"><a href="'+esc(v.chUrl||'#')+'" target="_blank" onclick="event.stopPropagation()">'+esc(v.channel)+'</a><span class="subs">· '+fmtN(v.subs)+' subs</span></div>'+

        '<div class="vstat"><b>'+fmtDate(v.pub)+'</b><span>published</span></div>'+
      '</div></div></div>';
}

/* ================= DRAWER ================= */
function openIdx(kind,i){const v=(window['_page_'+kind]||[])[i];if(v)openDrawer(kind,v);}
function openVid(kind,key){
  const v=DATA[kind].find(x=>x.vid===key||x.title===key);if(v)openDrawer(kind,v);
}
function openDrawer(kind,v){
  const sec=(k,val,icon)=>val?'<div class="dw-sec"><div class="k">'+(icon||'')+' '+k+'</div><div class="v">'+esc(val)+'</div></div>':'';
  let extra='';
  if(kind==='mix'){
    extra=sec('Why trending / notable',v.why,'🔥')+sec('Lofi Girl suggestion',v.sugg||v.angle,'💡')+sec('What to copy',v.copy,'🎯')+sec('Musical direction',v.musical,'🎼')+sec('Visual direction',v.visual,'🎨')+
      sec('Discovery keywords',v.disc,'🔎')+
      (v.rank?sec('Best search rank','#'+Math.round(v.rank),'🏁'):'')+
      (v.added?sec('First seen by the scan',fmtDateFull(v.added),'🗓️'):'')+
      sec('Found via search keywords',v.kw,'🔎')+sec('Title pattern',v.pattern,'✏️');
  }else if(kind==='trends'){
    extra=sec('Why trending',v.why,'🔥')+sec('Lofi Girl suggestion',v.sugg,'💡')+sec('What to copy',v.copy,'🎯')+sec('Musical direction',v.musical,'🎼')+sec('Visual direction',v.visual,'🎨');
  }else if(kind==='news'){
    extra=sec('Why notable',v.why,'📌')+sec('Lofi Girl angle',v.angle,'💡')+sec('Discovery keywords',v.disc,'🔎')+
      (v.rank?sec('Best search rank','#'+Math.round(v.rank),'🏁'):'')+
      (v.days?sec('Days surfaced',String(Math.round(v.days)),'📅'):'')+
      (v.added?sec('Added to scan',fmtDateFull(v.added),'🗓️'):'');
  }else{
    extra=sec('Found via search keywords',v.kw,'🔎')+sec('Title pattern',v.pattern,'✏️');
  }
  document.getElementById('drawer').innerHTML=
    '<button class="dw-close" onclick="closeDrawer()">✕</button>'+
    (v.vid?'<div class="dw-embed"><iframe src="https://www.youtube.com/embed/'+v.vid+'?rel=0" title="YouTube player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>':'')+
    '<div class="dw-body">'+
      '<div class="dw-title"><a href="'+esc(v.url)+'" target="_blank">'+esc(v.title)+'</a></div>'+
      '<div class="dw-sub">'+gtag(v.genre)+ghosttag(v.cluster)+
        (v.chUrl?'<a class="tag ghost" href="'+esc(v.chUrl)+'" target="_blank">'+esc(v.channel)+' ↗</a>':ghosttag(v.channel))+
        '<span class="tag ghost">'+fmtN(v.subs)+' subs</span>'+likeTag(v.vid)+aiBadge(chanByUrl(v.chUrl))+'</div>'+
      '<div class="dw-stats">'+
        '<div class="dw-stat hl"><b>'+fmtN(v.vpm)+'</b><span>views/mo</span></div>'+
        '<div class="dw-stat"><b>'+fmtN(v.views)+'</b><span>views</span></div>'+
        '<div class="dw-stat"><b>'+fmtDur(v.durH)+'</b><span>duration</span></div>'+
        '<div class="dw-stat"><b>'+fmtAge(v.ageM)+'</b><span>age</span></div>'+
      '</div>'+
      '<div class="dw-sec"><div class="k">📈 View history</div>'+histChart(DATA.hist&&v.vid?DATA.hist[v.vid]:null)+'</div>'+
      extra+
    '</div>';
  document.getElementById('drawer').classList.add('show');
  document.getElementById('backdrop').classList.add('show');
  document.getElementById('drawer').scrollTop=0;
  fillLikes();i18nDrawer();
}
function closeDrawer(){
  const dw=document.getElementById('drawer');
  dw.classList.remove('show');
  document.getElementById('backdrop').classList.remove('show');
  setTimeout(()=>{if(!dw.classList.contains('show'))dw.innerHTML='';},220);
}
const IO=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){IO.unobserve(e.target);e.target.click();}})},{rootMargin:'600px'});
function armAutoLoad(){document.querySelectorAll('.load-more').forEach(b=>IO.observe(b));}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeDrawer();
  if(e.key==='/'&&!/input|select|textarea/i.test(document.activeElement.tagName)){
    e.preventDefault();const inp=document.querySelector('.search input');if(inp)inp.focus();
  }
});
</script>
<script>
/* ================= RECOMMENDATIONS ================= */
function validState(v){
  if(!v||v==='')return '';
  if(v==='-')return 'no';
  if(/^x\s*$/i.test(v))return 'x';
  if(/^x\s*·/i.test(v))return 'xnote';
  return 'note';
}
function noteOf(v){const m=String(v||'').match(/^x\s*·\s*([\s\S]*)$/i);if(m)return m[1];return validState(v)==='note'?String(v):'';}
const WRITE_URL='https://script.google.com/macros/s/AKfycbynEewHZzfecwty-E5TV4Otgsxi3ieGy_N5PPYiM7GpPeMVz_5ka1rxY-Y67H3eknto4w/exec';
const WRITE_KEY='lofiradar2026kx';
async function writeValid(n,val,btn){
  if(btn){btn.disabled=true;btn.textContent='Saving…';}
  try{
    const r=await fetch(WRITE_URL+'?k='+WRITE_KEY+'&n='+encodeURIComponent(n)+'&val='+encodeURIComponent(val));
    const j=await r.json();
    if(!j.ok)throw new Error(j.err||'write failed');
    const rec=DATA.recos.find(x=>x.n===n);if(rec)rec.valid=val;
    saveCache(DATA);
    rerenderRecos();
  }catch(e){alert('Could not save to the Google Sheet: '+e.message);rerenderRecos();}
}
function toggleValidate(n,btn){
  const rec=DATA.recos.find(x=>x.n===n);if(!rec)return;
  const note=noteOf(rec.valid);
  const isVal=/^x/i.test(String(rec.valid||'').trim());
  const val=isVal?(note||''):(note?'X · '+note:'X');
  writeValid(n,val,btn);
}
function toggleComment(i){
  const box=document.getElementById('cbox'+i);if(!box)return;
  box.style.display=box.style.display==='none'?'block':'none';
  const ta=document.getElementById('cta'+i);if(ta&&box.style.display==='block')ta.focus();
}
function saveComment(n,i){
  const ta=document.getElementById('cta'+i);if(!ta)return;
  const rec=DATA.recos.find(x=>x.n===n);if(!rec)return;
  const isVal=/^x/i.test(String(rec.valid||'').trim());
  const txt=ta.value.trim();
  const val=txt?(isVal?'X · '+txt:txt):(isVal?'X':'');
  writeValid(n,val,document.getElementById('csave'+i));
}
function filterRecos(){
  let rows=DATA.recos;
  if(RS.genres.size)rows=rows.filter(r=>RS.genres.has(r.genre||'(unset)'));
  if(RS.pot)rows=rows.filter(r=>r.pot&&r.pot.startsWith(RS.pot));
  if(RS.perso)rows=rows.filter(r=>r.perso===RS.perso);
  if(RS.val==='x')rows=rows.filter(r=>['x','xnote'].includes(validState(r.valid)));
  else if(RS.val==='note')rows=rows.filter(r=>['note','xnote'].includes(validState(r.valid)));
  else if(RS.val==='any')rows=rows.filter(r=>['x','note','xnote'].includes(validState(r.valid)));
  else if(RS.val==='pending')rows=rows.filter(r=>!validState(r.valid));
  if(RS.q){const q=RS.q.toLowerCase();rows=rows.filter(r=>(r.title+' '+r.niche+' '+r.concept+' '+r.perso+' '+r.kw).toLowerCase().includes(q));}
  const sf=RS.sort;
  return [...rows].sort((a,b)=>sf==='n'?(a.n-b.n):(((b[sf]!=null?b[sf]:b.score)||0)-((a[sf]!=null?a[sf]:a.score)||0)));
}
function recosHTML(){
  const all=DATA.recos;
  const rows=filterRecos();
  const genres=[...new Set(all.map(r=>r.genre||'(unset)'))].sort();
  const persos=[...new Set(all.map(r=>r.perso).filter(Boolean))].sort();
  let h='<div class="toolbar">'+
    '<div class="search">'+ICONS.search+'<input placeholder="Search concepts, titles, niches…" value="'+esc(RS.q)+'" oninput="RS.q=this.value;RS.limit=80;rerenderRecos()"><kbd>/</kbd></div>'+
    '<select class="ctl" onchange="RS.pot=this.value;rerenderRecos()">'+
      '<option value="">All potential</option>'+['S','A','B','C'].map(p=>'<option '+(RS.pot===p?'selected':'')+' value="'+p+'">'+({S:'S — Rente potentielle',A:'A — Fort',B:'B — Solide',C:'C — Niche / à tester'})[p]+'</option>').join('')+'</select>'+
    '<select class="ctl" onchange="RS.perso=this.value;rerenderRecos()">'+
      '<option value="">All characters</option>'+persos.map(p=>'<option '+(RS.perso===p?'selected':'')+' value="'+esc(p)+'">'+esc(p)+'</option>').join('')+'</select>'+
    '<select class="ctl" onchange="RS.val=this.value;rerenderRecos()">'+
      '<option value="">Any status</option><option '+(RS.val==='x'?'selected':'')+' value="x">✓ Validated</option><option '+(RS.val==='note'?'selected':'')+' value="note">📝 With Dim note</option><option '+(RS.val==='any'?'selected':'')+' value="any">Validated or noted</option><option '+(RS.val==='pending'?'selected':'')+' value="pending">Pending review</option></select>'+
    '<select class="ctl" onchange="RS.sort=this.value;rerenderRecos()">'+
      '<option value="scoreAdj">Sort · Adjusted score</option><option '+(RS.sort==='score'?'selected':'')+' value="score">Sort · Score</option><option '+(RS.sort==='conf'?'selected':'')+' value="conf">Sort · Confidence</option><option '+(RS.sort==='n'?'selected':'')+' value="n">Sort · N°</option></select>'+
    '<div class="result-count"><b>'+fmtInt(rows.length)+'</b> concepts</div>'+
  '</div>';
  h+='<div class="chips" style="margin-bottom:18px">'+genres.map(g=>{
    const c=gcolor(g),on=RS.genres.has(g);
    return '<span class="chip '+(on?'on':'')+'" style="--chipbg:'+c+'22;--chipbd:'+c+'66" onclick="toggleRGenre(\''+esc(g).replace(/'/g,"\\'")+'\')"><span class="dot" style="background:'+c+'"></span>'+esc(g)+' <span style="opacity:.55;font-weight:500">'+all.filter(r=>(r.genre||'(unset)')===g).length+'</span></span>';
  }).join('')+'</div>';
  h+='<div id="reco-list">'+recoListHTML(rows)+'</div>';
  return h;
}
function toggleRGenre(g){RS.genres.has(g)?RS.genres.delete(g):RS.genres.add(g);RS.limit=80;render();}
function rerenderRecos(){
  const rows=filterRecos();
  const el=document.getElementById('reco-list');if(el){el.innerHTML=recoListHTML(rows);i18nZone(el);}
  const rc=document.querySelector('.result-count');if(rc)rc.innerHTML='<b>'+fmtInt(rows.length)+'</b> concepts';
  armAutoLoad();
}
function recoListHTML(rows){
  if(!rows.length)return '<div class="empty">Nothing matches — try clearing filters.</div>';
  const page=rows.slice(0,RS.limit);
  window._pageRecos=page;
  let h=page.map((r,i)=>{
    const vs=validState(r.valid);
    const vbadge=(vs==='x'?'<span class="tag val-x rvalid">✓ Validé</span>':vs==='xnote'?'<span class="tag val-x rvalid">✓ Validé</span><span class="tag val-note rvalid">📝</span>':vs==='note'?'<span class="tag val-note rvalid">📝 Note Dim</span>':vs==='no'?'<span class="tag val-no rvalid">–</span>':'');
    const isVal=/^x/i.test(String(r.valid||'').trim());
    const pot=r.pot?('<span class="tag rpot pot-'+r.pot[0]+'">'+esc(r.pot)+'</span>'):'';
    const score=(r.scoreAdj!=null?r.scoreAdj:r.score);
    return '<div class="rcard" style="--gc:'+gcolor(r.genre)+'" id="rc'+i+'">'+
      '<div class="rhead" onclick="document.getElementById(\'rc'+i+'\').classList.toggle(\'open\')">'+
        '<span class="rnum">#'+Math.round(r.n)+'</span>'+
        '<div class="rtitle">'+esc(r.title)+'<div style="margin-top:5px;display:flex;gap:5px;flex-wrap:wrap">'+gtag(r.genre)+ghosttag(r.perso)+ghosttag(r.niche)+(r.dur?ghosttag(r.dur):'')+'</div></div>'+
        vbadge+pot+'<span class="rscore" title="Adjusted score">'+(score!=null?Math.round(score):'—')+'</span>'+
      '</div>'+
      '<div class="rbody">'+
        '<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">'+
          '<button class="copybtn" style="'+(isVal?'background:#34d39922;border-color:#34d39966;color:#34d399':'')+'" onclick="event.stopPropagation();toggleValidate('+r.n+',this)">'+(isVal?'✓ Validated · click to undo':'✓ Validate')+'</button>'+
          '<button class="copybtn" onclick="event.stopPropagation();toggleComment('+i+')">💬 '+(noteOf(r.valid)?'Edit comment':'Comment')+'</button></div>'+
        '<div id="cbox'+i+'" style="display:none;margin-bottom:12px">'+
          '<textarea id="cta'+i+'" style="width:100%;min-height:64px;background:rgba(10,12,20,.7);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px;font-family:inherit;font-size:12.5px;resize:vertical" placeholder="Your note — ChatGPT reads it at the next scan to recalibrate…">'+esc(noteOf(r.valid))+'</textarea>'+
          '<button class="copybtn" id="csave'+i+'" style="margin-top:7px" onclick="saveComment('+r.n+','+i+')">💾 Save to Sheet</button></div>'+
        (vs==='note'||vs==='no'||vs==='xnote'?'<div class="note-dim"><b>Note Dim (Validé)</b>'+esc(vs==='xnote'?noteOf(r.valid):r.valid)+'</div>':'')+
        recoRow('Concept',r.concept)+recoRow('Thumbnail scene',r.scene)+recoRow('Music style',r.style)+
        recoRow('Launch format',r.launch)+recoRow('Data note',r.noteData)+recoRow('Reco Claude',r.recoClaude)+
        recoRow('Recalibrage',r.recal)+
        (r.conf!=null?recoRow('Confidence',Math.round(r.conf)+' / 100'):'')+(r.status?recoRow('Status',r.status):'')+
        (r.desc?'<div class="rrow"><div class="k">Description</div><div class="v">'+esc(r.desc)+'<br><button class="copybtn" onclick="copyTxt(this,'+i+',\'desc\')">⧉ Copy description</button></div></div>':'')+
        (r.kw?'<div class="rrow"><div class="k">SEO keywords</div><div class="v" style="color:var(--muted)">'+esc(r.kw)+'<br><button class="copybtn" onclick="copyTxt(this,'+i+',\'kw\')">⧉ Copy keywords</button> <button class="copybtn" onclick="copyTxt(this,'+i+',\'title\')">⧉ Copy title</button></div></div>':'')+
      '</div></div>';
  }).join('');
  if(rows.length>RS.limit)h+='<button class="load-more" onclick="RS.limit+=120;rerenderRecos()">Loading more · '+fmtInt(rows.length-RS.limit)+' remaining</button>';
  return h;
}
function recoRow(k,v){return v?'<div class="rrow"><div class="k">'+k+'</div><div class="v">'+esc(v)+'</div></div>':'';}
function copyTxt(btn,i,field){
  const r=window._pageRecos[i];if(!r)return;
  navigator.clipboard.writeText(r[field]||'').then(()=>{
    const old=btn.textContent;btn.textContent='✓ Copied';btn.classList.add('done');
    setTimeout(()=>{btn.textContent=old;btn.classList.remove('done');},1400);
  });
}

/* ================= ROADMAP ================= */
function roadmapHTML(){
  let rows=DATA.roadmap.filter(r=>r.date);
  const genres=[...new Set(DATA.roadmap.map(r=>r.genre).filter(Boolean))].sort();
  if(RM.src)rows=rows.filter(r=>r.src===RM.src);
  if(RM.genre)rows=rows.filter(r=>r.genre===RM.genre);
  rows.sort((a,b)=>a.date-b.date);
  let h='<div class="toolbar">'+
    '<select class="ctl" onchange="RM.src=this.value;render()">'+
      '<option value="">All sources</option>'+['Existant (Monday)','Nouveau mix (à produire)','Proposition rotation (à valider)'].map(s=>'<option '+(RM.src===s?'selected':'')+' value="'+esc(s)+'">'+esc(s)+'</option>').join('')+'</select>'+
    '<select class="ctl" onchange="RM.genre=this.value;render()">'+
      '<option value="">All genres</option>'+genres.map(g=>'<option '+(RM.genre===g?'selected':'')+' value="'+esc(g)+'">'+esc(g)+'</option>').join('')+'</select>'+
    '<div class="result-count"><b>'+rows.length+'</b> releases · '+
      '<span style="color:var(--muted)">gris Monday</span> · <span style="color:var(--green)">vert à produire</span> · <span style="color:var(--amber)">jaune à valider</span></div>'+
  '</div>';
  window._rm_rows=rows;
  h+=calHTML(rows);
  h+='<div class="month-h" style="position:static;margin-top:34px">📋 All releases<span class="cnt">'+rows.length+'</span><span class="line"></span></div>';
  const now=Date.now()-86400000*3;
  let curMonth='';
  rows.forEach((r,i)=>{
    const d=new Date(r.date);
    const mk=MONTHS[d.getMonth()]+' '+d.getFullYear();
    if(mk!==curMonth){
      curMonth=mk;
      const cnt=rows.filter(x=>{const xd=new Date(x.date);return MONTHS[xd.getMonth()]+' '+xd.getFullYear()===mk;}).length;
      h+='<div class="month-h">'+mk+'<span class="cnt">'+cnt+' release'+(cnt>1?'s':'')+'</span><span class="line"></span></div>';
    }
    const srcClass=/Monday/.test(r.src)?'src-monday':/Nouveau/.test(r.src)?'src-new':'src-rot';
    const past=r.date<now?'opacity:.5':'';
    h+='<div class="rm-wrap" id="rm'+i+'" style="'+past+'">'+
      '<div class="rm-item" style="--gc:'+gcolor(r.genre)+'" onclick="openRoad('+i+')">'+
        '<div class="rm-date"><div class="dd">'+d.getDate()+'</div><div class="wd">'+esc((r.jour||'').slice(0,3))+'</div></div>'+
        '<div class="rm-main"><div class="rm-t">'+esc(r.title)+'</div>'+
          '<div class="rm-tags">'+gtag(r.genre)+ghosttag(r.perso)+(r.dur?ghosttag(r.dur):'')+(r.niche?ghosttag(r.niche):'')+'</div></div>'+
        '<span class="tag '+srcClass+'">'+esc((r.src||'').replace(/\s*\(.*\)/,''))+'</span>'+
      '</div></div>';
  });
  return h;
}
function openRoad(i){
  const r=(window._rm_rows||[])[i];if(!r)return;
  const sec=(k,val,icon)=>val?'<div class="dw-sec"><div class="k">'+(icon||'')+' '+k+'</div><div class="v">'+esc(val)+'</div></div>':'';
  const d=r.date?new Date(r.date):null;
  const reco=DATA.recos.find(x=>x.title&&r.title&&x.title.trim().toLowerCase()===r.title.trim().toLowerCase());
  document.getElementById('drawer').innerHTML=
    '<button class="dw-close" onclick="closeDrawer()">✕</button>'+
    '<div class="dw-body" style="padding-top:26px">'+
      '<div class="dw-title">'+esc(r.title)+'</div>'+
      '<div class="dw-sub">'+gtag(r.genre)+ghosttag(r.perso)+(r.dur?ghosttag(r.dur):'')+(r.niche?ghosttag(r.niche):'')+ghosttag((r.src||'').replace(/\s*\(.*\)/,''))+'</div>'+
      '<div class="dw-stats">'+

/* ================= ANALYSIS (our videos) ================= */
const GKEYS=[[/lofi|chillhop|hip ?hop/i,'lofi'],[/synth|retro|outrun/i,'synthwave'],[/piano/i,'piano'],[/jazz|bossa/i,'jazz'],[/classi/i,'classical'],[/guitar|acousti/i,'guitar'],[/sleep|sommeil|night/i,'sleep'],[/nature|rain|pluie|forest|ocean/i,'nature'],[/ambient|ambiance/i,'ambient'],[/focus|study|étude/i,'focus'],[/house|electro/i,'electronic'],[/m[eé]ditation|wellness/i,'meditation']];
function genreKey(g){if(!g)return null;for(const p of GKEYS){if(p[0].test(g))return p[1];}return 'other';}
const AS={sort:'date'};
let _anaCache=null,_anaT=0;
function anaRows(){
  if(_anaCache&&_anaT===SYNCED)return _anaCache;
  const yr=Date.now()-365.25*86400000;
  const out=(DATA.ours||[]).filter(v=>v.pub&&v.pub>=yr&&(v.durH==null||v.durH>=0.15)).map(v=>{
    const o=Object.assign({},v);
    o.ageM=(Date.now()-v.pub)/2629800000;
    const s=(DATA.hist&&DATA.hist[v.vid])||[];
    o.views=s.length?s[s.length-1][1]:null;
    o.vpm=(o.views!=null&&o.ageM>0.1)?o.views/o.ageM:null;
    if(s.length>=2){
      const days=Math.max((s[s.length-1][0]-s[0][0])/86400000,0.5);
      o.vNow=(s[s.length-1][1]-s[0][1])/days*30.44;
    }else o.vNow=null;
    const gk=genreKey(v.genre);
    let coh=mixRows().filter(x=>genreKey(x.genre)===gk&&x.ageM!=null&&x.ageM<=24&&x.vpm!=null);
    if(coh.length<8)coh=mixRows().filter(x=>genreKey(x.genre)===gk&&x.vpm!=null);
    if(coh.length<8)coh=mixRows().filter(x=>x.ageM!=null&&x.ageM<=24&&x.vpm!=null);
    o.cohN=coh.length;o.gk=gk;
    if(o.vpm!=null&&coh.length){
      const below=coh.filter(x=>x.vpm<o.vpm).length;
      o.pct=Math.round(below/coh.length*100);
      const tops=coh.filter(x=>x.vpm!=null).sort((a,b)=>b.vpm-a.vpm).slice(0,Math.max(3,Math.round(coh.length/4)));
      o.topDur=median(tops.map(x=>x.durH));
      o.cohMed=median(coh.map(x=>x.vpm));
      o.fresh=coh.filter(x=>x.ageM!=null&&x.ageM<=6).length;
    }else o.pct=null;
    o.verdict=o.ageM<1?'early':(o.pct==null?'early':(o.pct>=70?'over':(o.pct>=40?'inline':'under')));
    o.reco=v.recoN!=null?DATA.recos.find(r=>r.n===v.recoN):null;
    return o;
  });
  const SD=(window.STUDIO_DATA&&window.STUDIO_DATA.d)||{};
  out.forEach(o=>{o.st=SD[o.vid]||null;});
  const chMed=median(out.map(x=>x.vpm));
  const ctrMed=median(out.map(x=>x.st?x.st.ctr:null));
  const awpMed=median(out.map(x=>x.st?x.st.awp:null));
  const awtMed=median(out.map(x=>x.st?x.st.awtMs:null));
  const scored=out.filter(x=>x.vpm!=null);
  out.forEach(o=>{
    o.chMed=chMed;o.ctrMed=ctrMed;o.awpMed=awpMed;o.awtMed=awtMed;
    o.pctCh=(o.vpm!=null&&scored.length>1)?Math.round(scored.filter(x=>x.vpm<o.vpm).length/(scored.length-1)*100):null;
    o.diags=anaDiags(o);
  });
  _anaCache=out;_anaT=SYNCED;
  return out;
}
function fmtWatch(ms){
  if(ms==null)return '—';
  const s=Math.round(ms/1000),hh=Math.floor(s/3600),mm=Math.floor(s%3600/60),ss=s%60;
  return (hh?hh+':'+String(mm).padStart(2,'0'):mm)+':'+String(ss).padStart(2,'0');
}
function anaDiags(o){
  const d=[];
  if(o.verdict==='early'){d.push('Too young to judge — needs a few more weeks of daily scans.');return d;}
  if(o.pct==null)return d;
  if(o.vNow!=null&&o.vpm!=null){
    if(o.vNow>o.vpm*1.3)d.push('Accelerating: current pace ('+fmtN(o.vNow)+'/mo measured) beats its lifetime average — the algorithm is still pushing it.');
    else if(o.vNow<o.vpm*0.5)d.push('Decelerating: current pace ('+fmtN(o.vNow)+'/mo measured) is well below its lifetime average — the push phase is over.');
  }
  if(o.cohMed!=null&&o.vpm!=null){
    if(o.vpm<o.cohMed)d.push('Below the genre bar: '+fmtN(o.vpm)+' views/mo vs a median of '+fmtN(o.cohMed)+' across '+fmtInt(o.cohN)+' competing '+o.gk+' videos.');
    else d.push('Above the genre median ('+fmtN(o.cohMed)+' views/mo across '+fmtInt(o.cohN)+' competing '+o.gk+' videos).');
  }
  if(o.topDur!=null&&o.durH!=null){
    const ratio=o.durH/o.topDur;
    if(ratio<0.45)d.push('Short for the winners’ format: top '+o.gk+' performers run '+fmtDur(o.topDur)+' median, this one is '+fmtDur(o.durH)+' — longer mixes capture sleep/focus watch sessions.');
    else if(ratio>2.5)d.push('Much longer than the winning format ('+fmtDur(o.topDur)+' median for top performers).');
  }
  if(o.fresh!=null){
    if(o.fresh>o.cohN*0.35)d.push('Crowded niche right now: '+fmtInt(o.fresh)+' competing '+o.gk+' videos published in the last 6 months.');
  }
  if(o.st){
    if(o.st.ctr!=null&&o.ctrMed!=null){
      if(o.st.ctr<o.ctrMed*0.75&&o.st.imp>1e6)d.push('Weak packaging: '+o.st.ctr.toFixed(1)+'% CTR vs '+o.ctrMed.toFixed(1)+'% channel median on '+fmtN(o.st.imp)+' impressions \u2014 YouTube showed it, viewers didn\u2019t click. Thumbnail/title are the first suspects.');
      else if(o.st.ctr>o.ctrMed*1.25)d.push('Strong packaging: '+o.st.ctr.toFixed(1)+'% CTR vs '+o.ctrMed.toFixed(1)+'% channel median \u2014 the thumbnail/title pull clicks.');
    }
    if(o.st.awp!=null&&o.awpMed!=null){
      if(o.st.awp<o.awpMed*0.5)d.push('Retention gap: viewers watch '+o.st.awp.toFixed(0)+'% of the video vs '+o.awpMed.toFixed(0)+'% channel median'+((o.durH||0)>=6?' \u2014 partly expected on very long sleep mixes, judge with average duration ('+fmtWatch(o.st.awtMs)+')':' \u2014 the content doesn\u2019t hold the session')+'.');
      else if(o.st.awp>o.awpMed*1.4)d.push('Excellent retention: '+o.st.awp.toFixed(0)+'% average watched vs '+o.awpMed.toFixed(0)+'% channel median.');
    }
    if(o.verdict==='under'&&o.st.ctr!=null&&o.ctrMed!=null&&o.awpMed!=null&&o.st.ctr>=o.ctrMed&&o.st.awp>=o.awpMed)d.push('CTR and retention are both healthy \u2014 the shortfall likely comes from topic demand or impression volume, not execution.');
  }
  if(o.chMed!=null&&o.vpm!=null){
    const r=o.vpm/o.chMed;
    if(r>=1.5)d.push('One of the channel\u2019s strongest launches: \u00d7'+r.toFixed(1)+' the channel\u2019s median velocity ('+fmtN(o.chMed)+' views/mo).');
    else if(r<=0.5)d.push('Well below the channel\u2019s own median ('+fmtN(o.chMed)+' views/mo, this one at \u00d7'+r.toFixed(1)+') \u2014 the audience that usually shows up didn\u2019t.');
  }
  if(o.reco&&o.reco.pot){
    const p=o.reco.pot[0];
    if((p==='S'||p==='A')&&o.verdict==='under')d.push('Prediction gap: reco #'+Math.round(o.reco.n)+' was rated '+p+' potential but the video underperforms — packaging (title/thumbnail) is the prime suspect, to confirm with Studio CTR data.');
    if(p==='S'&&o.verdict==='over')d.push('Prediction confirmed: rated S potential and delivering.');
  }
  return d;
}

/* ================= LIVESTREAMS ================= */
const LIKES={};let LQ=[],LRUN=0;
function fetchLikes(vid,cb){
  if(vid in LIKES){cb(LIKES[vid]);return;}
  LQ.push([vid,cb]);pumpLikes();
}
function pumpLikes(){
  while(LRUN<5&&LQ.length){
    const q=LQ.shift();LRUN++;
    fetch('https://returnyoutubedislikeapi.com/votes?videoId='+q[0])
      .then(r=>r.ok?r.json():null).then(j=>{LIKES[q[0]]=(j&&j.likes!=null)?j.likes:null;})
      .catch(()=>{LIKES[q[0]]=null;})
      .then(()=>{LRUN--;q[1](LIKES[q[0]]);pumpLikes();});
  }
}
function fillLikes(){
  document.querySelectorAll('[data-likes]').forEach(el=>{
    const vid=el.getAttribute('data-likes');el.removeAttribute('data-likes');
    fetchLikes(vid,n=>{if(n!=null){el.innerHTML='👍 '+fmtN(n);el.style.display='';}else el.remove();});
  });
}
function likeTag(vid){return vid?'<span class="tag ghost" style="display:none" data-likes="'+vid+'"></span>':'';}
function liveSeries(vid){
  const a=((DATA.liveHist&&DATA.liveHist[vid])||[]).concat((DATA.liveHourly&&DATA.liveHourly[vid])||[]);
  a.sort((x,y)=>x[0]-y[0]);
  const out=[];let last=null;
  for(const p of a){if(p[0]!==last){out.push(p);last=p[0];}}
  return out;
}
function liveNow(vid){const s=liveSeries(vid);return s.length?s[s.length-1][1]:null;}
function livePeak(vid){const s=liveSeries(vid);return s.length?Math.max.apply(null,s.map(p=>p[1])):null;}
function isOurs(ch){return /lofi girl|lofi records/i.test(ch||'');}
function filterLives(){
  let rows=DATA.lives||[];
  if(LS.q){const q=LS.q.toLowerCase();rows=rows.filter(v=>(v.title+' '+v.channel+' '+v.disc).toLowerCase().includes(q));}
  const sf=LS.sort;
  return [...rows].sort((a,b)=>{
    if(sf==='now')return (liveNow(b.vid)||0)-(liveNow(a.vid)||0);
    if(sf==='peak')return (livePeak(b.vid)||0)-(livePeak(a.vid)||0);
    if(sf==='started')return (b.started||0)-(a.started||0);
    if(sf==='channel')return String(a.channel).localeCompare(String(b.channel));
    return 0;
  });
}
function livesHTML(){
  const rows=filterLives();const all=DATA.lives||[];

const WLS={tab:'v'};
function wlGet(){try{return Object.assign({v:[],l:[],c:[]},JSON.parse(localStorage.getItem('radar_wl')||'{}'));}catch(e){return {v:[],l:[],c:[]};}}
function wlSet(w){try{localStorage.setItem('radar_wl',JSON.stringify(w));}catch(e){}}
function wlHas(t,k){return wlGet()[t].includes(k);}
function toggleWatch(t,k,ev){
  if(ev)ev.stopPropagation();
  const w=wlGet();const i=w[t].indexOf(k);
  if(i>=0)w[t].splice(i,1);else w[t].push(k);
  wlSet(w);renderNav();
  if(ev&&ev.target){ev.target.textContent=w[t].includes(k)?'⭐':'☆';ev.target.title=w[t].includes(k)?'Remove from watchlist':'Add to watchlist';}
  if(route==='watch')render();
}
function wlStar(t,k){
  const on=wlHas(t,k);
  return '<button class="wl-star'+(on?' on':'')+'" title="'+(on?'Remove from watchlist':'Add to watchlist')+'" onclick="toggleWatch(\''+t+'\',\''+String(k).replace(/'/g,"\\'")+'\',event)">'+(on?'⭐':'☆')+'</button>';
}
function aiRisk(c){
  if(!c)return 0;
  let s=0;
  if(c.ageY!=null&&c.ageY<2)s+=2;else if(c.ageY!=null&&c.ageY<3.5)s+=1;
  if(c.upMo!=null&&c.upMo>=15)s+=2;else if(c.upMo!=null&&c.upMo>=8)s+=1;
  if(c.nvid!=null&&c.ageY>0.2&&c.nvid/c.ageY>250)s+=1;
  if(c.viewsYr!=null&&c.ageY!=null&&c.ageY<2&&c.viewsYr>20000000)s+=1;
  return s;
}
function aiBadge(c){
  const s=aiRisk(c);
  if(s>=4)return '<span class="tag" style="background:#f8717122;color:#f87171;border:1px solid #f8717155" title="Very young channel with industrial output cadence — AI music/visual pipeline likely">🤖 AI likely</span>';
  if(s>=2)return '<span class="tag" style="background:#fbbf2422;color:#fbbf24;border:1px solid #fbbf2455" title="Output pace and channel age suggest possible AI-assisted music/visuals">🤖 AI possible</span>';
  return '';
}
function chanByUrl(u){
  if(!CHAN||!u)return null;
  const k=normUrl(u);return CHAN.channels.find(c=>normUrl(c.url)===k)||null;
}
function watchHTML(){
  const w=wlGet();
  const tabs=[['v','🎬 Videos',w.v.length],['l','📺 Livestreams',w.l.length],['c','📡 Channels',w.c.length]];
  let hh='<div class="seg">'+tabs.map(t=>'<button class="'+(WLS.tab===t[0]?'on':'')+'" onclick="WLS.tab=\''+t[0]+'\';render()">'+t[1]+'<span class="cnt">'+t[2]+'</span></button>').join('')+'</div>';
  if(WLS.tab==='v'){
    const rows=mixRows().filter(x=>x.vid&&w.v.includes(x.vid));

  return s;
}
