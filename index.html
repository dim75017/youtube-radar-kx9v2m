<script>
/* ================= RECOMMENDATIONS ================= */
function validState(v){
  if(!v||v==='')return '';
  if(v==='-')return 'no';
  if(/^x\s*$/i.test(v))return 'x';
  return 'note';
}
function filterRecos(){
  let rows=DATA.recos;
  if(RS.genres.size)rows=rows.filter(r=>RS.genres.has(r.genre||'(unset)'));
  if(RS.pot)rows=rows.filter(r=>r.pot&&r.pot.startsWith(RS.pot));
  if(RS.perso)rows=rows.filter(r=>r.perso===RS.perso);
  if(RS.val==='x')rows=rows.filter(r=>validState(r.valid)==='x');
  else if(RS.val==='note')rows=rows.filter(r=>validState(r.valid)==='note');
  else if(RS.val==='any')rows=rows.filter(r=>validState(r.valid)==='x'||validState(r.valid)==='note');
  else if(RS.val==='pending')rows=rows.filter(r=>!validState(r.valid));
  if(RS.q){const q=RS.q.toLowerCase();rows=rows.filter(r=>(r.title+' '+r.niche+' '+r.concept+' '+r.perso+' '+r.kw).toLowerCase().includes(q));}
  const sf=RS.sort;
  return [...rows].sort((a,b)=>sf==='n'?(a.n-b.n):(((b[sf]!=null?b[sf]:b.score)||0)-((a[sf]!=null?a[sf]:a.score)||0)));
}
function recosHTML(){
  const all=DATA.recos;
  const rows=filterRecos();
  const genres=[...new Set(all.map(r=>r.genre||'(unset)'))].sort();
  const persos=[...new Set(all.map(r=>r.perso).filter(Boolean))].sort();
  let h='<div class="toolbar">'+
    '<div class="search">'+ICONS.search+'<input placeholder="Search concepts, titles, niches…" value="'+esc(RS.q)+'" oninput="RS.q=this.value;RS.limit=80;rerenderRecos()"><kbd>/</kbd></div>'+
    '<select class="ctl" onchange="RS.pot=this.value;rerenderRecos()">'+
      '<option value="">All potential</option>'+['S','A','B','C'].map(p=>'<option '+(RS.pot===p?'selected':'')+' value="'+p+'">'+({S:'S — Rente potentielle',A:'A — Fort',B:'B — Solide',C:'C — Niche / à tester'})[p]+'</option>').join('')+'</select>'+
    '<select class="ctl" onchange="RS.perso=this.value;rerenderRecos()">'+
      '<option value="">All characters</option>'+persos.map(p=>'<option '+(RS.perso===p?'selected':'')+' value="'+esc(p)+'">'+esc(p)+'</option>').join('')+'</select>'+
    '<select class="ctl" onchange="RS.val=this.value;rerenderRecos()">'+
      '<option value="">Any status</option><option '+(RS.val==='x'?'selected':'')+' value="x">✓ Validated</option><option '+(RS.val==='note'?'selected':'')+' value="note">📝 With Dim note</option><option '+(RS.val==='any'?'selected':'')+' value="any">Validated or noted</option><option '+(RS.val==='pending'?'selected':'')+' value="pending">Pending review</option></select>'+
    '<select class="ctl" onchange="RS.sort=this.value;rerenderRecos()">'+
      '<option value="scoreAdj">Sort · Adjusted score</option><option '+(RS.sort==='score'?'selected':'')+' value="score">Sort · Score</option><option '+(RS.sort==='conf'?'selected':'')+' value="conf">Sort · Confidence</option><option '+(RS.sort==='n'?'selected':'')+' value="n">Sort · N°</option></select>'+
    '<div class="result-count"><b>'+fmtInt(rows.length)+'</b> concepts</div>'+
  '</div>';
  h+='<div class="chips" style="margin-bottom:18px">'+genres.map(g=>{
    const c=gcolor(g),on=RS.genres.has(g);
    return '<span class="chip '+(on?'on':'')+'" style="--chipbg:'+c+'22;--chipbd:'+c+'66" onclick="toggleRGenre(\''+esc(g).replace(/'/g,"\\'")+'\')"><span class="dot" style="background:'+c+'"></span>'+esc(g)+' <span style="opacity:.55;font-weight:500">'+all.filter(r=>(r.genre||'(unset)')===g).length+'</span></span>';
  }).join('')+'</div>';
  h+='<div id="reco-list">'+recoListHTML(rows)+'</div>';
  return h;
}
function toggleRGenre(g){RS.genres.has(g)?RS.genres.delete(g):RS.genres.add(g);RS.limit=80;render();}
function rerenderRecos(){
  const rows=filterRecos();
  const el=document.getElementById('reco-list');if(el)el.innerHTML=recoListHTML(rows);
  const rc=document.querySelector('.result-count');if(rc)rc.innerHTML='<b>'+fmtInt(rows.length)+'</b> concepts';
  armAutoLoad();
}
function recoListHTML(rows){
  if(!rows.length)return '<div class="empty">Nothing matches — try clearing filters.</div>';
  const page=rows.slice(0,RS.limit);
  window._pageRecos=page;
  let h=page.map((r,i)=>{
    const vs=validState(r.valid);
    const vbadge=vs==='x'?'<span class="tag val-x rvalid">✓ Validé</span>':vs==='note'?'<span class="tag val-note rvalid">📝 Note Dim</span>':vs==='no'?'<span class="tag val-no rvalid">–</span>':'';
    const pot=r.pot?('<span class="tag rpot pot-'+r.pot[0]+'">'+esc(r.pot)+'</span>'):'';
    const score=(r.scoreAdj!=null?r.scoreAdj:r.score);
    return '<div class="rcard" style="--gc:'+gcolor(r.genre)+'" id="rc'+i+'">'+
      '<div class="rhead" onclick="document.getElementById(\'rc'+i+'\').classList.toggle(\'open\')">'+
        '<span class="rnum">#'+Math.round(r.n)+'</span>'+
        '<div class="rtitle">'+esc(r.title)+'<div style="margin-top:5px;display:flex;gap:5px;flex-wrap:wrap">'+gtag(r.genre)+ghosttag(r.perso)+ghosttag(r.niche)+(r.dur?ghosttag(r.dur):'')+'</div></div>'+
        vbadge+pot+'<span class="rscore" title="Adjusted score">'+(score!=null?Math.round(score):'—')+'</span>'+
      '</div>'+
      '<div class="rbody">'+
        (vs==='note'||vs==='no'?'<div class="note-dim"><b>Note Dim (Validé)</b>'+esc(r.valid)+'</div>':'')+
        recoRow('Concept',r.concept)+recoRow('Thumbnail scene',r.scene)+recoRow('Music style',r.style)+
        recoRow('Launch format',r.launch)+recoRow('Data note',r.noteData)+recoRow('Reco Claude',r.recoClaude)+
        recoRow('Recalibrage',r.recal)+
        (r.conf!=null?recoRow('Confidence',Math.round(r.conf)+' / 100'):'')+(r.status?recoRow('Status',r.status):'')+
        (r.desc?'<div class="rrow"><div class="k">Description</div><div class="v">'+esc(r.desc)+'<br><button class="copybtn" onclick="copyTxt(this,'+i+',\'desc\')">⧉ Copy description</button></div></div>':'')+
        (r.kw?'<div class="rrow"><div class="k">SEO keywords</div><div class="v" style="color:var(--muted)">'+esc(r.kw)+'<br><button class="copybtn" onclick="copyTxt(this,'+i+',\'kw\')">⧉ Copy keywords</button> <button class="copybtn" onclick="copyTxt(this,'+i+',\'title\')">⧉ Copy title</button></div></div>':'')+
      '</div></div>';
  }).join('');
  if(rows.length>RS.limit)h+='<button class="load-more" onclick="RS.limit+=120;rerenderRecos()">Loading more · '+fmtInt(rows.length-RS.limit)+' remaining</button>';
  return h;
}
function recoRow(k,v){return v?'<div class="rrow"><div class="k">'+k+'</div><div class="v">'+esc(v)+'</div></div>':'';}
function copyTxt(btn,i,field){
  const r=window._pageRecos[i];if(!r)return;
  navigator.clipboard.writeText(r[field]||'').then(()=>{
    const old=btn.textContent;btn.textContent='✓ Copied';btn.classList.add('done');
    setTimeout(()=>{btn.textContent=old;btn.classList.remove('done');},1400);
  });
}

/* ================= ROADMAP ================= */
function roadmapHTML(){
  let rows=DATA.roadmap.filter(r=>r.date);
  const genres=[...new Set(DATA.roadmap.map(r=>r.genre).filter(Boolean))].sort();
  if(RM.src)rows=rows.filter(r=>r.src===RM.src);
  if(RM.genre)rows=rows.filter(r=>r.genre===RM.genre);
  rows.sort((a,b)=>a.date-b.date);
  let h='<div class="toolbar">'+
    '<select class="ctl" onchange="RM.src=this.value;render()">'+
      '<option value="">All sources</option>'+['Existant (Monday)','Nouveau mix (à produire)','Proposition rotation (à valider)'].map(s=>'<option '+(RM.src===s?'selected':'')+' value="'+esc(s)+'">'+esc(s)+'</option>').join('')+'</select>'+
    '<select class="ctl" onchange="RM.genre=this.value;render()">'+
      '<option value="">All genres</option>'+genres.map(g=>'<option '+(RM.genre===g?'selected':'')+' value="'+esc(g)+'">'+esc(g)+'</option>').join('')+'</select>'+
    '<div class="result-count"><b>'+rows.length+'</b> releases · '+
      '<span style="color:var(--muted)">gris Monday</span> · <span style="color:var(--green)">vert à produire</span> · <span style="color:var(--amber)">jaune à valider</span></div>'+
  '</div>';
  h+=calHTML(rows);
  h+='<div class="month-h" style="position:static;margin-top:34px">📋 All releases<span class="cnt">'+rows.length+'</span><span class="line"></span></div>';
  const now=Date.now()-86400000*3;
  let curMonth='';
  rows.forEach((r,i)=>{
    const d=new Date(r.date);
    const mk=MONTHS[d.getMonth()]+' '+d.getFullYear();
    if(mk!==curMonth){
      curMonth=mk;
      const cnt=rows.filter(x=>{const xd=new Date(x.date);return MONTHS[xd.getMonth()]+' '+xd.getFullYear()===mk;}).length;
      h+='<div class="month-h">'+mk+'<span class="cnt">'+cnt+' release'+(cnt>1?'s':'')+'</span><span class="line"></span></div>';
    }
    const srcClass=/Monday/.test(r.src)?'src-monday':/Nouveau/.test(r.src)?'src-new':'src-rot';
    const past=r.date<now?'opacity:.5':'';
    h+='<div class="rm-wrap" id="rm'+i+'" style="'+past+'">'+
      '<div class="rm-item" style="--gc:'+gcolor(r.genre)+'" onclick="document.getElementById(\'rm'+i+'\').classList.toggle(\'open\')">'+
        '<div class="rm-date"><div class="dd">'+d.getDate()+'</div><div class="wd">'+esc((r.jour||'').slice(0,3))+'</div></div>'+
        '<div class="rm-main"><div class="rm-t">'+esc(r.title)+'</div>'+
          '<div class="rm-tags">'+gtag(r.genre)+ghosttag(r.perso)+(r.dur?ghosttag(r.dur):'')+(r.niche?ghosttag(r.niche):'')+'</div></div>'+
        '<span class="tag '+srcClass+'">'+esc((r.src||'').replace(/\s*\(.*\)/,''))+'</span>'+
      '</div>'+
      '<div class="rm-body" style="--gc:'+gcolor(r.genre)+'">'+
        recoRow('Concept',r.concept)+recoRow('Thumbnail scene',r.scene)+recoRow('Music style',r.style)+
        recoRow('Cadence',r.cadence)+recoRow('Seasonal note',r.note)+
      '</div></div>';
  });
  return h;
}
function calShift(d){const b=RM.cal?new Date(RM.cal):new Date();b.setDate(1);b.setMonth(b.getMonth()+d);RM.cal=b.getTime();render();}
function calToday(){RM.cal=Date.now();render();}
function calHTML(rows){
  const base=RM.cal?new Date(RM.cal):new Date();
  const y=base.getFullYear(),m=base.getMonth();
  const MFULL=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const first=new Date(y,m,1);
  const start=new Date(y,m,1-((first.getDay()+6)%7));
  const today=new Date();today.setHours(0,0,0,0);
  const key=d=>d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();
  const byDay={};rows.forEach(r=>{const k=key(new Date(r.date));(byDay[k]=byDay[k]||[]).push(r);});
  let h='<div class="cal-nav">'+
    '<button class="ctl-btn arrow" onclick="calShift(-1)" title="Previous month">‹</button>'+
    '<div class="cal-month">'+MFULL[m]+' '+y+'</div>'+
    '<button class="ctl-btn arrow" onclick="calShift(1)" title="Next month">›</button>'+
    '<button class="ctl-btn today" onclick="calToday()">Today</button></div>';
  h+='<div class="cal"><div class="cal-head">'+['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(x=>'<div>'+x+'</div>').join('')+'</div><div class="cal-grid">';
  for(let i=0;i<42;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);
    const evs=byDay[key(d)]||[];
    h+='<div class="cal-cell'+(d.getMonth()!==m?' out':'')+(d.getTime()===today.getTime()?' today':'')+'">'+
      '<span class="d">'+String(d.getDate()).padStart(2,'0')+'</span><div class="pills">'+
      evs.map(r=>{const c=gcolor(r.genre);
        return '<div class="cal-pill" style="background:'+c+'" title="'+esc(r.title+' — '+(r.genre||'?')+' · '+(r.perso||'')+' · '+(r.src||''))+'">'+esc(r.title)+'</div>';}).join('')+
      '</div></div>';
  }
  h+='</div></div>';
  const lg=[...new Set(rows.map(r=>r.genre).filter(Boolean))];
  h+='<div class="cal-legend">'+lg.map(g=>'<span><i style="background:'+gcolor(g)+'"></i>'+esc(g)+'</span>').join('')+'</div>';
  return h;
}


/* ================= LIVESTREAMS ================= */
const LIKES={};let LQ=[],LRUN=0;
function fetchLikes(vid,cb){
  if(vid in LIKES){cb(LIKES[vid]);return;}
  LQ.push([vid,cb]);pumpLikes();
}
function pumpLikes(){
  while(LRUN<5&&LQ.length){
    const q=LQ.shift();LRUN++;
    fetch('https://returnyoutubedislikeapi.com/votes?videoId='+q[0])
      .then(r=>r.ok?r.json():null).then(j=>{LIKES[q[0]]=(j&&j.likes!=null)?j.likes:null;})
      .catch(()=>{LIKES[q[0]]=null;})
      .then(()=>{LRUN--;q[1](LIKES[q[0]]);pumpLikes();});
  }
}
function fillLikes(){
  document.querySelectorAll('[data-likes]').forEach(el=>{
    const vid=el.getAttribute('data-likes');el.removeAttribute('data-likes');
    fetchLikes(vid,n=>{if(n!=null){el.innerHTML='👍 '+fmtN(n);el.style.display='';}else el.remove();});
  });
}
function likeTag(vid){return vid?'<span class="tag ghost" style="display:none" data-likes="'+vid+'"></span>':'';}
function liveSeries(vid){
  const a=((DATA.liveHist&&DATA.liveHist[vid])||[]).concat((DATA.liveHourly&&DATA.liveHourly[vid])||[]);
  a.sort((x,y)=>x[0]-y[0]);
  const out=[];let last=null;
  for(const p of a){if(p[0]!==last){out.push(p);last=p[0];}}
  return out;
}
function liveNow(vid){const s=liveSeries(vid);return s.length?s[s.length-1][1]:null;}
function livePeak(vid){const s=liveSeries(vid);return s.length?Math.max.apply(null,s.map(p=>p[1])):null;}
function isOurs(ch){return /lofi girl|lofi records/i.test(ch||'');}
function filterLives(){
  let rows=DATA.lives||[];
  if(LS.q){const q=LS.q.toLowerCase();rows=rows.filter(v=>(v.title+' '+v.channel+' '+v.disc).toLowerCase().includes(q));}
  const sf=LS.sort;
  return [...rows].sort((a,b)=>{
    if(sf==='now')return (liveNow(b.vid)||0)-(liveNow(a.vid)||0);
    if(sf==='peak')return (livePeak(b.vid)||0)-(livePeak(a.vid)||0);
    if(sf==='started')return (b.started||0)-(a.started||0);
    if(sf==='channel')return String(a.channel).localeCompare(String(b.channel));
    return 0;
  });
}
function livesHTML(){
  const rows=filterLives();const all=DATA.lives||[];
  if(!all.length)return '<div class="empty">No livestream data yet — the 📡 Live Streams tab of the Sheet is empty or missing. It fills up on the next ChatGPT scan.</div>';
  const nows=all.map(v=>liveNow(v.vid)).filter(x=>x!=null);
  const total=nows.reduce((s,x)=>s+x,0);
  const top=[...all].sort((a,b)=>(liveNow(b.vid)||0)-(liveNow(a.vid)||0))[0];
  const oursN=all.filter(v=>isOurs(v.channel)).length;
  const kpi=(lbl,val,sub,c)=>'<div class="kpi" style="--kc:'+c+'"><div class="k-lbl">'+lbl+'</div><div class="k-val">'+val+'</div><div class="k-sub">'+sub+'</div></div>';
  let h='<div class="kpis">'+
    kpi('Streams tracked',fmtInt(all.length),'found on the scan keywords','#8b7cf6')+
    kpi('Watching now',fmtN(total),'combined concurrent viewers at last scan','#f472b6')+
    kpi('Top stream',fmtN(top?liveNow(top.vid):null),esc(top?top.channel:'—'),'#fbbf24')+
    kpi('Lofi Girl live',String(oursN),'of our streams surfacing in results','#a78bfa')+
  '</div>';
  h+='<div class="toolbar">'+
    '<div class="search">'+ICONS.search+'<input placeholder="Search streams, channels, keywords…" value="'+esc(LS.q)+'" oninput="LS.q=this.value;LS.limit=60;rerenderLives()"><kbd>/</kbd></div>'+
    '<select class="ctl" onchange="LS.sort=this.value;rerenderLives()">'+
      '<option value="now">Sort · Viewers now</option><option '+(LS.sort==='peak'?'selected':'')+' value="peak">Sort · Peak viewers</option><option '+(LS.sort==='started'?'selected':'')+' value="started">Sort · Recently started</option><option '+(LS.sort==='channel'?'selected':'')+' value="channel">Sort · Channel</option></select>'+
    '<div class="viewtoggle">'+
      '<button class="'+(LS.mode==='grid'?'on':'')+'" onclick="LS.mode=\'grid\';render()" title="Grid">'+ICONS.grid+'</button>'+
      '<button class="'+(LS.mode==='table'?'on':'')+'" onclick="LS.mode=\'table\';render()" title="Table">'+ICONS.rows+'</button></div>'+
    '<div class="result-count"><b>'+fmtInt(rows.length)+'</b> streams</div>'+
  '</div>';
  h+='<div id="live-list">'+liveListHTML(rows)+'</div>';
  return h;
}
function liveCardHTML(v,i){
  const now=liveNow(v.vid),peak=livePeak(v.vid);
  const kws=(v.disc||'').split(',').map(s=>s.trim()).filter(Boolean).slice(0,2);
  return '<div class="vcard" onclick="openLiveIdx('+i+')">'+
    '<div class="thumbwrap"><img loading="lazy" src="'+thumb(v.vid)+'" onerror="if(!this._f){this._f=1;this.src=\'https://i.ytimg.com/vi/'+v.vid+'/hqdefault.jpg\'}else this.style.visibility=\'hidden\'">'+
      '<span class="vpm-flag" style="background:rgba(220,38,38,.94);color:#fff">🔴 '+fmtN(now)+' watching</span>'+
      '<span class="like-flag" style="display:none" data-likes="'+v.vid+'"></span>'+
      (peak!=null?'<span class="dur">peak '+fmtN(peak)+'</span>':'')+'</div>'+
    '<div class="vbody">'+
      '<div class="vtitle">'+esc(v.title)+'</div>'+
      '<div class="vmeta"><a href="'+esc(v.url)+'" target="_blank" onclick="event.stopPropagation()">'+esc(v.channel)+'</a></div>'+
      '<div class="vtags">'+(isOurs(v.channel)?'<span class="tag" style="background:#a78bfa22;color:#a78bfa;border:1px solid #a78bfa55">OURS</span>':'')+kws.map(ghosttag).join('')+'</div>'+
      '<div class="vstats">'+
        '<div class="vstat hl"><b>'+fmtN(now)+'</b><span>watching now</span></div>'+
        '<div class="vstat"><b>'+fmtN(peak)+'</b><span>peak</span></div>'+
        '<div class="vstat"><b>'+fmtDate(v.started)+'</b><span>started</span></div>'+
      '</div></div></div>';
}
function liveListHTML(rows){
  if(!rows.length)return '<div class="empty">Nothing matches — try clearing the search.</div>';
  const page=rows.slice(0,LS.limit);
  window._page_live=page;
  if(LS.mode==='grid'){
    let g='<div class="vgrid">'+page.map((v,i)=>liveCardHTML(v,i)).join('')+'</div>';
    if(rows.length>LS.limit)g+='<button class="load-more" onclick="LS.limit+=120;rerenderLives()">Loading more · '+fmtInt(rows.length-LS.limit)+' remaining</button>';
    return g;
  }
  let h='<table class="vtable"><thead><tr><th></th><th>Stream</th><th>Channel</th><th>👀 Now</th><th>Peak</th><th>Started</th><th>Discovery keywords</th></tr></thead><tbody>'+
    page.map((v,i)=>{
      const now=liveNow(v.vid),peak=livePeak(v.vid);
      return '<tr class="row" onclick="openLiveIdx('+i+')">'+
      '<td><img class="tthumb" loading="lazy" src="'+thumb(v.vid)+'" onerror="if(!this._f){this._f=1;this.src=\'https://i.ytimg.com/vi/'+v.vid+'/hqdefault.jpg\'}else this.style.visibility=\'hidden\'"></td>'+
      '<td class="ttitle">'+(isOurs(v.channel)?'<span class="tag" style="background:#a78bfa22;color:#a78bfa;border:1px solid #a78bfa55;margin-right:7px">OURS</span>':'')+esc(v.title)+'</td>'+
      '<td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(v.channel)+'</td>'+
      '<td class="num vpmcell">'+fmtN(now)+'</td><td class="num">'+fmtN(peak)+'</td>'+
      '<td class="num">'+fmtDate(v.started)+'</td>'+
      '<td style="max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);font-size:11.5px">'+esc(v.disc)+'</td></tr>';
    }).join('')+'</tbody></table>';
  if(rows.length>LS.limit)h+='<button class="load-more" onclick="LS.limit+=120;rerenderLives()">Loading more · '+fmtInt(rows.length-LS.limit)+' remaining</button>';
  return h;
}
function rerenderLives(){
  const rows=filterLives();
  const el=document.getElementById('live-list');
  if(el)el.innerHTML=liveListHTML(rows);
  const rc=document.querySelector('.result-count');if(rc)rc.innerHTML='<b>'+fmtInt(rows.length)+'</b> streams';
  armAutoLoad();fillLikes();
}
function openLiveIdx(i){const v=(window._page_live||[])[i];if(v)openLiveDrawer(v);}
function openLiveDrawer(v){
  const s=liveSeries(v.vid);
  document.getElementById('drawer').innerHTML=
    '<button class="dw-close" onclick="closeDrawer()">✕</button>'+
    '<div class="dw-embed"><iframe src="https://www.youtube.com/embed/'+v.vid+'?rel=0" title="YouTube player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>'+
    '<div class="dw-body">'+
      '<div class="dw-title"><a href="'+esc(v.url)+'" target="_blank">'+esc(v.title)+'</a></div>'+
      '<div class="dw-sub">'+(isOurs(v.channel)?gtag('Lofi Girl'):ghosttag(v.channel))+'<span class="tag ghost">🔴 live</span>'+likeTag(v.vid)+'</div>'+
      '<div class="dw-stats">'+
        '<div class="dw-stat hl"><b>'+fmtN(liveNow(v.vid))+'</b><span>watching now</span></div>'+
        '<div class="dw-stat"><b>'+fmtN(livePeak(v.vid))+'</b><span>peak measured</span></div>'+
        '<div class="dw-stat"><b>'+fmtDate(v.started)+'</b><span>started</span></div>'+
        '<div class="dw-stat"><b>'+s.length+'</b><span>scans</span></div>'+
      '</div>'+
      '<div class="dw-sec"><div class="k">📡 Concurrent viewers</div>'+histChart(s,'viewers')+'</div>'+
      (v.disc?'<div class="dw-sec"><div class="k">🔎 Discovery keywords</div><div class="v">'+esc(v.disc)+'</div></div>':'')+
    '</div>';
  document.getElementById('drawer').classList.add('show');
  document.getElementById('backdrop').classList.add('show');
  document.getElementById('drawer').scrollTop=0;
  fillLikes();
}

/* ================= CHANNELS ================= */
function handleOf(u){const m=String(u||'').match(/@([^\/?]+)/);if(m)return '@'+m[1];const m2=String(u||'').match(/channel\/(UC[\w-]+)/);return m2?m2[1]:'';}
function chAva(c,size){
  const col=gcolor(c.niche);
  const hd=handleOf(c.url);
  return '<span class="ch-ava" style="width:'+size+'px;height:'+size+'px;background:'+col+'22;color:'+col+'">'+esc((c.name||'?').charAt(0).toUpperCase())+(hd?'<img loading="lazy" src="https://unavatar.io/youtube/'+encodeURIComponent(hd)+'?fallback=false" onerror="this.remove()">':'')+'</span>';
}
const FLAGS={'Japon':'jp','Norvège':'no','États-Unis':'us','Australie':'au','Italie':'it','Portugal':'pt','Ukraine':'ua','Royaume-Uni':'gb','Danemark':'dk','France':'fr','Corée du Sud':'kr','Suisse':'ch','Lituanie':'lt','Pays-Bas':'nl','Espagne':'es','Slovaquie':'sk','Canada':'ca','Kazakhstan':'kz','Irlande':'ie','Allemagne':'de','Estonie':'ee','Slovénie':'si','Inde':'in','Afrique du Sud':'za','Bulgarie':'bg','Islande':'is','Belgique':'be','Autriche':'at','Suède':'se','Finlande':'fi','Pologne':'pl','Grèce':'gr','Brésil':'br','Mexique':'mx','Indonésie':'id','Vietnam':'vn','Thaïlande':'th','Philippines':'ph','Turquie':'tr','Russie':'ru','Roumanie':'ro','Tchéquie':'cz','République tchèque':'cz','Hongrie':'hu','Nouvelle-Zélande':'nz','Argentine':'ar','Colombie':'co','Chili':'cl','Israël':'il','Taïwan':'tw','Chine':'cn','Hong Kong':'hk','Singapour':'sg','Malaisie':'my','Maroc':'ma','Égypte':'eg','Nigéria':'ng','Pakistan':'pk','Bangladesh':'bd','Sri Lanka':'lk','Népal':'np','Lettonie':'lv','Croatie':'hr','Serbie':'rs','Biélorussie':'by','Géorgie':'ge','Arménie':'am','Azerbaïdjan':'az','Luxembourg':'lu','Norway':'no'};
function flagOf(c){const k=FLAGS[c];return k?'<img class="flg" loading="lazy" src="https://flagcdn.com/20x15/'+k+'.png" alt="">':'';}
function chanSeries(url,idx){
  if(!CHAN||!CHAN.hist)return null;
  const a=CHAN.hist[normUrl(url)];if(!a)return null;
  return a.filter(p=>p[idx]!=null).map(p=>[p[0],p[idx]]);
}
function filterChans(){
  let rows=CHAN.channels;
  if(CS.niches.size)rows=rows.filter(c=>CS.niches.has(c.niche||'(unset)'));
  if(CS.q){const q=CS.q.toLowerCase();rows=rows.filter(c=>(c.name+' '+c.niche+' '+c.country).toLowerCase().includes(q));}
  const sf=CS.sort;
  return [...rows].sort((a,b)=>sf==='name'?String(a.name).localeCompare(String(b.name)):(((b[sf]!=null?b[sf]:0))-((a[sf]!=null?a[sf]:0))));
}
function chanHTML(){
  if(!CHAN){
    return CHAN_ERR
      ? '<div class="err-box"><h3>Channel audit unavailable</h3><p>'+esc(CHAN_ERR)+'<br><br>The channel audit lives in a separate Google Sheet and needs live access — open this page from the hosted link.</p><button class="load-more" onclick="loadChan()">Retry</button></div>'
      : '<div class="empty">Loading the channel audit Sheet… <span class="spin-inline"></span></div>';
  }
  const all=CHAN.channels,rows=filterChans();
  const totalSubs=all.reduce((s,c)=>s+(c.subs||0),0);
  const active=all.filter(c=>/actif/i.test(c.status)).length;
  const medYr=median(all.map(c=>c.viewsYr));
  const kpi=(lbl,val,sub,c)=>'<div class="kpi" style="--kc:'+c+'"><div class="k-lbl">'+lbl+'</div><div class="k-val">'+val+'</div><div class="k-sub">'+sub+'</div></div>';
  let h='<div class="kpis">'+
    kpi('Channels tracked',fmtInt(all.length),'competitive audit, updated by the scan','#8b7cf6')+
    kpi('Combined subscribers',fmtN(totalSubs),'across all tracked channels','#f472b6')+
    kpi('Median views / year',fmtN(medYr),'the bar a serious channel clears','#fbbf24')+
    kpi('Active channels',fmtInt(active),'uploaded recently per audit status','#34d399')+
  '</div>';
  const niches=[...new Set(all.map(c=>c.niche||'(unset)'))].sort((a,b)=>all.filter(c=>(c.niche||'(unset)')===b).length-all.filter(c=>(c.niche||'(unset)')===a).length);
  h+='<div class="toolbar">'+
    '<div class="search">'+ICONS.search+'<input placeholder="Search channels, niches, countries…" value="'+esc(CS.q)+'" oninput="CS.q=this.value;CS.limit=150;rerenderChans()"><kbd>/</kbd></div>'+
    '<select class="ctl" onchange="CS.sort=this.value;rerenderChans()">'+
      '<option value="subs">Sort · Subscribers</option><option '+(CS.sort==='viewsYr'?'selected':'')+' value="viewsYr">Sort · Views / year</option><option '+(CS.sort==='avg10'?'selected':'')+' value="avg10">Sort · Avg last 10</option><option '+(CS.sort==='upMo'?'selected':'')+' value="upMo">Sort · Uploads / month</option><option '+(CS.sort==='lastUp'?'selected':'')+' value="lastUp">Sort · Last upload</option><option '+(CS.sort==='name'?'selected':'')+' value="name">Sort · Name</option></select>'+
    '<div class="result-count"><b>'+fmtInt(rows.length)+'</b> channels</div>'+
  '</div>';
  h+='<div class="chips" style="margin-bottom:18px">'+niches.map(n=>{
    const c=gcolor(n),on=CS.niches.has(n);
    return '<span class="chip '+(on?'on':'')+'" style="--chipbg:'+c+'22;--chipbd:'+c+'66" onclick="toggleNiche(\''+esc(n).replace(/'/g,"\\'")+'\')"><span class="dot" style="background:'+c+'"></span>'+esc(n)+' <span style="opacity:.55;font-weight:500">'+all.filter(x=>(x.niche||'(unset)')===n).length+'</span></span>';
  }).join('')+'</div>';
  h+='<div id="chan-list">'+chanListHTML(rows)+'</div>';
  return h;
}
function toggleNiche(n){const s=CS.niches;s.has(n)?s.delete(n):s.add(n);CS.limit=150;render();}
function chanListHTML(rows){
  if(!rows.length)return '<div class="empty">Nothing matches — try clearing filters.</div>';
  const page=rows.slice(0,CS.limit);
  window._page_chan=page;
  let h='<table class="vtable"><thead><tr><th>Channel</th><th>Niche</th><th>Country</th><th>Subs</th><th>Total views</th><th>Views / yr</th><th>Avg last 10</th><th>Up / mo</th><th>Last upload</th><th>Status</th></tr></thead><tbody>'+
    page.map((c,i)=>'<tr class="row" onclick="openChanIdx('+i+')">'+
      '<td><div style="display:flex;align-items:center;gap:10px">'+chAva(c,34)+'<span class="ttitle">'+esc(c.name)+'</span></div></td>'+
      '<td>'+gtag(c.niche)+'</td>'+
      '<td style="white-space:nowrap">'+flagOf(c.country)+' '+esc(c.country||'—')+'</td>'+
      '<td class="num vpmcell">'+fmtN(c.subs)+'</td><td class="num">'+fmtN(c.views)+'</td>'+
      '<td class="num">'+fmtN(c.viewsYr)+'</td><td class="num">'+fmtN(c.avg10)+'</td>'+
      '<td class="num">'+(c.upMo!=null?c.upMo:'—')+'</td><td class="num">'+fmtDateFull(c.lastUp)+'</td>'+
      '<td><span class="tag ghost">'+esc(c.status||'—')+'</span></td></tr>').join('')+'</tbody></table>';
  if(rows.length>CS.limit)h+='<button class="load-more" onclick="CS.limit+=150;rerenderChans()">Loading more · '+fmtInt(rows.length-CS.limit)+' remaining</button>';
  return h;
}
function rerenderChans(){
  const rows=filterChans();
  const el=document.getElementById('chan-list');
  if(el)el.innerHTML=chanListHTML(rows);
  const rc=document.querySelector('.result-count');if(rc)rc.innerHTML='<b>'+fmtInt(rows.length)+'</b> channels';
  armAutoLoad();
}
function openChanIdx(i){const c=(window._page_chan||[])[i];if(c)openChanDrawer(c);}
function openDashLive(i){const v=(window._dash_lives||[])[i];if(v)openLiveDrawer(v);}
function openDashChan(i){const c=(window._dash_chans||[])[i];if(c)openChanDrawer(c);}
function openChanDrawer(c){
  const subsPts=chanSeries(c.url,1),viewsPts=chanSeries(c.url,2);
  document.getElementById('drawer').innerHTML=
    '<button class="dw-close" onclick="closeDrawer()">✕</button>'+
    '<div class="dw-body" style="padding-top:26px">'+
      '<div class="dw-title" style="display:flex;align-items:center;gap:12px">'+chAva(c,44)+'<a href="'+esc(c.url)+'" target="_blank">'+esc(c.name)+' ↗</a></div>'+
      '<div class="dw-sub">'+gtag(c.niche)+ghosttag(c.country)+ghosttag(c.status)+(c.ageY!=null?'<span class="tag ghost">'+c.ageY+' yrs old</span>':'')+'</div>'+
      '<div class="dw-stats">'+
        '<div class="dw-stat hl"><b>'+fmtN(c.subs)+'</b><span>subscribers</span></div>'+
        '<div class="dw-stat"><b>'+fmtN(c.views)+'</b><span>total views</span></div>'+
        '<div class="dw-stat"><b>'+fmtN(c.viewsYr)+'</b><span>views / year</span></div>'+
        '<div class="dw-stat"><b>'+fmtN(c.avg10)+'</b><span>avg last 10</span></div>'+
      '</div>'+
      '<div class="dw-sec"><div class="k">📚 Catalog</div><div class="v">'+fmtInt(c.nvid)+' videos · '+fmtN(c.avgVid)+' avg views / video · '+(c.upMo!=null?c.upMo+' uploads / month':'cadence unknown')+' · last upload '+fmtDateFull(c.lastUp)+'</div></div>'+
      '<div class="dw-sec"><div class="k">📈 Subscribers</div>'+histChart(subsPts,'subs')+'</div>'+
      '<div class="dw-sec"><div class="k">📈 Total views</div>'+histChart(viewsPts,'views')+'</div>'+
    '</div>';
  document.getElementById('drawer').classList.add('show');
  document.getElementById('backdrop').classList.add('show');
  document.getElementById('drawer').scrollTop=0;
  fillLikes();
}

boot();
</script>
