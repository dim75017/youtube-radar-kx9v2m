{"prerender":[{"source":"list","urls":["spotify/"],"eagerness":"immediate"}]}
</script>
<script>
(()=>{
  window.__RADAR_WAS_PRERENDERED=!!document.prerendering;
  if(!(HTMLScriptElement.supports&&HTMLScriptElement.supports('speculationrules'))){
    ['spotify/','Spotify_Radar_data.js','Spotify_Playlists_data.js','Spotify_Labels_data.js','Spotify_Soundcharts_data_20260720T0217_editorial_strict.js?v=0217editorialstrict'].forEach(href=>{
      const hint=document.createElement('link');
      hint.rel='prefetch';hint.href=href;if(/\.js(?:\?|$)/.test(href))hint.as='script';
      document.head.appendChild(hint);
    });
  }
})();
</script>

<script>
/* Always fetch the snapshot fresh. GitHub Pages and a previous script tag may
   otherwise keep an old radar timestamp in the browser cache. */
window.__radarDataReady=fetch('Lofi_Radar_data.js?payload='+Date.now(),{cache:'no-store'})
  .then(r=>{if(!r.ok)throw new Error('Snapshot HTTP '+r.status);return r.text();})
  .then(src=>{Function(src)();return window.LOFI_DATA;});
</script>
