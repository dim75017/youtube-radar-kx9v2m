name: Inspect Spotify A&R rebuild payload

on:
  pull_request:
    paths:
      - '.github/workflows/inspect-rebuild-payload.yml'

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Decode and inspect payload
        run: |
          set -euo pipefail
          cat .rebuild-payload/part-* > /tmp/spotify-ar-rebuild.b64
          base64 --decode /tmp/spotify-ar-rebuild.b64 > /tmp/spotify-ar-rebuild.tar.gz
          sha256sum /tmp/spotify-ar-rebuild.tar.gz | tee /tmp/payload-sha.txt
          wc -c /tmp/spotify-ar-rebuild.b64 /tmp/spotify-ar-rebuild.tar.gz | tee /tmp/payload-size.txt
          tar -tzf /tmp/spotify-ar-rebuild.tar.gz | tee /tmp/payload-files.txt
      - uses: actions/upload-artifact@v4
        with:
          name: spotify-ar-rebuild-payload
          path: |
            /tmp/spotify-ar-rebuild.tar.gz
            /tmp/payload-sha.txt
            /tmp/payload-size.txt
            /tmp/payload-files.txt
          retention-days: 2
