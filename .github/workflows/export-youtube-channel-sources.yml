name: Export YouTube channel sources

on:
  push:
    branches:
      - agent/fix-youtube-subscriber-growth-ui
    paths:
      - '.github/workflows/export-youtube-channel-sources.yml'
  pull_request:
    paths:
      - '.github/workflows/export-youtube-channel-sources.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          fetch-depth: 0
      - name: Package current YouTube channel sources
        run: |
          zip -9 youtube-channel-sources.zip \
            index.html \
            assets/css/dashboard.css \
            assets/js/dashboard-01-config.js \
            assets/js/dashboard-02-helpers.js \
            assets/js/dashboard-03-keywords.js \
            assets/js/dashboard-04-recommendations.js \
            refresh_channels_monthly.py \
            refresh_youtube_daily.py \
            .github/workflows/refresh-channel-radar.yml \
            .github/workflows/refresh-instrumental-radar.yml \
            Lofi_Radar_chx.js \
            Lofi_Radar_subs2.js \
            Lofi_Radar_sbm.js \
            Lofi_Radar_data.js \
            tests/test_refresh_channels_monthly.py \
            tests/test_refresh_youtube_daily.py
      - uses: actions/upload-artifact@v4
        with:
          name: youtube-channel-sources
          path: youtube-channel-sources.zip
          retention-days: 2
