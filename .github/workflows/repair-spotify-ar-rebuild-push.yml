name: Repair Spotify A&R rebuild on branch push

on:
  push:
    branches:
      - agent/rebuild-spotify-ar-engine
    paths:
      - '.github/workflows/repair-spotify-ar-rebuild-push.yml'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rebuild-spotify-ar-engine
          fetch-depth: 0
      - name: Repair reconstruction block and cleanup list
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/apply-spotify-ar-rebuild.yml')
          text = path.read_text(encoding='utf-8')
          old = '''          cat .rebuild-payload/part-* > /tmp/spotify-ar-rebuild.b64
          base64 --decode /tmp/spotify-ar-rebuild.b64 > /tmp/spotify-ar-rebuild.tar.gz
          echo '022fa7bebdf024fc1a3934031bb9603534df284236629775bbdf9fbbc3a004a2  /tmp/spotify-ar-rebuild.tar.gz' | sha256sum -c -
          tar -xzf /tmp/spotify-ar-rebuild.tar.gz
          patch --batch --forward -p1 < patches/dashboard.patch
          patch --batch --forward -p1 < patches/dashboard-css.patch
          rm -rf patches .rebuild-payload
'''
          new = '''          python3 - <<'PYRECOVER'
          from pathlib import Path
          import base64
          import hashlib
          import zlib

          encoded = ''.join(part.read_text(encoding='utf-8').strip() for part in sorted(Path('.rebuild-payload').glob('part-*')))
          raw = base64.b64decode(encoded, validate=True)
          if raw[:3] != b'\\x1f\\x8b\\x08':
              raise SystemExit('Rebuild payload is not gzip data')
          flags = raw[3]
          cursor = 10
          if flags & 4:
              extra_length = int.from_bytes(raw[cursor:cursor + 2], 'little')
              cursor += 2 + extra_length
          for bit in (8, 16):
              if flags & bit:
                  cursor = raw.index(b'\\0', cursor) + 1
          if flags & 2:
              cursor += 2
          recovered = zlib.decompress(raw[cursor:-8], -15)
          digest = hashlib.sha256(recovered).hexdigest()
          expected = 'c2a753f00737882641bb9d9f028f6e6bcc75fbc51aab93bfdbc3e0a28af377cf'
          if digest != expected:
              raise SystemExit(f'Unexpected recovered tar SHA-256: {digest}')
          Path('/tmp/spotify-ar-rebuild.tar').write_bytes(recovered)
          PYRECOVER
          tar -xf /tmp/spotify-ar-rebuild.tar
          python3 - <<'PYFIX'
          from pathlib import Path
          path = Path('sync_soundcharts_opportunities.py')
          text = path.read_text(encoding='utf-8')
          broken = '     "scoretraction",\\n    ""scorerecency",\\n    ""scorerelationship",'
          fixed = '    "score_traction",\\n    "score_recency",\\n    "score_relationship",'
          if broken not in text:
              raise SystemExit('Expected opportunity schema typo was not found')
          path.write_text(text.replace(broken, fixed, 1), encoding='utf-8')
          PYFIX
          patch --batch --forward -p1 < patches/dashboard.patch
          patch --batch --forward -p1 < patches/dashboard-css.patch
          rm -rf patches .rebuild-payload
'''
          if old not in text:
              raise SystemExit('Broken reconstruction block was not found')
          text = text.replace(old, new, 1)
          cleanup_anchor = '''            .github/workflows/probe-soundcharts-artist-links.yml \\
            .github/workflows/apply-spotify-ar-rebuild.yml \\
'''
          cleanup_replacement = '''            .github/workflows/probe-soundcharts-artist-links.yml \\
            .github/workflows/probe-soundcharts-top-songs.yml \\
            .github/workflows/inspect-rebuild-payload.yml \\
            .github/workflows/export-rebuild-payload-raw.yml \\
            .github/workflows/repair-spotify-ar-rebuild-workflow.yml \\
            .github/workflows/repair-spotify-ar-rebuild-push.yml \\
            .github/workflows/apply-spotify-ar-rebuild.yml \\
'''
          if cleanup_anchor not in text:
              raise SystemExit('Cleanup anchor was not found')
          text = text.replace(cleanup_anchor, cleanup_replacement, 1)
          report_anchor = '''            soundcharts-song-metadata-probe.json \\
            soundcharts-artist-links-probe.json
'''
          report_replacement = '''            soundcharts-song-metadata-probe.json \\
            soundcharts-artist-links-probe.json \\
            soundcharts-top-songs-probe.json
'''
          if report_anchor not in text:
              raise SystemExit('Report cleanup anchor was not found')
          path.write_text(text.replace(report_anchor, report_replacement, 1), encoding='utf-8')
          PY
      - name: Commit repaired workflow
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/apply-spotify-ar-rebuild.yml
          git diff --cached --check
          git commit -m 'Repair Spotify A&R rebuild payload recovery'
          git pull --rebase origin agent/rebuild-spotify-ar-engine
          git push origin HEAD:agent/rebuild-spotify-ar-engine
