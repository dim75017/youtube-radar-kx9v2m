name: Materialize editorial playlist discovery

on:
  push:
    branches:
      - agent/activate-playlist-discovery
    paths:
      - '.github/workflows/apply-editorial-playlist-production.yml'
  pull_request:
    paths:
      - '.github/workflows/apply-editorial-playlist-production.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/activate-playlist-discovery
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Diagnose production-patch recovery
        id: recovery
        continue-on-error: true
        shell: bash
        run: |
          exec > >(tee recovery.log) 2>&1
          set -euxo pipefail
          pwd
          git status --short
          find .playlist-editorial-payload .editorial-playlist-patch -maxdepth 1 -type f -print -exec wc -c {} \; 2>/dev/null || true
          if compgen -G '.playlist-editorial-payload/part-*' >/dev/null; then
            cat .playlist-editorial-payload/part-* > "$RUNNER_TEMP/editorial-playlist.b64"
            wc -c "$RUNNER_TEMP/editorial-playlist.b64"
            base64 --decode "$RUNNER_TEMP/editorial-playlist.b64" > "$RUNNER_TEMP/editorial-playlist.gz"
            file "$RUNNER_TEMP/editorial-playlist.gz"
            gzip -dc "$RUNNER_TEMP/editorial-playlist.gz" > "$RUNNER_TEMP/editorial-playlist.diff"
          elif compgen -G '.editorial-playlist-patch/part-*' >/dev/null; then
            cat .editorial-playlist-patch/part-* > "$RUNNER_TEMP/editorial-playlist.b64"
            wc -c "$RUNNER_TEMP/editorial-playlist.b64"
            base64 --decode "$RUNNER_TEMP/editorial-playlist.b64" > "$RUNNER_TEMP/editorial-playlist.xz"
            file "$RUNNER_TEMP/editorial-playlist.xz"
            xz -dc "$RUNNER_TEMP/editorial-playlist.xz" > "$RUNNER_TEMP/editorial-playlist.diff"
          else
            echo 'No editorial-playlist payload found' >&2
            exit 1
          fi
          wc -c "$RUNNER_TEMP/editorial-playlist.diff"
          head -20 "$RUNNER_TEMP/editorial-playlist.diff"
          git apply --check "$RUNNER_TEMP/editorial-playlist.diff"
          git apply "$RUNNER_TEMP/editorial-playlist.diff"
          git status --short
          test -f discover_soundcharts_playlists.py
          test -f tests/test_discover_soundcharts_playlists.py
          echo 'RECOVERY_OK'

      - name: Upload recovery diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: editorial-playlist-recovery-diagnostic
          path: recovery.log
          retention-days: 2

      - name: Stop after diagnostic
        if: always()
        run: test '${{ steps.recovery.outcome }}' = 'success'
