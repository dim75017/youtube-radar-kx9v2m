name: Export current radar sources

on:
  push:
    branches:
      - agent/playlist-editorial-discovery
    paths:
      - '.github/workflows/export-current-radar-sources.yml'
  pull_request:
    paths:
      - '.github/workflows/export-current-radar-sources.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          fetch-depth: 0
      - name: Package current production sources and fixtures
        shell: bash
        run: |
          set -euo pipefail
          # Export the latest branch state after reopening the pull request.
          zip -9 current-radar-sources.zip \
            .github/workflows/refresh-channel-radar.yml \
            .github/workflows/refresh-soundcharts.yml \
            assets/css/dashboard.css \
            assets/js/dashboard-02-helpers.js \
            expand_soundcharts_instrumental_pool.py \
            refresh_channels_monthly.py \
            spotify/dashboard.js \
            sync_soundcharts_opportunities.py \
            tests/test_dashboard_opportunity_guardrails.js \
            tests/test_dashboard_general_view_guardrails.js \
            tests/test_refresh_channels_monthly.py \
            tests/test_refresh_soundcharts_daily.py \
            tests/test_expand_soundcharts_instrumental_pool.py \
            tests/test_sync_soundcharts_opportunities.py \
            tests/test_prepare_soundcharts_snapshot.py \
            refresh_soundcharts_daily.py \
            prepare_soundcharts_snapshot.py \
            Spotify_Playlists_data.js \
            Spotify_Performance_data.js \
            soundcharts-instrumental-cache.json \
            index.html \
            Lofi_Radar_chx.js \
            Lofi_Radar_sbm.js
      - uses: actions/upload-artifact@v4
        with:
          name: current-radar-sources
          path: current-radar-sources.zip
          retention-days: 2
