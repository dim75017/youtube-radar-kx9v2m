name: Probe Soundcharts artist song pages

on:
  push:
    branches:
      - agent/rebuild-spotify-ar-engine
    paths:
      - '.github/workflows/probe-soundcharts-song-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rebuild-spotify-ar-engine
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Inspect bulk artist-song response shape
        env:
          SOUNDCHARTS_CLIENT_ID: ${{ secrets.SOUNDCHARTS_CLIENT_ID }}
          SOUNDCHARTS_CLIENT_SECRET: ${{ secrets.SOUNDCHARTS_CLIENT_SECRET }}
          SOUNDCHARTS_TEAM_ID: dsomoguy-api
        run: |
          python3 - <<'PY'
          from __future__ import annotations
          import json
          import urllib.parse
          from pathlib import Path
          from refresh_soundcharts_daily import SoundchartsClient

          client = SoundchartsClient(
              __import__('os').environ.get('SOUNDCHARTS_CLIENT_ID', ''),
              __import__('os').environ.get('SOUNDCHARTS_CLIENT_SECRET', ''),
              __import__('os').environ.get('SOUNDCHARTS_TEAM_ID', ''),
          )
          client.authenticate()

          artists = [
              ('18dff8e6-e621-4a35-97b0-b26d1eaa0fce', 'Lofi Fruits Music'),
              ('4ef4de8a-d40b-4508-b6cc-cd431fdfe95a', 'ChillTide'),
              ('11e83fe0-3787-454c-a7a3-a0369fe50396', 'Johann Sebastian Bach'),
          ]

          def shape(value, depth=0):
              if depth > 3:
                  return type(value).__name__
              if isinstance(value, dict):
                  return {str(k): shape(v, depth + 1) for k, v in value.items()}
              if isinstance(value, list):
                  return [shape(value[0], depth + 1)] if value else []
              return type(value).__name__

          def redact(item):
              if not isinstance(item, dict):
                  return item
              allowed = {
                  'uuid','name','creditName','releaseDate','label','copyright','duration','explicit',
                  'genres','artists','isrc','streaming','popularity','spotifyStream','spotifyPopularity',
                  'platforms','identifiers','imageUrl','appUrl','stats','audience','metric','value','total',
                  'week','month','quarter','change','percent','updatedAt'
              }
              out = {}
              for key, value in item.items():
                  if key not in allowed:
                      continue
                  if key in {'imageUrl','appUrl'}:
                      out[key] = bool(value)
                  else:
                      out[key] = value
              return out

          report = {
              'auth_mode': client.auth_mode,
              'quota_start': client.quota_remaining,
              'queries': [],
          }
          for uuid, name in artists:
              query = urllib.parse.urlencode({
                  'offset': 0,
                  'limit': 5,
                  'sortBy': 'spotifyStream',
                  'sortOrder': 'desc',
              })
              path = f'/api/v2/artist/{urllib.parse.quote(uuid)}/songs?{query}'
              payload = client.get(path)
              items = payload.get('items', []) if isinstance(payload, dict) else []
              report['queries'].append({
                  'artist': name,
                  'uuid': uuid,
                  'top_level_keys': sorted(payload.keys()) if isinstance(payload, dict) else [],
                  'page': payload.get('page') if isinstance(payload, dict) else None,
                  'related_shape': shape(payload.get('related')) if isinstance(payload, dict) else None,
                  'item_count': len(items) if isinstance(items, list) else 0,
                  'item_keys': sorted(items[0].keys()) if items and isinstance(items[0], dict) else [],
                  'item_shape': shape(items[0]) if items else None,
                  'sample': redact(items[0]) if items else None,
              })
          report['quota_end'] = client.quota_remaining
          Path('soundcharts-song-page-probe.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          print(json.dumps(report, ensure_ascii=False))
          PY

      - name: Commit safe probe report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add soundcharts-song-page-probe.json
          git diff --cached --quiet && exit 0
          git commit -m "Record Soundcharts bulk song page shape"
          git pull --rebase origin agent/rebuild-spotify-ar-engine
          git push origin HEAD:agent/rebuild-spotify-ar-engine
