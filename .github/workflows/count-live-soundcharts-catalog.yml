name: Count live Soundcharts catalog

on:
  push:
    branches:
      - agent/full-track-inventory
    paths:
      - .github/workflows/count-live-soundcharts-catalog.yml

permissions:
  contents: write

jobs:
  count:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/full-track-inventory
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Enumerate artist discographies from the live Soundcharts API
        env:
          SOUNDCHARTS_CLIENT_ID: ${{ secrets.SOUNDCHARTS_CLIENT_ID }}
          SOUNDCHARTS_CLIENT_SECRET: ${{ secrets.SOUNDCHARTS_CLIENT_SECRET }}
        run: |
          python3 - <<'PY'
          from __future__ import annotations

          import concurrent.futures
          import json
          import math
          import os
          import re
          import threading
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          from collections import Counter
          from pathlib import Path
          from typing import Any

          API = 'https://customer.api.soundcharts.com'
          PREFIX = 'window.SPOTIFY_SOUNDCHARTS='
          APP_ID = os.environ.get('SOUNDCHARTS_CLIENT_ID', '').strip().strip('"\'')
          API_KEY = os.environ.get('SOUNDCHARTS_CLIENT_SECRET', '').strip().strip('"\'')
          if not APP_ID or not API_KEY:
              raise SystemExit('Soundcharts credentials are missing')

          payload_text = Path('Spotify_Soundcharts_data.js').read_text(encoding='utf-8')
          if not payload_text.startswith(PREFIX):
              raise SystemExit('Unexpected Soundcharts export prefix')
          payload = json.loads(payload_text[len(PREFIX):].strip().removesuffix(';'))

          artist_schema = list(payload.get('schemas', {}).get('artists', []))
          artist_rows = payload.get('artists', [])

          def field(row: list[Any], name: str) -> Any:
              try:
                  index = artist_schema.index(name)
              except ValueError:
                  return None
              return row[index] if index < len(row) else None

          artists: list[tuple[str, str]] = []
          seen_artists: set[str] = set()
          for row in artist_rows:
              uuid = str(field(row, 'soundcharts_uuid') or '').strip()
              name = str(field(row, 'name') or '').strip()
              if uuid and uuid not in seen_artists:
                  seen_artists.add(uuid)
                  artists.append((uuid, name))
          if not artists:
              raise SystemExit('No Soundcharts artist UUIDs available')

          headers = {
              'x-app-id': APP_ID,
              'x-api-key': API_KEY,
              'Accept': 'application/json',
              'User-Agent': 'Lofi-Radar-Soundcharts-Catalog-Audit/1.0',
          }

          quota_lock = threading.Lock()
          quota_remaining: int | None = None
          request_count = 0
          request_lock = threading.Lock()
          rate_lock = threading.Lock()
          next_request_at = 0.0

          def throttle() -> None:
              # Stay comfortably below Soundcharts' documented 5,000 calls/minute.
              global next_request_at
              with rate_lock:
                  now = time.monotonic()
                  target = max(now, next_request_at)
                  next_request_at = target + 0.025  # <= 2,400 requests/minute
                  delay = target - now
              if delay > 0:
                  time.sleep(delay)

          def call(path: str, retries: int = 4) -> tuple[int, Any, dict[str, str]]:
              global quota_remaining, request_count
              url = API + path
              last_error: Exception | None = None
              for attempt in range(retries):
                  throttle()
                  request = urllib.request.Request(url, headers=headers)
                  with request_lock:
                      request_count += 1
                  try:
                      with urllib.request.urlopen(request, timeout=45) as response:
                          body = response.read().decode('utf-8')
                          response_headers = dict(response.headers)
                          raw_quota = response_headers.get('x-quota-remaining') or response_headers.get('X-Quota-Remaining')
                          try:
                              parsed_quota = int(raw_quota) if raw_quota is not None else None
                          except (TypeError, ValueError):
                              parsed_quota = None
                          if parsed_quota is not None:
                              with quota_lock:
                                  quota_remaining = parsed_quota
                          return response.status, json.loads(body), response_headers
                  except urllib.error.HTTPError as exc:
                      response_headers = dict(exc.headers)
                      raw_quota = response_headers.get('x-quota-remaining') or response_headers.get('X-Quota-Remaining')
                      try:
                          parsed_quota = int(raw_quota) if raw_quota is not None else None
                      except (TypeError, ValueError):
                          parsed_quota = None
                      if parsed_quota is not None:
                          with quota_lock:
                              quota_remaining = parsed_quota
                      if exc.code in {400, 401, 403, 404}:
                          try:
                              body = json.loads(exc.read().decode('utf-8'))
                          except Exception:
                              body = None
                          return exc.code, body, response_headers
                      last_error = exc
                      retry_after = response_headers.get('Retry-After') or response_headers.get('retry-after')
                      try:
                          delay = float(retry_after) if retry_after else 1.5 * (attempt + 1)
                      except ValueError:
                          delay = 1.5 * (attempt + 1)
                      time.sleep(min(20, max(0.5, delay)))
                  except (urllib.error.URLError, TimeoutError, json.JSONDecodeError) as exc:
                      last_error = exc
                      time.sleep(min(12, 1.5 * (attempt + 1)))
              raise RuntimeError(f'Soundcharts request failed after retries: {type(last_error).__name__}')

          def page_total(body: Any) -> int | None:
              if not isinstance(body, dict):
                  return None
              page = body.get('page')
              if isinstance(page, dict) and isinstance(page.get('total'), (int, float)):
                  return int(page['total'])
              return None

          def page_items(body: Any) -> list[Any]:
              if isinstance(body, dict) and isinstance(body.get('items'), list):
                  return body['items']
              return []

          uuid_re = re.compile(r'^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$', re.I)

          def song_identity(item: Any) -> tuple[str | None, str | None, str | None]:
              if not isinstance(item, dict):
                  return None, None, None
              candidates = [item]
              for key in ('song', 'object', 'track'):
                  child = item.get(key)
                  if isinstance(child, dict):
                      candidates.append(child)
              song_uuid = None
              title = None
              spotify_id = None
              for candidate in candidates:
                  for key in ('uuid', 'songUuid', 'song_uuid'):
                      value = candidate.get(key)
                      if isinstance(value, str) and uuid_re.match(value):
                          song_uuid = value
                          break
                  if not title:
                      for key in ('name', 'title'):
                          value = candidate.get(key)
                          if isinstance(value, str) and value.strip():
                              title = value.strip()
                              break
                  for key in ('spotifyId', 'spotify_id'):
                      value = candidate.get(key)
                      if isinstance(value, str) and value.strip():
                          spotify_id = value.strip()
                          break
                  if song_uuid and spotify_id:
                      break
              # Some collection shapes expose platform IDs in arrays or nested links.
              if not spotify_id:
                  stack = [item]
                  while stack:
                      current = stack.pop()
                      if isinstance(current, dict):
                          platform = str(current.get('platform') or current.get('platformCode') or '').lower()
                          identifier = current.get('identifier') or current.get('id') or current.get('value')
                          if platform == 'spotify' and isinstance(identifier, str) and identifier.strip():
                              spotify_id = identifier.strip().rsplit('/', 1)[-1].split('?', 1)[0]
                              break
                          stack.extend(current.values())
                      elif isinstance(current, list):
                          stack.extend(current)
              return song_uuid, spotify_id, title

          favorite_probe: dict[str, Any] = {}
          try:
              status, body, _ = call('/api/v2/favorite/artists?offset=0&limit=20')
              favorite_probe = {
                  'status': status,
                  'total': page_total(body),
                  'items_returned': len(page_items(body)),
                  'top_level_keys': sorted(body.keys()) if isinstance(body, dict) else [],
              }
          except Exception as exc:
              favorite_probe = {'error': type(exc).__name__}

          def fetch_artist_catalog(entry: tuple[str, str]) -> dict[str, Any]:
              artist_uuid, artist_name = entry
              query = urllib.parse.urlencode({
                  'offset': 0,
                  'limit': 100,
                  'sortBy': 'releaseDate',
                  'sortOrder': 'desc',
              })
              status, body, _ = call(f'/api/v2/artist/{urllib.parse.quote(artist_uuid)}/songs?{query}')
              if status != 200:
                  return {
                      'artist_uuid': artist_uuid,
                      'artist_name': artist_name,
                      'status': status,
                      'total': 0,
                      'items': [],
                      'shape': sorted(body.keys()) if isinstance(body, dict) else [],
                  }
              total = page_total(body)
              first_items = page_items(body)
              if total is None:
                  total = len(first_items)
              all_items = list(first_items)
              for offset in range(100, total, 100):
                  page_query = urllib.parse.urlencode({
                      'offset': offset,
                      'limit': 100,
                      'sortBy': 'releaseDate',
                      'sortOrder': 'desc',
                  })
                  page_status, page_body, _ = call(f'/api/v2/artist/{urllib.parse.quote(artist_uuid)}/songs?{page_query}')
                  if page_status != 200:
                      return {
                          'artist_uuid': artist_uuid,
                          'artist_name': artist_name,
                          'status': page_status,
                          'total': total,
                          'items': all_items,
                          'partial': True,
                          'failed_offset': offset,
                          'shape': sorted(body.keys()) if isinstance(body, dict) else [],
                      }
                  all_items.extend(page_items(page_body))
              return {
                  'artist_uuid': artist_uuid,
                  'artist_name': artist_name,
                  'status': 200,
                  'total': total,
                  'items': all_items,
                  'shape': sorted(body.keys()) if isinstance(body, dict) else [],
              }

          results: list[dict[str, Any]] = []
          with concurrent.futures.ThreadPoolExecutor(max_workers=12) as pool:
              futures = [pool.submit(fetch_artist_catalog, artist) for artist in artists]
              for index, future in enumerate(concurrent.futures.as_completed(futures), 1):
                  try:
                      results.append(future.result())
                  except Exception as exc:
                      results.append({'status': 'exception', 'error': type(exc).__name__, 'total': 0, 'items': []})
                  if index % 250 == 0:
                      print(json.dumps({'artists_processed': index, 'artists_total': len(artists), 'requests': request_count, 'quota_remaining': quota_remaining}))

          status_counts = Counter(str(result.get('status')) for result in results)
          total_associations = sum(int(result.get('total') or 0) for result in results if result.get('status') == 200)
          returned_associations = sum(len(result.get('items') or []) for result in results if result.get('status') == 200)
          unique_song_uuids: set[str] = set()
          unique_spotify_ids: set[str] = set()
          title_keys: set[str] = set()
          item_shapes = Counter()
          sample_items: list[dict[str, Any]] = []
          artist_totals: list[dict[str, Any]] = []

          for result in results:
              if result.get('status') != 200:
                  continue
              artist_totals.append({
                  'artist_uuid': result.get('artist_uuid'),
                  'artist_name': result.get('artist_name'),
                  'total': result.get('total'),
                  'returned': len(result.get('items') or []),
              })
              for item in result.get('items') or []:
                  if isinstance(item, dict):
                      item_shapes[','.join(sorted(item.keys()))] += 1
                  song_uuid, spotify_id, title = song_identity(item)
                  if song_uuid:
                      unique_song_uuids.add(song_uuid)
                  if spotify_id:
                      unique_spotify_ids.add(spotify_id)
                  if title:
                      title_keys.add(title.casefold())
                  if len(sample_items) < 5:
                      sample_items.append({
                          'top_level_keys': sorted(item.keys()) if isinstance(item, dict) else [],
                          'song_uuid': song_uuid,
                          'spotify_id': spotify_id,
                          'title': title,
                      })

          artist_totals.sort(key=lambda item: int(item.get('total') or 0), reverse=True)
          total_values = [int(item.get('total') or 0) for item in artist_totals]
          report = {
              'generated_at': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
              'source': 'live_soundcharts_api_artist_songs',
              'endpoint': '/api/v2/artist/{uuid}/songs',
              'artists_from_current_soundcharts_export': len(artists),
              'favorite_artist_probe': favorite_probe,
              'artist_request_status_counts': dict(status_counts),
              'artists_successful': sum(1 for result in results if result.get('status') == 200),
              'artists_partial': sum(1 for result in results if result.get('partial')),
              'sum_of_artist_song_totals': total_associations,
              'associations_returned_across_all_pages': returned_associations,
              'unique_soundcharts_song_uuids': len(unique_song_uuids),
              'unique_spotify_ids_found_in_collection_shape': len(unique_spotify_ids),
              'unique_casefolded_titles': len(title_keys),
              'duplicate_artist_song_associations': max(0, total_associations - len(unique_song_uuids)),
              'requests_used_by_this_audit': request_count,
              'quota_remaining_after_audit': quota_remaining,
              'artist_song_total_statistics': {
                  'min': min(total_values) if total_values else None,
                  'max': max(total_values) if total_values else None,
                  'mean': round(sum(total_values) / len(total_values), 2) if total_values else None,
                  'median': sorted(total_values)[len(total_values) // 2] if total_values else None,
                  'artists_over_100_songs': sum(1 for value in total_values if value > 100),
                  'artists_over_500_songs': sum(1 for value in total_values if value > 500),
                  'artists_over_1000_songs': sum(1 for value in total_values if value > 1000),
              },
              'largest_artist_discographies': artist_totals[:25],
              'response_item_shapes': item_shapes.most_common(10),
              'sample_items': sample_items,
              'comparison_with_existing_exports': {
                  'legacy_spotify_radar_rows': len(json.loads(Path('Spotify_Radar_data.js').read_text(encoding='utf-8').split('=', 1)[1].strip().removesuffix(';')).get('rows', [])),
                  'current_soundcharts_track_rows': len(payload.get('tracks', [])),
                  'performance_track_entries': len(json.loads(Path('Spotify_Performance_data.js').read_text(encoding='utf-8').split('=', 1)[1].strip().removesuffix(';')).get('tracks', {})),
                  'coverage_discography_from_export': payload.get('coverage', {}).get('discography', {}),
              },
          }
          Path('soundcharts-live-catalog-count.json').write_text(json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          print(json.dumps(report, ensure_ascii=False))
          PY

      - name: Commit live Soundcharts count report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add soundcharts-live-catalog-count.json
          git diff --cached --quiet && exit 0
          git commit -m "Record live Soundcharts catalog count"
          git push origin HEAD:agent/full-track-inventory
