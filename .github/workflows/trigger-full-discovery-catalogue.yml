name: Launch one full discovery catalogue refresh

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/trigger-full-discovery-catalogue.yml'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Dispatch and record one production Soundcharts daily target
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          before="$(gh api "/repos/$GITHUB_REPOSITORY/actions/workflows/refresh-soundcharts.yml/runs?event=workflow_dispatch&branch=main&per_page=1" --jq '.workflow_runs[0].id // 0')"
          gh workflow run refresh-soundcharts.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f scope=daily_target \
            -f max_requests=8230
          for attempt in $(seq 1 30); do
            run_json="$(gh api "/repos/$GITHUB_REPOSITORY/actions/workflows/refresh-soundcharts.yml/runs?event=workflow_dispatch&branch=main&per_page=5")"
            run="$(jq -c --argjson before "$before" '.workflow_runs | map(select(.id != $before)) | sort_by(.created_at) | reverse | .[0] // empty' <<<"$run_json")"
            if [[ -n "$run" ]]; then
              jq -n --argjson run "$run" '{run_id:$run.id,status:$run.status,conclusion:$run.conclusion,head_sha:$run.head_sha,created_at:$run.created_at,updated_at:$run.updated_at,html_url:$run.html_url,workflow:"refresh-soundcharts.yml",scope:"daily_target",max_requests:8230}' \
                > full-discovery-production-run.json
              git config user.name 'github-actions[bot]'
              git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
              git add full-discovery-production-run.json
              git commit -m 'Record active full discovery production run'
              git pull --rebase origin main
              git push origin HEAD:main
              echo "Production run $(jq -r '.id' <<<"$run") dispatched and recorded."
              exit 0
            fi
            sleep 2
          done
          echo 'The production workflow was dispatched but its run ID was not observed.' >&2
          exit 1
