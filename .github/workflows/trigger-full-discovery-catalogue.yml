name: Observe the active full discovery catalogue refresh

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/trigger-full-discovery-catalogue.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  observe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Record the latest production Soundcharts daily target
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api "/repos/$GITHUB_REPOSITORY/actions/workflows/refresh-soundcharts.yml/runs?event=workflow_dispatch&branch=main&per_page=1" \
            --jq '.workflow_runs[0] | {run_id:.id,status:.status,conclusion:.conclusion,head_sha:.head_sha,created_at:.created_at,updated_at:.updated_at,html_url:.html_url,workflow:"refresh-soundcharts.yml",scope:"daily_target",max_requests:8230}' \
            > full-discovery-production-run.json
          test -s full-discovery-production-run.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add full-discovery-production-run.json
          git diff --cached --quiet && exit 0
          git commit -m 'Record latest full discovery production run'
          git pull --rebase origin main
          git push origin HEAD:main
