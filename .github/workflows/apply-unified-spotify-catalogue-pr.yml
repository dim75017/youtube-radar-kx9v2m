name: Materialize unified Spotify catalogue

on:
  pull_request:
    branches: [main]
    paths:
      - 'SPOTIFY_RADAR_POLICY.md'
      - 'build_spotify_browse_catalogue.py'
      - 'tests/test_build_spotify_browse_catalogue.py'
      - 'tests/test_spotify_catalogue_layers.js'
      - '.github/scripts/apply_unified_spotify_catalogue.py'
      - '.github/workflows/apply-unified-spotify-catalogue-pr.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: materialize-unified-spotify-catalogue
  cancel-in-progress: true

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unified-spotify-catalogue
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply the two-layer architecture
        run: python .github/scripts/apply_unified_spotify_catalogue.py

      - name: Validate browse catalogue builder
        run: |
          python -m unittest tests/test_build_spotify_browse_catalogue.py -v
          python -m py_compile build_spotify_browse_catalogue.py

      - name: Validate Soundcharts snapshot and opportunity logic
        run: |
          python -m unittest \
            tests/test_prepare_soundcharts_snapshot.py \
            tests/test_sync_soundcharts_opportunities.py \
            -v

      - name: Validate dashboard JavaScript syntax
        run: |
          node --check spotify/dashboard.js
          node --check spotify/coverage.js

      - name: Validate strict A&R guardrails
        run: node tests/test_dashboard_opportunity_guardrails.js

      - name: Validate browsing identity guardrails
        run: node tests/test_dashboard_general_view_guardrails.js

      - name: Validate streamlined A&R UI
        run: node tests/test_dashboard_ar_ui_guardrails.js

      - name: Validate player and editorial evidence UI
        run: node tests/test_spotify_full_catalogue.js

      - name: Validate coverage reporting
        run: node tests/test_spotify_coverage_reporting.js

      - name: Validate broad browse and strict A&R separation
        run: node tests/test_spotify_catalogue_layers.js

      - name: Validate workflow and diff
        run: |
          ruby -e "require 'yaml'; YAML.load_file('.github/workflows/refresh-spotify-browse-catalogue.yml'); puts 'browse workflow yaml ok'"
          git diff --check

      - name: Commit the materialized production files
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            .github/workflows/apply-unified-spotify-catalogue.yml \
            .github/workflows/apply-unified-spotify-catalogue-pr.yml \
            .github/scripts/apply_unified_spotify_catalogue.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Unify broad Spotify browsing with strict A&R'
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin agent/unified-spotify-catalogue && \
              git push origin HEAD:agent/unified-spotify-catalogue && exit 0
            sleep 5
          done
          exit 1
