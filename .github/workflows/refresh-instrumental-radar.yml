name: Refresh instrumental radar

on:
  schedule:
    - cron: '17 7 * * 1'
  push:
    paths:
      - '.github/radar-heartbeat.txt'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-instrumental-radar
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - name: Sync latest main
        run: git pull --ff-only origin main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --disable-pip-version-check --upgrade yt-dlp
      - run: python refresh_instrumental_extensions.py
        env:
          PYTHONUNBUFFERED: '1'
          RADAR_SNAPSHOT: Lofi_Radar_data.js
          RADAR_AVATARS: Lofi_Radar_new_channel_avatars.js
      - name: Commit refreshed snapshot and channel logos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Lofi_Radar_data.js Lofi_Radar_new_channel_avatars.js
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Refresh instrumental radar data and channel logos"
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            sleep 5
          done
          exit 1
