name: Apply daily Soundcharts synchronization fix

on:
  pull_request:
    paths:
      - '.github/workflows/apply-soundcharts-daily-fix.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install the corrected collector and browser history bridge
        shell: bash
        run: |
          python3 - <<'PYCODE'
          from pathlib import Path
          import base64
          import gzip

          files = {
              Path('refresh_soundcharts_daily.py'): '',
              Path('tests/test_refresh_soundcharts_daily.py'): '',
          }
          for path, encoded in files.items():
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_bytes(gzip.decompress(base64.b64decode(encoded)))

          performance = Path('Spotify_Performance_data.js')
          if not performance.exists():
              performance.write_text(
                  'window.SPOTIFY_PERFORMANCE={"source":"soundcharts_daily","generated_at":null,"tracks":{},"artists":{},"playlists":{}};\n',
                  encoding='utf-8',
              )

          index = Path('spotify/index.html')
          text = index.read_text(encoding='utf-8')
          old = '\n'.join([
              '<script src="../Spotify_Radar_data.js"></script>',
              '<script src="../Spotify_Playlists_data.js"></script>',
              '<script src="../Spotify_Labels_data.js"></script>',
              '<script src="../Spotify_Soundcharts_data.js?v=soundcharts-live"></script>',
          ])
          new = '\n'.join([
              '<script src="../Spotify_Radar_data.js"></script>',
              '<script src="../Spotify_Labels_data.js"></script>',
              '<script>',
              '(()=>{',
              '  const stamp=Date.now();',
              '  document.write(\'<script src="../Spotify_Playlists_data.js?payload=\'+stamp+\'"><\\/script>\');',
              '  document.write(\'<script src="../Spotify_Soundcharts_data.js?payload=\'+stamp+\'"><\\/script>\');',
              '  document.write(\'<script src="../Spotify_Performance_data.js?payload=\'+stamp+\'"><\\/script>\');',
              '})();',
              '</script>',
          ])
          if old not in text:
              raise SystemExit('Expected Spotify data-script block was not found')
          index.write_text(text.replace(old, new, 1), encoding='utf-8')
          PYCODE

      - name: Run unit tests
        run: python -m unittest tests/test_refresh_soundcharts_daily.py -v

      - name: Verify real Soundcharts artist and song metrics
        env:
          SOUNDCHARTS_CLIENT_ID: ${{ secrets.SOUNDCHARTS_CLIENT_ID }}
          SOUNDCHARTS_CLIENT_SECRET: ${{ secrets.SOUNDCHARTS_CLIENT_SECRET }}
          SOUNDCHARTS_TEAM_ID: dsomoguy-api
        run: python refresh_soundcharts_daily.py --mode smoke --max-requests 25 --history-days 14

      - name: Validate the browser bridge
        run: |
          python -m py_compile refresh_soundcharts_daily.py
          grep -q 'Spotify_Performance_data.js' spotify/index.html
          grep -q 'window.SPOTIFY_PERFORMANCE=' Spotify_Performance_data.js
          ! grep -R 'current/stats?period=1' refresh_soundcharts_daily.py
          grep -q '/audience/spotify' refresh_soundcharts_daily.py
          git diff --check

      - name: Commit the final fix to the pull-request branch
        shell: bash
        run: |
          rm -f .github/workflows/diagnose-soundcharts-daily.yml
          rm -f .github/workflows/apply-soundcharts-daily-fix.yml
          rm -f soundcharts-diagnostic.jsonl
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix daily Soundcharts stream synchronization"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
