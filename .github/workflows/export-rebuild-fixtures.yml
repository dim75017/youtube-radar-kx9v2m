name: Export Spotify Radar rebuild fixtures

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/export-rebuild-fixtures.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rebuild-spotify-ar-engine
          fetch-depth: 1

      - name: Package current production fixtures
        run: |
          zip -9 spotify-radar-fixtures.zip \
            Spotify_Soundcharts_data.js \
            Spotify_Performance_data.js \
            Spotify_Radar_data.js \
            Spotify_Playlists_data.js \
            Spotify_Labels_data.js

      - uses: actions/upload-artifact@v4
        with:
          name: spotify-radar-fixtures
          path: spotify-radar-fixtures.zip
          retention-days: 2
