name: Validate and stage YouTube subscriber telemetry fix

on:
  pull_request:
    paths:
      - '.github/workflows/apply-youtube-subscriber-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-youtube-subscriber-growth-ui
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Recover and apply the staged fix
        shell: bash
        run: |
          set -euo pipefail
          cat .youtube-subs-payload/part-* > "$RUNNER_TEMP/youtube-subs.raw"
          cp "$RUNNER_TEMP/youtube-subs.raw" "$RUNNER_TEMP/candidate"
          recovered=''
          for pass in 1 2 3; do
            if grep -q '^diff --git ' "$RUNNER_TEMP/candidate" 2>/dev/null; then
              cp "$RUNNER_TEMP/candidate" "$RUNNER_TEMP/youtube-subs.diff"
              recovered='diff'
              break
            fi
            if gzip -t "$RUNNER_TEMP/candidate" 2>/dev/null; then
              gzip -dc "$RUNNER_TEMP/candidate" > "$RUNNER_TEMP/youtube-subs.unpacked"
              mv "$RUNNER_TEMP/youtube-subs.unpacked" "$RUNNER_TEMP/candidate"
              continue
            fi
            if xz -t "$RUNNER_TEMP/candidate" 2>/dev/null; then
              xz -dc "$RUNNER_TEMP/candidate" > "$RUNNER_TEMP/youtube-subs.unpacked"
              mv "$RUNNER_TEMP/youtube-subs.unpacked" "$RUNNER_TEMP/candidate"
              continue
            fi
            if base64 --decode "$RUNNER_TEMP/candidate" > "$RUNNER_TEMP/youtube-subs.decoded" 2>/dev/null; then
              mv "$RUNNER_TEMP/youtube-subs.decoded" "$RUNNER_TEMP/candidate"
              continue
            fi
            break
          done
          if [[ -z "$recovered" ]] && grep -q '^diff --git ' "$RUNNER_TEMP/candidate" 2>/dev/null; then
            cp "$RUNNER_TEMP/candidate" "$RUNNER_TEMP/youtube-subs.diff"
            recovered='diff'
          fi
          if [[ "$recovered" != 'diff' ]]; then
            echo 'Unable to recover YouTube subscriber patch' >&2
            file "$RUNNER_TEMP/candidate" || true
            exit 1
          fi
          git apply --check "$RUNNER_TEMP/youtube-subs.diff"
          git apply "$RUNNER_TEMP/youtube-subs.diff"

      - name: Validate smoothing, fallbacks and two-dot status UI
        run: |
          python -m unittest tests/test_refresh_channels_monthly.py -v
          node --check assets/js/dashboard-02-helpers.js
          node tests/test_dashboard_channel_metrics.js
          ruby -e "require 'yaml'; YAML.load_file('.github/workflows/refresh-channel-radar.yml'); puts 'workflow yaml ok'"
          git diff --check

      - name: Commit validated non-workflow files and stage workflow blob
        shell: bash
        run: |
          set -euo pipefail
          cp .github/workflows/refresh-channel-radar.yml refresh-channel-radar.workflow.pending.yml
          git restore --source=HEAD --staged --worktree .github/workflows
          rm -rf .youtube-subs-payload
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            assets/js/dashboard-02-helpers.js \
            assets/css/dashboard.css \
            tests/test_dashboard_channel_metrics.js \
            refresh-channel-radar.workflow.pending.yml
          git add -u .youtube-subs-payload
          git diff --cached --check
          git commit -m 'Fix YouTube subscriber growth telemetry'
          git push origin HEAD:agent/fix-youtube-subscriber-growth-ui
