name: Validate refactored dashboard in Chrome

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  browser-smoke-test:
    if: github.head_ref == 'agent/reduce-truncated-dashboard-output'
    runs-on: ubuntu-latest

    steps:
      - name: Check out the pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Load the dashboard in headless Chrome
        shell: bash
        run: |
          set -euo pipefail
          CHROME="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || true)"
          test -n "$CHROME"

          python3 -m http.server 8000 --bind 127.0.0.1 >/tmp/dashboard-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/index.html >/dev/null; then
              break
            fi
            sleep 1
          done

          "$CHROME" \
            --headless=new \
            --no-sandbox \
            --disable-gpu \
            --disable-dev-shm-usage \
            --enable-logging=stderr \
            --virtual-time-budget=30000 \
            --dump-dom \
            'http://127.0.0.1:8000/#dashboard' \
            >/tmp/dashboard-dom.html 2>/tmp/dashboard-chrome.log

          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          class DashboardParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.loader_hidden = False
                  self.in_view = 0
                  self.view_text = []
                  self.error_box = False

              def handle_starttag(self, tag, attrs):
                  attrs = dict(attrs)
                  classes = set((attrs.get('class') or '').split())
                  if attrs.get('id') == 'loader' and 'hide' in classes:
                      self.loader_hidden = True
                  if attrs.get('id') == 'view':
                      self.in_view = 1
                  elif self.in_view:
                      self.in_view += 1
                  if 'err-box' in classes:
                      self.error_box = True

              def handle_endtag(self, tag):
                  if self.in_view:
                      self.in_view -= 1

              def handle_data(self, data):
                  if self.in_view and data.strip():
                      self.view_text.append(data.strip())

          dom = Path('/tmp/dashboard-dom.html').read_text(encoding='utf-8')
          parser = DashboardParser()
          parser.feed(dom)
          rendered = ' '.join(parser.view_text)

          assert parser.loader_hidden, 'The loader never reached its hidden state'
          assert not parser.error_box, 'The dashboard rendered its error state'
          assert len(rendered) > 300, f'The dashboard view is unexpectedly empty ({len(rendered)} chars)'
          assert 'Dashboard' in dom, 'Dashboard route was not rendered'
          print(f'Browser smoke test passed; rendered view text: {len(rendered)} chars')
          PY

      - name: Remove this temporary validation workflow
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/validate-refactored-dashboard.yml
          git commit -m 'Remove temporary browser validation workflow'
          git push origin "HEAD:${HEAD_BRANCH}"
