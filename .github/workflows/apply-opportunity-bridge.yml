name: Apply strict Soundcharts opportunity bridge

on:
  pull_request:
    paths:
      - '.github/workflows/apply-opportunity-bridge.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run bridge unit tests and compile production scripts
        run: |
          python -m unittest tests/test_sync_soundcharts_opportunities.py -v
          python -m py_compile sync_soundcharts_opportunities.py
          python -m py_compile refresh_soundcharts_daily.py

      - name: Restore and refresh the strict opportunity export
        run: python sync_soundcharts_opportunities.py

      - name: Validate generated opportunity data
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json

          prefix='window.SPOTIFY_SOUNDCHARTS='
          text=Path('Spotify_Soundcharts_data.js').read_text(encoding='utf-8')
          payload=json.loads(text[len(prefix):].strip().removesuffix(';'))
          schema=payload.get('schemas',{}).get('opportunities',[])
          rows=payload.get('opportunities',[])
          def value(row,name):
              i=schema.index(name)
              return row[i] if i<len(row) else None
          if len(rows) != 30:
              raise SystemExit(f'Expected the reviewed 30 opportunities, got {len(rows)}')
          metrics=sum(value(row,'streams') is not None for row in rows)
          deltas=sum(value(row,'streams_delta_24h') is not None for row in rows)
          if metrics != len(rows):
              raise SystemExit(f'Only {metrics}/{len(rows)} opportunities have current streams')
          if deltas == 0:
              raise SystemExit('No opportunity has an exact 24-hour delta')
          if payload.get('opportunity_sync',{}).get('status') != 'success':
              raise SystemExit('Opportunity sync metadata is missing')
          print(json.dumps({
              'opportunities':len(rows),
              'current_streams':metrics,
              'daily_deltas':deltas,
              'latest_source_date':payload['opportunity_sync'].get('latest_source_date'),
              'bytes':len(text.encode('utf-8')),
          }))
          PY
          git diff --check

      - name: Install Playwright Python client
        run: python -m pip install --disable-pip-version-check playwright

      - name: Load the corrected local A&R page in Chrome
        run: |
          python -m http.server 8765 >/tmp/spotify-radar-http.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          python3 - <<'PY'
          import json
          import shutil
          from playwright.sync_api import sync_playwright

          chrome=shutil.which('google-chrome') or shutil.which('chromium') or shutil.which('chromium-browser')
          if not chrome:
              raise SystemExit('Chrome/Chromium is unavailable')
          errors=[]
          failed=[]
          with sync_playwright() as p:
              browser=p.chromium.launch(headless=True,executable_path=chrome,args=['--no-sandbox'])
              page=browser.new_page(viewport={'width':1600,'height':1000})
              page.on('pageerror',lambda error:errors.append(str(error)))
              page.on('requestfailed',lambda request:failed.append(request.url))
              page.goto('http://127.0.0.1:8765/spotify/#opps',wait_until='domcontentloaded',timeout=120000)
              page.wait_for_selector('.ar-opportunity-card',timeout=120000)
              page.wait_for_timeout(2000)
              state=page.evaluate("""() => ({
                heading:document.querySelector('#view h2')?.textContent?.trim(),
                active:document.querySelector('#nav button.active')?.dataset?.v,
                cards:document.querySelectorAll('.ar-opportunity-card').length,
                performanceTracks:Object.keys(window.SPOTIFY_PERFORMANCE?.tracks||{}).length,
                dailyValues:[...document.querySelectorAll('.ar-opportunity-card .ar-opp-metrics')].slice(0,3).map(node=>node.innerText),
                emptyText:(document.querySelector('.ar-empty-state')?.textContent||'').trim(),
              })""")
              page.screenshot(path='opportunities-local.png',full_page=True)
              browser.close()
          print(json.dumps({'state':state,'page_errors':errors,'failed_requests':failed[:20]},ensure_ascii=False))
          if state['active']!='radar' or state['cards']!=30:
              raise SystemExit('The local #opps route did not render all 30 opportunity cards')
          if state['performanceTracks']==0:
              raise SystemExit('The local page did not load daily performance history')
          if state['emptyText']:
              raise SystemExit('The old empty opportunity state is still visible')
          if errors:
              raise SystemExit('JavaScript errors occurred while rendering #opps')
          PY

      - name: Commit only the generated strict export
        run: |
          rm -f .github/workflows/apply-opportunity-bridge.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Spotify_Soundcharts_data.js .github/workflows/apply-opportunity-bridge.yml
          git diff --cached --quiet && exit 0
          git commit -m "Restore live Soundcharts track opportunities"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
