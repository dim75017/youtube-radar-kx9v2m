name: Restore full Spotify track catalogue

on:
  push:
    branches:
      - agent/restore-full-track-catalogue
    paths:
      - '.github/workflows/restore-full-track-catalogue.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/restore-full-track-catalogue
          fetch-depth: 0

      - name: Restore the browsable catalogue without weakening A&R gates
        shell: bash
        run: |
          set -euo pipefail
          # Undo the later UI quarantine that emptied A, LEGACY_R and DISCOVERY_CATALOGUE.
          git revert --no-commit f88ab3a524a10e54f7b568225cad2b3c25c3062c
          # Return the live pointer to the last validated full-catalogue snapshot.
          git revert --no-commit 19d3af6130fbc96aa0ea42b94804efa78c3e3502

      - name: Validate restored catalogue and strict A&R separation
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json,re
          from pathlib import Path

          dashboard=Path('spotify/dashboard.js').read_text(encoding='utf-8')
          index=Path('spotify/index.html').read_text(encoding='utf-8')
          assert "const A = (D.artists || []).map" in dashboard
          assert "const LEGACY_R = (D.rows || []).filter" in dashboard
          assert "const DISCOVERY_CATALOGUE = SC&&SC.discovery_catalogue" in dashboard
          assert "function arIsContactable" in dashboard
          assert "opportunity.status==='verified'" in dashboard
          match=re.search(r'Spotify_Soundcharts_data[^?"\x27]+\.js',index)
          assert match and match.group(0)=='Spotify_Soundcharts_data_20260722T105508Z.js', match.group(0) if match else None
          raw=Path(match.group(0)).read_text(encoding='utf-8')
          sc=json.loads(raw[raw.find('{'):].strip().removesuffix(';'))
          catalogue=sc.get('discovery_catalogue') or {}
          counts=catalogue.get('counts') or {}
          assert len(catalogue.get('tracks') or []) == 17998
          assert len(catalogue.get('artists') or []) == 8351
          assert int(counts.get('playlist_tracks') or 0) == 16792
          assert int(counts.get('measured_tracks') or 0) == 2968
          print(json.dumps({'snapshot':match.group(0),'tracks':len(catalogue['tracks']),'artists':len(catalogue['artists']),'counts':counts},ensure_ascii=False))
          PY
          node --check spotify/dashboard.js
          node --check spotify/coverage.js
          for test in \
            tests/test_dashboard_opportunity_guardrails.js \
            tests/test_dashboard_general_view_guardrails.js \
            tests/test_dashboard_ar_ui_guardrails.js \
            tests/test_spotify_coverage_reporting.js \
            tests/test_spotify_full_catalogue.js; do
            [[ -f "$test" ]] && node "$test"
          done
          git diff --check

      - name: Commit restoration
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/restore-full-track-catalogue.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Restore full Spotify track catalogue in dashboard'
          git push origin HEAD:agent/restore-full-track-catalogue
