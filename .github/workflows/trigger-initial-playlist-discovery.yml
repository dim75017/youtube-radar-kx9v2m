name: Trigger initial playlist discovery cycle

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/trigger-initial-playlist-discovery.yml'

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch the production Soundcharts daily target
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run refresh-soundcharts.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f scope=daily_target \
            -f max_requests=8230
          echo 'Production Soundcharts daily_target dispatched.'
