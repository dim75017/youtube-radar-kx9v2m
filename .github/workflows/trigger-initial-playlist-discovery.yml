name: Summarize initial playlist discovery cycle

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/trigger-initial-playlist-discovery.yml'

permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Parse the active Soundcharts snapshot
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          index = Path('spotify/index.html').read_text(encoding='utf-8')
          matches = re.findall(r'\.\./(Spotify_Soundcharts_data_[^?"\']+\.js)', index)
          if not matches:
              raise SystemExit('No active dated Soundcharts snapshot found')
          snapshot_name = matches[-1]
          raw = Path(snapshot_name).read_text(encoding='utf-8')
          prefix = 'window.SPOTIFY_SOUNDCHARTS='
          if not raw.startswith(prefix):
              raise SystemExit('Invalid Soundcharts snapshot')
          data = json.loads(raw[len(prefix):].strip().removesuffix(';'))

          coverage = data.get('coverage') or {}
          tracks_cov = coverage.get('tracks') or {}
          artists_cov = coverage.get('artists') or {}
          discovery = data.get('playlist_discovery') or {}
          pool = data.get('instrumental_pool') or {}
          scoring = data.get('opportunity_scoring') or {}
          summary = {
              'active_snapshot': snapshot_name,
              'generated_at': data.get('generated_at'),
              'tracks_rows': len(data.get('tracks') or []),
              'artists_rows': len(data.get('artists') or []),
              'opportunities_rows': len(data.get('opportunities') or []),
              'tracks_catalog_total': tracks_cov.get('catalog_total') or tracks_cov.get('catalog') or tracks_cov.get('total'),
              'tracks_exported': tracks_cov.get('exported') or tracks_cov.get('rows'),
              'artists_catalog_total': artists_cov.get('catalog_total') or artists_cov.get('catalog') or artists_cov.get('total'),
              'artists_exported': artists_cov.get('exported') or artists_cov.get('rows'),
              'playlist_discovery': discovery,
              'instrumental_pool': pool,
              'opportunity_scoring': scoring,
          }
          Path('initial-playlist-discovery-summary.json').write_text(
              json.dumps(summary, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          print(json.dumps(summary, ensure_ascii=False))
          PY

      - name: Publish the summary
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add initial-playlist-discovery-summary.json
          git commit -m 'Record activated playlist discovery results'
          git pull --rebase origin main
          git push origin HEAD:main
