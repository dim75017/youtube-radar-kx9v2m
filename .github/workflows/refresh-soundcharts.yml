name: Refresh Soundcharts radar

on:
  push:
    paths:
      - 'refresh_soundcharts_daily.py'
      - '.github/workflows/refresh-soundcharts.yml'
  schedule:
    - cron: '35 2 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Collection to run'
        required: true
        default: 'full'
        type: choice
        options: [full, artists, tracks, fal, playlists, smoke]
      max_requests:
        description: 'Hard request cap for this run'
        required: true
        default: '15000'
        type: string

permissions:
  contents: write

concurrency:
  group: refresh-soundcharts-radar
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - name: Sync latest main
        run: git pull --ff-only origin main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Collect licensed Soundcharts data
        env:
          PYTHONUNBUFFERED: '1'
          SOUNDCHARTS_CLIENT_ID: ${{ secrets.SOUNDCHARTS_CLIENT_ID }}
          SOUNDCHARTS_CLIENT_SECRET: ${{ secrets.SOUNDCHARTS_CLIENT_SECRET }}
          SOUNDCHARTS_TEAM_ID: dsomoguy-api
        run: >-
          python refresh_soundcharts_daily.py
          --mode "${{ inputs.mode || 'full' }}"
          --max-requests "${{ inputs.max_requests || '15000' }}"
      - name: Publish only a successful snapshot
        if: ${{ inputs.mode != 'smoke' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Spotify_Soundcharts_data.js Spotify_Playlists_data.js soundcharts-history
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Refresh licensed Soundcharts radar data"
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            sleep 5
          done
          exit 1
