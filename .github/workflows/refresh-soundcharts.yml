name: Refresh Soundcharts A&R engine

on:
  push:
    branches: [main]
    paths:
      - 'refresh_soundcharts_daily.py'
      - 'discover_soundcharts_playlists.py'
      - 'spotify-catalogue-baseline.json'
      - 'spotify-catalogue-baseline.csv'
      - 'spotify-explicit-artist-seeds.json'
      - 'expand_soundcharts_instrumental_pool.py'
      - 'sync_soundcharts_opportunities.py'
      - 'prepare_soundcharts_snapshot.py'
      - 'tests/test_refresh_soundcharts_daily.py'
      - 'tests/test_discover_soundcharts_playlists.py'
      - 'tests/test_expand_soundcharts_instrumental_pool.py'
      - 'tests/test_sync_soundcharts_opportunities.py'
      - 'tests/test_prepare_soundcharts_snapshot.py'
      - 'tests/test_full_discovery_catalogue.py'
      - 'tests/test_soundcharts_workflow_guardrails.py'
      - 'tests/test_spotify_full_catalogue.js'
      - 'tests/test_dashboard_opportunity_guardrails.js'
      - 'tests/test_dashboard_general_view_guardrails.js'
      - 'tests/test_dashboard_ar_ui_guardrails.js'
      - '.github/workflows/refresh-soundcharts.yml'
      - 'spotify/index.html'
      - 'spotify/dashboard.js'
      - 'spotify/dashboard.css'
      - 'spotify/discovery.css'
      - 'spotify/coverage.js'
  pull_request:
    paths:
      - 'refresh_soundcharts_daily.py'
      - 'discover_soundcharts_playlists.py'
      - 'spotify-catalogue-baseline.json'
      - 'spotify-catalogue-baseline.csv'
      - 'spotify-explicit-artist-seeds.json'
      - 'expand_soundcharts_instrumental_pool.py'
      - 'sync_soundcharts_opportunities.py'
      - 'prepare_soundcharts_snapshot.py'
      - 'tests/test_refresh_soundcharts_daily.py'
      - 'tests/test_discover_soundcharts_playlists.py'
      - 'tests/test_expand_soundcharts_instrumental_pool.py'
      - 'tests/test_sync_soundcharts_opportunities.py'
      - 'tests/test_prepare_soundcharts_snapshot.py'
      - 'tests/test_full_discovery_catalogue.py'
      - 'tests/test_soundcharts_workflow_guardrails.py'
      - 'tests/test_spotify_full_catalogue.js'
      - 'tests/test_dashboard_opportunity_guardrails.js'
      - 'tests/test_dashboard_general_view_guardrails.js'
      - 'tests/test_dashboard_ar_ui_guardrails.js'
      - '.github/workflows/refresh-soundcharts.yml'
      - 'spotify/index.html'
      - 'spotify/dashboard.js'
      - 'spotify/dashboard.css'
      - 'spotify/discovery.css'
      - 'spotify/coverage.js'
  schedule:
    # Bootstrap: run as soon as the single protected collector becomes free.
    # The concurrency group below serializes 5-minute schedule ticks, so this
    # never overlaps collection or a Pages validation.
    # The preflight in the collector remains authoritative for quota, OAuth and
    # active-lock safety; this schedule never bypasses those checks.
    # Offset the five-minute cadence to avoid GitHub Actions' congested
    # top-of-hour scheduling window (minutes 2, 7, 12, ..., 57 UTC).
    - cron: '2-57/5 * * * *'
  workflow_dispatch:
    inputs:
      scope:
        description: 'Collection scope'
        required: true
        default: 'strict_rebaseline'
        type: choice
        options: [strict_rebaseline, dark_ambient, dark_ambient_catalogues, explicit_artists, classification, artists, playlist_covers, smoke]
      max_requests:
        description: 'Data-call cap (strict: 1-6000; classification: 1-8230)'
        required: true
        default: '6000'
        type: string

permissions:
  actions: read
  contents: write
  deployments: read
  pages: read

concurrency:
  group: refresh-soundcharts-ar-${{ (github.event_name == 'push' || github.event_name == 'pull_request') && 'ci' || 'collection' }}-${{ github.ref }}
  # A 30-minute bootstrap cadence must not interrupt a validated publication
  # that is still waiting for GitHub Pages. GitHub queues the next collection
  # instead, so there is never more than one Soundcharts run at a time.
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          fetch-depth: 0

      - name: Sync latest main before a publishing run
        if: github.ref == 'refs/heads/main' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.scope != 'smoke'))
        run: git pull --ff-only origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore Soundcharts bootstrap state
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          state_api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts?name=soundcharts-bootstrap-state&per_page=1"
          state_url="$(curl --fail --silent --show-error --location \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$state_api" | jq -r '.artifacts[] | select(.expired == false) | .archive_download_url' | head -n 1)"
          if [[ -n "$state_url" && "$state_url" != "null" ]]; then
            curl --fail --silent --show-error --location \
              --header "Authorization: Bearer $GH_TOKEN" \
              "$state_url" --output /tmp/soundcharts-bootstrap-state.zip
            unzip -o -q /tmp/soundcharts-bootstrap-state.zip -d .
            test -f soundcharts-instrumental-cache.json
            echo "Restored Soundcharts bootstrap state"
          else
            echo "No prior Soundcharts bootstrap state found; starting a safe new state"
          fi

      - name: Run collector and A&R engine tests
        run: >-
          python -m unittest
          tests/test_refresh_soundcharts_daily.py
          tests/test_discover_soundcharts_playlists.py
          tests/test_expand_soundcharts_instrumental_pool.py
          tests/test_sync_soundcharts_opportunities.py
          tests/test_prepare_soundcharts_snapshot.py
          tests/test_full_discovery_catalogue.py
          tests/test_soundcharts_workflow_guardrails.py
          -v

      - name: Validate production source syntax
        run: |
          python -m py_compile refresh_soundcharts_daily.py discover_soundcharts_playlists.py expand_soundcharts_instrumental_pool.py enrich_public_artist_contacts.py sync_soundcharts_opportunities.py prepare_soundcharts_snapshot.py
          python -m unittest tests.test_enrich_public_artist_contacts
          node --check spotify/dashboard.js
          node tests/test_dashboard_opportunity_guardrails.js
          node tests/test_dashboard_general_view_guardrails.js
          node tests/test_dashboard_ar_ui_guardrails.js
          node tests/test_dashboard_genre_filter.js
          node tests/test_spotify_full_catalogue.js
          git diff --check

      - name: Select safe execution plan
        id: plan
        shell: bash
        env:
          REQUESTED_SCOPE: ${{ inputs.scope }}
          REQUESTED_MAX_REQUESTS: ${{ inputs.max_requests }}
        run: |
          artist_data_cap="350"
          playlist_data_cap="1400"
          independent_playlist_data_cap="2500"
          expansion_data_cap="6000"
          classification_data_cap="8230"
          if [[ "${{ github.event_name }}" == "pull_request" || "${{ github.event_name }}" == "push" ]]; then
            scope="ci_smoke"
            expansion_limit=""
            expansion_requests="0"
            publish="false"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            scope="$REQUESTED_SCOPE"
            case "$scope" in
              strict_rebaseline|dark_ambient) expansion_limit="2500" ;;
              dark_ambient_catalogues|explicit_artists) expansion_limit="" ;;
              classification) expansion_limit="" ;;
              artists|playlist_covers|smoke) expansion_limit="" ;;
              *) echo "Unsupported scope: $scope" >&2; exit 1 ;;
            esac
            request_cap="$expansion_data_cap"
            if [[ "$scope" == "classification" ]]; then request_cap="$classification_data_cap"; fi
            if [[ "$scope" == "playlist_covers" ]]; then request_cap="$playlist_data_cap"; fi
            if [[ ! "$REQUESTED_MAX_REQUESTS" =~ ^[1-9][0-9]{0,3}$ ]] || (( 10#$REQUESTED_MAX_REQUESTS > request_cap )); then
              echo "max_requests must be an integer between 1 and $request_cap for $scope" >&2
              exit 1
            fi
            expansion_requests="$REQUESTED_MAX_REQUESTS"
            if [[ "$GITHUB_REF" == "refs/heads/main" && "$scope" != "smoke" ]]; then publish="true"; else publish="false"; fi
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            scope="strict_rebaseline"
            expansion_limit="2500"
            expansion_requests="$expansion_data_cap"
            publish="true"
          else
            echo "Unsupported event: ${{ github.event_name }}" >&2
            exit 1
          fi
          echo "scope=$scope" >> "$GITHUB_OUTPUT"
          echo "expansion_limit=$expansion_limit" >> "$GITHUB_OUTPUT"
          echo "expansion_requests=$expansion_requests" >> "$GITHUB_OUTPUT"
          echo "artist_requests=$artist_data_cap" >> "$GITHUB_OUTPUT"
          echo "playlist_requests=$playlist_data_cap" >> "$GITHUB_OUTPUT"
          echo "independent_playlist_requests=$independent_playlist_data_cap" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "Selected scope=$scope, expansion_requests=$expansion_requests, publish=$publish"

      - name: Create an isolated Soundcharts candidate
        id: snapshot
        if: steps.plan.outputs.scope == 'strict_rebaseline' || steps.plan.outputs.scope == 'dark_ambient' || steps.plan.outputs.scope == 'dark_ambient_catalogues' || steps.plan.outputs.scope == 'explicit_artists' || steps.plan.outputs.scope == 'classification' || steps.plan.outputs.scope == 'artists'
        shell: bash
        run: |
          old_snapshot="$(python prepare_soundcharts_snapshot.py current --index spotify/index.html)"
          candidate="$RUNNER_TEMP/Spotify_Soundcharts_candidate.js"
          cp -- "$old_snapshot" "$candidate"
          echo "old=$old_snapshot" >> "$GITHUB_OUTPUT"
          echo "candidate=$candidate" >> "$GITHUB_OUTPUT"
          echo "Candidate copied from $old_snapshot"

      - name: Verify Soundcharts authentication and response contracts
        if: github.event_name == 'workflow_dispatch' && steps.plan.outputs.scope == 'smoke'
        env:
          PYTHONUNBUFFERED: '1'
          SOUNDCHARTS_CLIENT_ID: ${{ secrets.SOUNDCHARTS_CLIENT_ID }}
          SOUNDCHARTS_CLIENT_SECRET: ${{ secrets.SOUNDCHARTS_CLIENT_SECRET }}
          SOUNDCHARTS_TEAM_ID: dsomoguy-api
        run: >-
          python refresh_soundcharts_daily.py
          --mode smoke
          --max-requests 25
          --history-days 14

      - name: Refresh mapped artist audience only when explicitly requested
        if: steps.plan.outputs.scope == 'artists'
        env:
          PYTHONUNBUFFERED: '1'
          SOUNDCHARTS_CLIENT_ID: ${{ secrets.SOUNDCHARTS_CLIENT_ID }}
          SOUNDCHARTS_CLIENT_SECRET: ${{ secrets.SOUNDCHARTS_CLIENT_SECRET }}
          SOUNDCHARTS_TEAM_ID: dsomoguy-api
        run: >-
          python refresh_soundcharts_daily.py
          --mode artists
          --workers 10
          --max-requests "${{ steps.plan.outputs.artist_requests }}"
          --history-days 90
          --soundcharts "${{ steps.snapshot.outputs.candidate }}"

      - name: Refresh published playlist covers from Soundcharts
        if: steps.plan.outputs.scope == 'playlist_covers'
        env:
          PYTHONUNBUFFERED: '1'
          SOUNDCHARTS_CLIENT_ID: ${{ secrets.SOUNDCHARTS_CLIENT_ID }}
          SOUNDCHARTS_CLIENT_SECRET: ${{ secrets.SOUNDCHARTS_CLIENT_SECRET }}
          SOUNDCHARTS_TEAM_ID: dsomoguy-api
        run: >-
          python refresh_soundcharts_daily.py
          --mode playlists
          --workers 10
          --max-requests "${{ steps.plan.outputs.expansion_requests }}"
          --history-days 90

      - name: Discover tracks and artist catalogues from editorial playlists
        # Public snapshots intentionally retain only strict, publishable rows.
        # Rebuild the wider playlist pool before a classification-only pass so
        # the pending tracks are actually present in the isolated candidate.
        if: steps.plan.outputs.scope == 'strict_rebaseline' || steps.plan.outputs.scope == 'classification'
        env:
          PYTHONUNBUFFERED: '1'
          SOUNDCHARTS_CLIENT_ID: ${{ secrets.SOUNDCHARTS_CLIENT_ID }}
          SOUNDCHARTS_CLIENT_SECRET: ${{ secrets.SOUNDCHARTS_CLIENT_SECRET }}
          SOUNDCHARTS_TEAM_ID: dsomoguy-api
        run: >-
          python discover_soundcharts_playlists.py
          --soundcharts "${{ steps.snapshot.outputs.candidate }}"
          --playlists Spotify_Playlists_data.js
          --baseline spotify-catalogue-baseline.json
          --cache soundcharts-instrumental-cache.json
          --workers 10
          --max-requests "${{ steps.plan.outputs.playlist_requests }}"
          --page-size 100
          --max-new-playlist-tracks 450
          --max-catalog-artists 500
          --catalog-page-size 25
          --max-new-catalog-tracks 2500

      - name: Discover a rotating batch of independent background playlists
        if: steps.plan.outputs.scope == 'strict_rebaseline' || steps.plan.outputs.scope == 'classification'
        env:
          PYTHONUNBUFFERED: '1'
          SOUNDCHARTS_CLIENT_ID: ${{ secrets.SOUNDCHARTS_CLIENT_ID }}
          SOUNDCHARTS_CLIENT_SECRET: ${{ secrets.SOUNDCHARTS_CLIENT_SECRET }}
          SOUNDCHARTS_TEAM_ID: dsomoguy-api
        run: >-
          python discover_soundcharts_playlists.py
          --soundcharts "${{ steps.snapshot.outputs.candidate }}"
          --playlists Spotify_Playlists_data.js
          --baseline spotify-catalogue-baseline.json
          --cache soundcharts-instrumental-cache.json
          --workers 10
          --max-requests "${{ steps.plan.outputs.independent_playlist_requests }}"
          --playlist-scope independent
          --summary-key independent_playlist_discovery
          --playlist-limit 250
          --page-size 100
          --max-new-playlist-tracks 600
          --max-catalog-artists 0
          --max-new-catalog-tracks 0

      - name: Discover every Dark Ambient playlist and their artist catalogues
        if: steps.plan.outputs.scope == 'dark_ambient'
        env:
          PYTHONUNBUFFERED: '1'
          SOUNDCHARTS_CLIENT_ID: ${{ secrets.SOUNDCHARTS_CLIENT_ID }}
          SOUNDCHARTS_CLIENT_SECRET: ${{ secrets.SOUNDCHARTS_CLIENT_SECRET }}
          SOUNDCHARTS_TEAM_ID: dsomoguy-api
        run: >-
          python discover_soundcharts_playlists.py
          --soundcharts "${{ steps.snapshot.outputs.candidate }}"
          --playlists Spotify_Playlists_data.js
          --baseline spotify-catalogue-baseline.json
          --cache soundcharts-instrumental-cache.json
          --workers 10
          --max-requests "${{ steps.plan.outputs.expansion_requests }}"
          --playlist-scope dark_ambient
          --summary-key dark_ambient_playlist_discovery
          --playlist-limit 250
          --page-size 100
          --max-new-playlist-tracks 2500
          --max-catalog-artists 1800
          --catalog-page-size 100
          --max-new-catalog-tracks 60000

      - name: Continue every discovered Dark Ambient artist catalogue
        # This deliberately avoids re-reading the same playlist tracklists.
        # It advances the per-artist cursor across the full discographies
        # already discovered from the validated Dark Ambient playlist cohort.
        if: steps.plan.outputs.scope == 'dark_ambient_catalogues'
        env:
          PYTHONUNBUFFERED: '1'
          SOUNDCHARTS_CLIENT_ID: ${{ secrets.SOUNDCHARTS_CLIENT_ID }}
          SOUNDCHARTS_CLIENT_SECRET: ${{ secrets.SOUNDCHARTS_CLIENT_SECRET }}
          SOUNDCHARTS_TEAM_ID: dsomoguy-api
        run: >-
          python discover_soundcharts_playlists.py
          --soundcharts "${{ steps.snapshot.outputs.candidate }}"
          --playlists Spotify_Playlists_data.js
          --baseline spotify-catalogue-baseline.json
          --cache soundcharts-instrumental-cache.json
          --workers 10
          --max-requests "${{ steps.plan.outputs.expansion_requests }}"
          --playlist-scope dark_ambient
          --summary-key dark_ambient_playlist_discovery
          --catalogues-only
          --max-catalog-artists 1800
          --catalog-page-size 100
          --max-new-catalog-tracks 60000

      - name: Scan explicitly requested Spotify artists and their tracks
        # Seeds are direct discovery instructions from Dim.  They do not add
        # a genre, instrumental verdict, rights status or opportunity by name.
        if: steps.plan.outputs.scope == 'explicit_artists'
        env:
          PYTHONUNBUFFERED: '1'
          SOUNDCHARTS_CLIENT_ID: ${{ secrets.SOUNDCHARTS_CLIENT_ID }}
          SOUNDCHARTS_CLIENT_SECRET: ${{ secrets.SOUNDCHARTS_CLIENT_SECRET }}
          SOUNDCHARTS_TEAM_ID: dsomoguy-api
        run: >-
          python discover_soundcharts_playlists.py
          --soundcharts "${{ steps.snapshot.outputs.candidate }}"
          --playlists Spotify_Playlists_data.js
          --baseline spotify-catalogue-baseline.json
          --artist-seeds spotify-explicit-artist-seeds.json
          --cache soundcharts-instrumental-cache.json
          --workers 10
          --max-requests "${{ steps.plan.outputs.expansion_requests }}"
          --summary-key explicit_artist_discovery
          --catalogues-only
          --max-catalog-artists 5
          --catalog-page-size 100
          --max-new-catalog-tracks 5000

      - name: Expand and measure the target instrumental pool
        if: steps.plan.outputs.scope == 'strict_rebaseline' || steps.plan.outputs.scope == 'dark_ambient'
        env:
          PYTHONUNBUFFERED: '1'
          SOUNDCHARTS_CLIENT_ID: ${{ secrets.SOUNDCHARTS_CLIENT_ID }}
          SOUNDCHARTS_CLIENT_SECRET: ${{ secrets.SOUNDCHARTS_CLIENT_SECRET }}
          SOUNDCHARTS_TEAM_ID: dsomoguy-api
        shell: bash
        run: |
          args=(
            --max-requests "${{ steps.plan.outputs.expansion_requests }}"
            --history-days 90
            --workers 10
          )
          if [[ -n "${{ steps.plan.outputs.expansion_limit }}" ]]; then
            args+=(--limit "${{ steps.plan.outputs.expansion_limit }}")
          fi
          python expand_soundcharts_instrumental_pool.py \
            --soundcharts "${{ steps.snapshot.outputs.candidate }}" \
            "${args[@]}"

      - name: Classify pending playlist tracks from exact Soundcharts song genres
        if: steps.plan.outputs.scope == 'classification'
        env:
          PYTHONUNBUFFERED: '1'
          SOUNDCHARTS_CLIENT_ID: ${{ secrets.SOUNDCHARTS_CLIENT_ID }}
          SOUNDCHARTS_CLIENT_SECRET: ${{ secrets.SOUNDCHARTS_CLIENT_SECRET }}
          SOUNDCHARTS_TEAM_ID: dsomoguy-api
        run: >-
          python expand_soundcharts_instrumental_pool.py
          --soundcharts "${{ steps.snapshot.outputs.candidate }}"
          --cache soundcharts-instrumental-cache.json
          --workers 16
          --max-requests "${{ steps.plan.outputs.expansion_requests }}"
          --classification-only

      - name: Enrich public professional contacts progressively
        if: steps.plan.outputs.scope == 'strict_rebaseline' || steps.plan.outputs.scope == 'dark_ambient' || steps.plan.outputs.scope == 'dark_ambient_catalogues' || steps.plan.outputs.scope == 'explicit_artists' || steps.plan.outputs.scope == 'classification' || steps.plan.outputs.scope == 'artists'
        run: >-
          python enrich_public_artist_contacts.py
          --soundcharts "${{ steps.snapshot.outputs.candidate }}"
          --cache soundcharts-instrumental-cache.json
          --max-artists 10
          --max-profiles-per-artist 4

      - name: Recalculate actionable A&R opportunities
        if: steps.plan.outputs.scope == 'strict_rebaseline' || steps.plan.outputs.scope == 'dark_ambient' || steps.plan.outputs.scope == 'dark_ambient_catalogues' || steps.plan.outputs.scope == 'explicit_artists' || steps.plan.outputs.scope == 'classification' || steps.plan.outputs.scope == 'artists'
        run: >-
          python sync_soundcharts_opportunities.py
          --soundcharts "${{ steps.snapshot.outputs.candidate }}"
          --max-artist-listeners 5000000
          --max-track-streams 250000000
          --max-opportunities 10000
          --minimum-score 20

      - name: Prepare public-safe dated snapshot
        id: prepared
        if: steps.plan.outputs.scope == 'strict_rebaseline' || steps.plan.outputs.scope == 'dark_ambient' || steps.plan.outputs.scope == 'dark_ambient_catalogues' || steps.plan.outputs.scope == 'explicit_artists' || steps.plan.outputs.scope == 'classification' || steps.plan.outputs.scope == 'artists'
        shell: bash
        run: |
          result="$RUNNER_TEMP/soundcharts-snapshot-result.json"
          python prepare_soundcharts_snapshot.py prepare \
            --source "${{ steps.snapshot.outputs.candidate }}" \
            --output-dir . > "$result"
          cat "$result"
          snapshot="$(python -c 'import json, pathlib, sys; print(pathlib.Path(json.load(open(sys.argv[1], encoding="utf-8"))["output"]).name)' "$result")"
          echo "name=$snapshot" >> "$GITHUB_OUTPUT"

      - name: Validate generated business outputs
        if: steps.plan.outputs.scope == 'strict_rebaseline' || steps.plan.outputs.scope == 'dark_ambient' || steps.plan.outputs.scope == 'dark_ambient_catalogues' || steps.plan.outputs.scope == 'explicit_artists' || steps.plan.outputs.scope == 'classification' || steps.plan.outputs.scope == 'artists'
        env:
          SNAPSHOT_NAME: ${{ steps.prepared.outputs.name }}
          RUN_SCOPE: ${{ steps.plan.outputs.scope }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          def load(path, prefix):
              raw = Path(path).read_text(encoding='utf-8')
              assert raw.startswith(prefix), path
              return json.loads(raw[len(prefix):].strip().removesuffix(';'))

          soundcharts = load(os.environ['SNAPSHOT_NAME'], 'window.SPOTIFY_SOUNDCHARTS=')
          performance = load('Spotify_Performance_data.js', 'window.SPOTIFY_PERFORMANCE=')
          pool = soundcharts.get('instrumental_pool') or {}
          discovery = soundcharts.get('playlist_discovery') or {}
          independent_discovery = soundcharts.get('independent_playlist_discovery') or {}
          explicit_artists = soundcharts.get('explicit_artist_discovery') or {}
          classification = soundcharts.get('classification_backfill') or {}
          catalogue = soundcharts.get('discovery_catalogue') or {}
          scoring = soundcharts.get('opportunity_scoring') or {}
          opportunities = soundcharts.get('opportunities') or []
          if os.environ.get('RUN_SCOPE') == 'strict_rebaseline':
              if int(discovery.get('playlists_scanned') or 0) < 1:
                  raise SystemExit('Editorial playlist discovery scanned no playlist')
              unique_playlist_tracks = int(discovery.get('unique_playlist_tracks') or 0)
              if unique_playlist_tracks < 1:
                  raise SystemExit('Editorial playlist discovery returned no tracks')
              if int(independent_discovery.get('playlists_scanned') or 0) < 1:
                  raise SystemExit('Independent playlist discovery scanned no playlist')
              if int(independent_discovery.get('unique_playlist_tracks') or 0) < 1:
                  raise SystemExit('Independent playlist discovery returned no tracks')
              public_discovery_tracks = catalogue.get('tracks') if isinstance(catalogue, dict) else []
              if not isinstance(public_discovery_tracks, list) or len(public_discovery_tracks) < unique_playlist_tracks:
                  raise SystemExit('Full discovery catalogue did not publish every playlist track')
          if os.environ.get('RUN_SCOPE') == 'dark_ambient':
              dark_ambient = soundcharts.get('dark_ambient_playlist_discovery') or {}
              if int(dark_ambient.get('playlists_scanned') or 0) < 1:
                  raise SystemExit('Dark Ambient discovery scanned no eligible playlist')
              if int(dark_ambient.get('unique_playlist_tracks') or 0) < 1:
                  raise SystemExit('Dark Ambient discovery returned no tracks')
          if os.environ.get('RUN_SCOPE') == 'classification':
              pending_before = int(classification.get('pending_before') or 0)
              if pending_before > 0 and int(classification.get('updated') or 0) < 1:
                  raise SystemExit('Soundcharts genre classification updated no pending track')
          if os.environ.get('RUN_SCOPE') == 'explicit_artists':
              if int(explicit_artists.get('explicit_artists_resolved') or 0) < 1:
                  raise SystemExit('Explicit artist discovery resolved no supplied artist')
              if int(explicit_artists.get('catalogue_artists_scanned') or 0) < 1:
                  raise SystemExit('Explicit artist discovery scanned no catalogue')
          if int(pool.get('measured') or 0) < 1:
              raise SystemExit('Instrumental pool produced no real Spotify counter')
          if not opportunities:
              raise SystemExit('A&R engine produced no actionable opportunity')
          if not performance.get('tracks'):
              raise SystemExit('Performance history export is empty')
          print(json.dumps({
              'catalog_total': scoring.get('catalog_total'),
              'playlists_scanned': discovery.get('playlists_scanned'),
              'playlist_tracks': discovery.get('unique_playlist_tracks'),
              'new_playlist_tracks': discovery.get('new_playlist_tracks'),
              'new_catalogue_tracks': discovery.get('new_catalogue_tracks'),
              'independent_playlists_scanned': independent_discovery.get('playlists_scanned'),
              'independent_playlist_tracks': independent_discovery.get('unique_playlist_tracks'),
              'classified_tracks': classification.get('updated'),
              'classification_remaining': classification.get('remaining'),
              'explicit_artists_resolved': explicit_artists.get('explicit_artists_resolved'),
              'explicit_catalogue_tracks': explicit_artists.get('new_catalogue_tracks'),
              'target_tracks': pool.get('target_tracks'),
              'published_discovery_tracks': len(catalogue.get('tracks') or []),
              'published_discovery_artists': len(catalogue.get('artists') or []),
              'measured': pool.get('measured'),
              'daily_delta_ready': pool.get('daily_delta_ready'),
              'opportunities': len(opportunities),
              'deal_types': scoring.get('deal_types'),
              'contacts': scoring.get('contacts'),
              'quota_remaining': pool.get('quota_remaining'),
          }, ensure_ascii=False))
          PY

      - name: Publish validated dated snapshot first
        id: publish_snapshot
        if: steps.plan.outputs.publish == 'true'
        env:
          SNAPSHOT_NAME: ${{ steps.prepared.outputs.name }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "$SNAPSHOT_NAME"
          git commit -m "data: stage validated Soundcharts snapshot"
          published="false"
          for attempt in 1 2 3; do
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              published="true"
              break
            fi
            sleep 5
          done
          test "$published" = "true"
          staged_sha="$(git rev-parse HEAD)"
          echo "sha=$staged_sha" >> "$GITHUB_OUTPUT"
          echo "Staged unreferenced snapshot at $staged_sha"

      - name: Publish refreshed playlist covers
        if: steps.plan.outputs.publish == 'true' && steps.plan.outputs.scope == 'playlist_covers'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Spotify_Playlists_data.js Spotify_Performance_data.js soundcharts-history
          git diff --cached --quiet && exit 0
          git commit -m "data: refresh Soundcharts playlist covers"
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin HEAD:main && exit 0
            sleep 5
          done
          exit 1

      - name: Verify dated snapshot exists on main
        if: steps.plan.outputs.publish == 'true'
        env:
          SNAPSHOT_NAME: ${{ steps.prepared.outputs.name }}
          STAGED_SHA: ${{ steps.publish_snapshot.outputs.sha }}
        shell: bash
        run: |
          git fetch origin main
          test "$(git rev-parse origin/main)" = "$STAGED_SHA"
          local_blob="$(git hash-object "$SNAPSHOT_NAME")"
          remote_blob="$(git rev-parse "$STAGED_SHA:$SNAPSHOT_NAME")"
          test "$local_blob" = "$remote_blob"
          echo "Validated remote blob $remote_blob for $SNAPSHOT_NAME"

      - name: Wait for staged snapshot to be live and green
        if: steps.plan.outputs.publish == 'true'
        timeout-minutes: 45
        env:
          GH_TOKEN: ${{ github.token }}
          SNAPSHOT_NAME: ${{ steps.prepared.outputs.name }}
          STAGED_SHA: ${{ steps.publish_snapshot.outputs.sha }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          PUBLIC_BASE_URL: https://dim75017.github.io/youtube-radar-kx9v2m
        shell: bash
        run: |
          set -euo pipefail
          deployments_json="$RUNNER_TEMP/soundcharts-pages-deployments.json"
          statuses_json="$RUNNER_TEMP/soundcharts-pages-statuses.json"
            deployment_state="pending"
            local_sha256="$(sha256sum "$SNAPSHOT_NAME" | cut -d' ' -f1)"
            public_copy="$RUNNER_TEMP/$SNAPSHOT_NAME.public"
            public_verified="false"

          # Status polling is bounded and read-only. It never retries a
            # Soundcharts request or any collection/purchase operation. A
            # GitHub Pages deployment may be superseded by a later, unrelated
            # main commit, so the public snapshot hash is the authoritative
            # proof in that case.
            for poll in $(seq 1 160); do
            gh api -X GET "repos/$GITHUB_REPOSITORY/deployments" \
              -f sha="$STAGED_SHA" \
              -f environment="github-pages" \
              -f per_page=20 > "$deployments_json"
            deployment_id="$(python -c 'import json,sys; rows=json.load(open(sys.argv[1], encoding="utf-8")); sha=sys.argv[2]; print(next((row["id"] for row in rows if row.get("sha")==sha), ""))' "$deployments_json" "$STAGED_SHA")"
            deployment_state="pending"
            if [[ -n "$deployment_id" ]]; then
              gh api -X GET "repos/$GITHUB_REPOSITORY/deployments/$deployment_id/statuses" \
                -f per_page=20 > "$statuses_json"
              deployment_state="$(python -c 'import json,sys; rows=json.load(open(sys.argv[1], encoding="utf-8")); print(rows[0].get("state", "pending") if rows else "pending")' "$statuses_json")"
            fi

              if curl --fail --silent --show-error --location --retry 0 --max-time 30 \
                --header 'Cache-Control: no-cache' \
                "$PUBLIC_BASE_URL/$SNAPSHOT_NAME?commit=$STAGED_SHA" \
                --output "$public_copy"; then
                public_sha256="$(sha256sum "$public_copy" | cut -d' ' -f1)"
                if [[ "$public_sha256" == "$local_sha256" ]]; then
                  public_verified="true"
                  break
                fi
              fi

              if [[ "$deployment_state" == "failure" || "$deployment_state" == "error" ]]; then
                # A later UI commit can supersede this deployment while the
                # staged snapshot remains intact on main. Keep waiting for
                # the authoritative public bytes instead of cancelling the
                # already-completed collection.
                echo "Pages reported $deployment_state for staged SHA $STAGED_SHA; waiting for a superseding deployment" >&2
              fi
              if [[ "$deployment_state" == "success" ]]; then
                break
              fi
              if [[ "$poll" == "160" ]]; then
                echo "Timed out waiting for Pages on staged SHA $STAGED_SHA (deployment=$deployment_state)" >&2
                exit 1
            fi
            sleep 15
          done

            if [[ "$public_verified" != "true" ]]; then
              for poll in $(seq 1 12); do
                if curl --fail --silent --show-error --location --retry 0 --max-time 30 \
                  --header 'Cache-Control: no-cache' \
                  "$PUBLIC_BASE_URL/$SNAPSHOT_NAME?commit=$STAGED_SHA" \
                  --output "$public_copy"; then
                  public_sha256="$(sha256sum "$public_copy" | cut -d' ' -f1)"
                  if [[ "$public_sha256" == "$local_sha256" ]]; then
                    public_verified="true"
                    break
                  fi
                fi
                if [[ "$poll" != "12" ]]; then sleep 15; fi
              done
            fi
          if [[ "$public_verified" != "true" ]]; then
            echo "Public staged snapshot is missing or differs from the validated blob; index remains unchanged" >&2
            exit 1
          fi
          echo "Pages deployment and public snapshot bytes verified for $STAGED_SHA"

      - name: Persist Soundcharts bootstrap state outside Git
        if: github.ref == 'refs/heads/main' && steps.plan.outputs.publish == 'true' && success()
        uses: actions/upload-artifact@v4
        with:
          name: soundcharts-bootstrap-state
          path: soundcharts-instrumental-cache.json
          if-no-files-found: error
          retention-days: 7
          compression-level: 9
          overwrite: true

      - name: Activate snapshot only after remote validation
        if: steps.plan.outputs.publish == 'true'
        env:
          SNAPSHOT_NAME: ${{ steps.prepared.outputs.name }}
          OLD_SNAPSHOT: ${{ steps.snapshot.outputs.old }}
          STAGED_SHA: ${{ steps.publish_snapshot.outputs.sha }}
        shell: bash
        run: |
          git fetch origin main
          stashed_changes="false"
          if [[ -n "$(git status --porcelain)" ]]; then
            git stash push --include-untracked -m "soundcharts-activation-rebase"
            stashed_changes="true"
          fi
          git rebase origin/main
          if [[ "$stashed_changes" == "true" ]]; then
            git stash pop
          fi
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"
          local_blob="$(git hash-object "$SNAPSHOT_NAME")"
          staged_blob="$(git rev-parse "$STAGED_SHA:$SNAPSHOT_NAME")"
          test "$local_blob" = "$staged_blob"
          python prepare_soundcharts_snapshot.py activate \
            --index spotify/index.html \
            --expected-old "$OLD_SNAPSHOT" \
            --new "$SNAPSHOT_NAME"
          git add \
            spotify/index.html \
            Spotify_Performance_data.js \
            soundcharts-history
          git commit -m "data: activate validated Soundcharts snapshot"
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin HEAD:main && exit 0
            sleep 5
          done
          exit 1
