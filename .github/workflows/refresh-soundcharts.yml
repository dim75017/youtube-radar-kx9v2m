name: Refresh Soundcharts A&R engine

on:
  push:
    branches: [main]
    paths:
      - 'refresh_soundcharts_daily.py'
      - 'expand_soundcharts_instrumental_pool.py'
      - 'sync_soundcharts_opportunities.py'
      - 'tests/test_refresh_soundcharts_daily.py'
      - 'tests/test_expand_soundcharts_instrumental_pool.py'
      - 'tests/test_sync_soundcharts_opportunities.py'
      - '.github/workflows/refresh-soundcharts.yml'
      - 'spotify/index.html'
      - 'spotify/dashboard.js'
      - 'spotify/dashboard.css'
  pull_request:
    paths:
      - 'refresh_soundcharts_daily.py'
      - 'expand_soundcharts_instrumental_pool.py'
      - 'sync_soundcharts_opportunities.py'
      - 'tests/test_refresh_soundcharts_daily.py'
      - 'tests/test_expand_soundcharts_instrumental_pool.py'
      - 'tests/test_sync_soundcharts_opportunities.py'
      - '.github/workflows/refresh-soundcharts.yml'
      - 'spotify/index.html'
      - 'spotify/dashboard.js'
      - 'spotify/dashboard.css'
  schedule:
    - cron: '35 2 * * *'
  workflow_dispatch:
    inputs:
      scope:
        description: 'Collection scope'
        required: true
        default: 'daily_target'
        type: choice
        options: [daily_target, artists, smoke, legacy_full]
      max_requests:
        description: 'Hard request cap for the instrumental pool expansion'
        required: true
        default: '85000'
        type: string

permissions:
  contents: write

concurrency:
  group: refresh-soundcharts-ar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          fetch-depth: 0

      - name: Sync latest main before a publishing run
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: git pull --ff-only origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run collector and A&R engine tests
        run: >-
          python -m unittest
          tests/test_refresh_soundcharts_daily.py
          tests/test_expand_soundcharts_instrumental_pool.py
          tests/test_sync_soundcharts_opportunities.py
          -v

      - name: Validate production source syntax
        run: |
          python -m py_compile refresh_soundcharts_daily.py expand_soundcharts_instrumental_pool.py sync_soundcharts_opportunities.py
          node --check spotify/dashboard.js
          git diff --check

      - name: Select safe execution plan
        id: plan
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            scope="smoke"
            expansion_limit="20"
            expansion_requests="120"
            publish="false"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            scope="${{ inputs.scope }}"
            expansion_limit=""
            expansion_requests="${{ inputs.max_requests }}"
            if [[ "$GITHUB_REF" == "refs/heads/main" && "$scope" != "smoke" ]]; then publish="true"; else publish="false"; fi
          else
            scope="daily_target"
            expansion_limit=""
            expansion_requests="85000"
            publish="true"
          fi
          echo "scope=$scope" >> "$GITHUB_OUTPUT"
          echo "expansion_limit=$expansion_limit" >> "$GITHUB_OUTPUT"
          echo "expansion_requests=$expansion_requests" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "Selected scope=$scope, expansion_requests=$expansion_requests, publish=$publish"

      - name: Verify Soundcharts authentication and response contracts
        if: steps.plan.outputs.scope == 'smoke'
        env:
          PYTHONUNBUFFERED: '1'
          SOUNDCHARTS_CLIENT_ID: ${{ secrets.SOUNDCHARTS_CLIENT_ID }}
          SOUNDCHARTS_CLIENT_SECRET: ${{ secrets.SOUNDCHARTS_CLIENT_SECRET }}
          SOUNDCHARTS_TEAM_ID: dsomoguy-api
        run: >-
          python refresh_soundcharts_daily.py
          --mode smoke
          --max-requests 25
          --history-days 14

      - name: Refresh mapped artist audience
        if: steps.plan.outputs.scope == 'daily_target' || steps.plan.outputs.scope == 'artists' || steps.plan.outputs.scope == 'legacy_full'
        env:
          PYTHONUNBUFFERED: '1'
          SOUNDCHARTS_CLIENT_ID: ${{ secrets.SOUNDCHARTS_CLIENT_ID }}
          SOUNDCHARTS_CLIENT_SECRET: ${{ secrets.SOUNDCHARTS_CLIENT_SECRET }}
          SOUNDCHARTS_TEAM_ID: dsomoguy-api
        run: >-
          python refresh_soundcharts_daily.py
          --mode artists
          --max-requests 5000
          --history-days 90

      - name: Run legacy full collector only when explicitly requested
        if: steps.plan.outputs.scope == 'legacy_full'
        env:
          PYTHONUNBUFFERED: '1'
          SOUNDCHARTS_CLIENT_ID: ${{ secrets.SOUNDCHARTS_CLIENT_ID }}
          SOUNDCHARTS_CLIENT_SECRET: ${{ secrets.SOUNDCHARTS_CLIENT_SECRET }}
          SOUNDCHARTS_TEAM_ID: dsomoguy-api
        run: >-
          python refresh_soundcharts_daily.py
          --mode full
          --max-requests 100000
          --history-days 90

      - name: Expand and measure the target instrumental pool
        if: steps.plan.outputs.scope == 'daily_target' || steps.plan.outputs.scope == 'legacy_full' || steps.plan.outputs.scope == 'smoke'
        env:
          PYTHONUNBUFFERED: '1'
          SOUNDCHARTS_CLIENT_ID: ${{ secrets.SOUNDCHARTS_CLIENT_ID }}
          SOUNDCHARTS_CLIENT_SECRET: ${{ secrets.SOUNDCHARTS_CLIENT_SECRET }}
          SOUNDCHARTS_TEAM_ID: dsomoguy-api
        shell: bash
        run: |
          args=(
            --max-requests "${{ steps.plan.outputs.expansion_requests }}"
            --history-days 90
            --workers 24
          )
          if [[ -n "${{ steps.plan.outputs.expansion_limit }}" ]]; then
            args+=(--limit "${{ steps.plan.outputs.expansion_limit }}")
          fi
          python expand_soundcharts_instrumental_pool.py "${args[@]}"

      - name: Recalculate actionable A&R opportunities
        if: steps.plan.outputs.scope != 'artists'
        run: >-
          python sync_soundcharts_opportunities.py
          --max-artist-listeners 5000000
          --max-track-streams 250000000
          --max-opportunities 2000
          --minimum-score 20

      - name: Validate generated business outputs
        if: steps.plan.outputs.scope != 'artists'
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          def load(path, prefix):
              raw = Path(path).read_text(encoding='utf-8')
              assert raw.startswith(prefix), path
              return json.loads(raw[len(prefix):].strip().removesuffix(';'))

          soundcharts = load('Spotify_Soundcharts_data.js', 'window.SPOTIFY_SOUNDCHARTS=')
          performance = load('Spotify_Performance_data.js', 'window.SPOTIFY_PERFORMANCE=')
          pool = soundcharts.get('instrumental_pool') or {}
          scoring = soundcharts.get('opportunity_scoring') or {}
          opportunities = soundcharts.get('opportunities') or []
          if int(pool.get('measured') or 0) < 1:
              raise SystemExit('Instrumental pool produced no real Spotify counter')
          if not opportunities:
              raise SystemExit('A&R engine produced no actionable opportunity')
          if not performance.get('tracks'):
              raise SystemExit('Performance history export is empty')
          print(json.dumps({
              'catalog_total': scoring.get('catalog_total'),
              'target_tracks': pool.get('target_tracks'),
              'measured': pool.get('measured'),
              'daily_delta_ready': pool.get('daily_delta_ready'),
              'opportunities': len(opportunities),
              'deal_types': scoring.get('deal_types'),
              'contacts': scoring.get('contacts'),
              'quota_remaining': pool.get('quota_remaining'),
          }, ensure_ascii=False))
          PY

      - name: Publish only validated daily A&R snapshots
        if: steps.plan.outputs.publish == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            Spotify_Soundcharts_data.js \
            Spotify_Performance_data.js \
            soundcharts-instrumental-cache.json \
            soundcharts-history
          if git diff --cached --quiet; then
            echo "No validated A&R metric change to publish"
            exit 0
          fi
          git commit -m "Refresh instrumental A&R radar metrics"
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && exit 0
            sleep 5
          done
          exit 1
