name: Probe Soundcharts song metadata

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/probe-soundcharts-song-metadata.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rebuild-spotify-ar-engine
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Inspect metadata fields needed for rights and artist identity
        env:
          SOUNDCHARTS_CLIENT_ID: ${{ secrets.SOUNDCHARTS_CLIENT_ID }}
          SOUNDCHARTS_CLIENT_SECRET: ${{ secrets.SOUNDCHARTS_CLIENT_SECRET }}
          SOUNDCHARTS_TEAM_ID: dsomoguy-api
        run: |
          python3 - <<'PY'
          import json, os, urllib.parse
          from pathlib import Path
          from refresh_soundcharts_daily import SoundchartsClient

          probes = [
              ('db682833-ffbd-4185-bcb9-8ef1eda90a2d', 'Dignity'),
              ('fc30f950-d6e4-4004-b592-fa01bb86f231', 'Unfolding'),
              ('e4983d99-3905-4bdf-b02b-151ed75acc54', 'Deep Connection'),
              ('fae87079-0498-4927-b349-ca5ae1bc7602', 'Lights Are On (Instrumental)'),
          ]
          client = SoundchartsClient(
              os.environ.get('SOUNDCHARTS_CLIENT_ID',''),
              os.environ.get('SOUNDCHARTS_CLIENT_SECRET',''),
              os.environ.get('SOUNDCHARTS_TEAM_ID',''),
          )
          client.authenticate()
          report={'auth_mode':client.auth_mode,'quota_start':client.quota_remaining,'tracks':[]}
          for uuid,title in probes:
              detail=client.get(f'/api/v2/song/{urllib.parse.quote(uuid)}')
              albums=client.get(f'/api/v2/song/{urllib.parse.quote(uuid)}/albums?offset=0&limit=5&sortBy=releaseDate&sortOrder=asc')
              report['tracks'].append({
                  'uuid':uuid,'title':title,
                  'detail': detail,
                  'albums': albums,
              })
          report['quota_end']=client.quota_remaining
          Path('soundcharts-song-metadata-probe.json').write_text(json.dumps(report,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          print(json.dumps({'auth_mode':report['auth_mode'],'quota_start':report['quota_start'],'quota_end':report['quota_end'],'tracks':[{'uuid':x['uuid'],'detail_keys':sorted(x['detail'].keys()) if isinstance(x['detail'],dict) else [],'album_count':len(x['albums'].get('items',[])) if isinstance(x['albums'],dict) else 0} for x in report['tracks']]},ensure_ascii=False))
          PY
      - name: Commit safe metadata probe report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add soundcharts-song-metadata-probe.json
          git diff --cached --quiet && exit 0
          git commit -m "Record Soundcharts song metadata fields"
          git pull --rebase origin agent/rebuild-spotify-ar-engine
          git push origin HEAD:agent/rebuild-spotify-ar-engine
