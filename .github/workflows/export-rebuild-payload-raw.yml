name: Export raw Spotify A&R rebuild payload

on:
  pull_request:
    paths:
      - '.github/workflows/export-rebuild-payload-raw.yml'

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Archive raw payload parts
        run: |
          find .rebuild-payload -maxdepth 1 -type f -printf '%f %s bytes\n' | sort
          tar -czf /tmp/rebuild-payload-raw.tar.gz .rebuild-payload
      - uses: actions/upload-artifact@v4
        with:
          name: rebuild-payload-raw
          path: /tmp/rebuild-payload-raw.tar.gz
          retention-days: 2
