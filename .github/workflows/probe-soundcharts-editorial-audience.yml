name: Probe Soundcharts editorial audience identifiers

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/probe-soundcharts-editorial-audience.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rebuild-spotify-ar-engine
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Inspect Spotify audience responses for editorial tracks without Spotify IDs
        env:
          SOUNDCHARTS_CLIENT_ID: ${{ secrets.SOUNDCHARTS_CLIENT_ID }}
          SOUNDCHARTS_CLIENT_SECRET: ${{ secrets.SOUNDCHARTS_CLIENT_SECRET }}
          SOUNDCHARTS_TEAM_ID: dsomoguy-api
        run: |
          python3 - <<'PY'
          from __future__ import annotations
          import datetime as dt
          import json
          import os
          import urllib.parse
          from pathlib import Path
          from refresh_soundcharts_daily import SoundchartsClient

          probes = [
              ('db682833-ffbd-4185-bcb9-8ef1eda90a2d', 'Dignity', 'Nova Issue'),
              ('fc30f950-d6e4-4004-b592-fa01bb86f231', 'Unfolding', 'Apollo Vision'),
              ('e4983d99-3905-4bdf-b02b-151ed75acc54', 'Deep Connection', 'Opheralis'),
              ('dd125bc9-9320-47f5-99d9-6a981f6936f7', 'vertigo', 'énouement & insensible'),
              ('fae87079-0498-4927-b349-ca5ae1bc7602', 'Lights Are On (Instrumental)', 'Edith Whiskers'),
          ]
          client = SoundchartsClient(
              os.environ.get('SOUNDCHARTS_CLIENT_ID', ''),
              os.environ.get('SOUNDCHARTS_CLIENT_SECRET', ''),
              os.environ.get('SOUNDCHARTS_TEAM_ID', ''),
          )
          client.authenticate()
          today = dt.datetime.now(dt.timezone.utc).date()
          start = (today - dt.timedelta(days=14)).isoformat()
          end = today.isoformat()

          def safe_shape(value, depth=0):
              if depth > 5:
                  return type(value).__name__
              if isinstance(value, dict):
                  return {str(key): safe_shape(child, depth + 1) for key, child in value.items()}
              if isinstance(value, list):
                  return [safe_shape(value[0], depth + 1)] if value else []
              return type(value).__name__

          report = {'auth_mode': client.auth_mode, 'quota_start': client.quota_remaining, 'tracks': []}
          for uuid, title, artist in probes:
              query = urllib.parse.urlencode({'startDate': start, 'endDate': end, 'limit': 100})
              payload = client.get(f'/api/v2/song/{urllib.parse.quote(uuid)}/audience/spotify?{query}')
              identifiers = []
              points = []
              def walk(value):
                  if isinstance(value, dict):
                      day = str(value.get('date') or '')[:10]
                      plots = value.get('plots')
                      if day and isinstance(plots, list):
                          for plot in plots:
                              if isinstance(plot, dict):
                                  identifier = str(plot.get('identifier') or '')
                                  metric = plot.get('value')
                                  if identifier:
                                      identifiers.append(identifier)
                                  if isinstance(metric, (int, float)):
                                      points.append({'date': day, 'identifier': identifier, 'value': metric})
                      for child in value.values():
                          walk(child)
                  elif isinstance(value, list):
                      for child in value:
                          walk(child)
              walk(payload)
              report['tracks'].append({
                  'uuid': uuid,
                  'title': title,
                  'artist': artist,
                  'top_level_keys': sorted(payload.keys()) if isinstance(payload, dict) else [],
                  'shape': safe_shape(payload),
                  'identifiers': sorted(set(identifiers)),
                  'points_tail': sorted(points, key=lambda p: p['date'])[-5:],
              })
          report['quota_end'] = client.quota_remaining
          Path('soundcharts-editorial-audience-probe.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          print(json.dumps(report, ensure_ascii=False))
          PY

      - name: Commit safe audience probe report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add soundcharts-editorial-audience-probe.json
          git diff --cached --quiet && exit 0
          git commit -m "Record Soundcharts editorial audience identifiers"
          git pull --rebase origin agent/rebuild-spotify-ar-engine
          git push origin HEAD:agent/rebuild-spotify-ar-engine
